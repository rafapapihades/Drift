<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESTADO PILOTO - DRIFT SHOW</title>
    <style>
        body { 
            background: #000 url('Fibra3.png') center/420px;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: -1;
        }

        h2 { color: #ffcc00; text-transform: uppercase; margin-bottom: 5px; text-align: center; }
        .subtitle { color: #aaa; font-size: 0.9em; margin-bottom: 20px; text-align: center; }
        .brand-logo { width: min(360px, 92vw); height: auto; margin: 4px 0 14px; filter: drop-shadow(0 8px 16px #000); }
        .event-title { color:#ffcc00; font-weight:900; text-transform:uppercase; margin:-4px 0 14px; text-align:center; }

        .card-input { 
            background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 20px; 
            border: 2px solid #ffcc00; 
            width: 90%; max-width: 400px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            margin-bottom: 30px;
        }

        input { 
            width: 100%; padding: 15px; background: #000; 
            border: 1px solid #444; color: #ffcc00; 
            border-radius: 12px; font-size: 2.5em; 
            text-align: center; box-sizing: border-box; font-weight: bold;
        }
        .btn-accept {
            width: 100%;
            margin-top: 12px;
            padding: 15px;
            border: 0;
            border-radius: 12px;
            background: #ffcc00;
            color: #000;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }

        #pantalla-estado { width: 100%; max-width: 500px; }
        .status-box { padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 30px; border: 2px solid transparent; }
        
        /* ESTADOS */
        .en-podio { background: rgba(26, 77, 26, 0.95); border-color: #00ff00; animation: pulse 2s infinite; }
        .fuera-podio { background: rgba(77, 26, 26, 0.95); border-color: #ff4444; }
        .pendiente { background: rgba(30, 30, 30, 0.9); border: 1px dashed #666; }

        .pos-container { display: flex; justify-content: space-around; margin: 15px 0; }
        .pos-item { flex: 1; }
        .pos-num { font-size: 3.5em; font-weight: 900; display: block; line-height: 1; }
        .pos-label { font-size: 0.7em; text-transform: uppercase; color: #ffcc00; font-weight: bold; }
        
        .instruccion-final { 
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(0,0,0,0.5); 
            border-radius: 10px; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 1.1em;
            color: #fff;
        }

        /* RANKING GENERAL */
        .ranking-container { 
            width: 100%; max-width: 900px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            margin-top: 20px;
        }
        .rank-column { background: rgba(0, 0, 0, 0.8); border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .rank-column h3 { font-size: 0.9em; color: #ffcc00; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.85em; 
        }
        .p-info b { display: block; color: #fff; }
        .p-val { font-family: monospace; font-weight: bold; color: #ffcc00; }
        .esc-stats {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0 4px;
            color: #aaa;
            font-weight: 900;
            text-transform: uppercase;
        }
        .esc-stats b { color: #ffcc00; font-size: 1.25em; }
        .not-started {
            width: 100%;
            max-width: 760px;
            background: rgba(0,0,0,.82);
            border: 1px dashed #ffcc00;
            border-radius: 15px;
            padding: 18px;
            margin-top: 20px;
            color: #ffcc00;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
        }
        .esc-result-card {
            width: 90%;
            max-width: 500px;
            background: #050505;
            border: 2px solid #ffcc00;
            border-radius: 15px;
            padding: 14px;
            margin: 0 0 24px;
            box-sizing: border-box;
            text-align: center;
        }
        .esc-result-card h3 { margin: 0 0 10px; color: #ffcc00; text-transform: uppercase; }
        .esc-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .esc-result-box { background: #000; border: 1px solid #333; border-radius: 10px; padding: 12px 8px; }
        .esc-result-box span { display: block; color: #999; font-size: .7em; font-weight: 900; text-transform: uppercase; }
        .esc-result-box b { display: block; font-size: 1.45em; margin: 4px 0; }
        .podio-ok { color: #00ff99; }
        .podio-out { color: #ffcc00; }
        .premio-card {
            width: 90%;
            max-width: 620px;
            background: linear-gradient(180deg, rgba(255,204,0,.18), rgba(0,0,0,.86));
            border: 2px solid #ffcc00;
            border-radius: 15px;
            padding: 16px;
            margin: 0 0 22px;
            box-sizing: border-box;
            text-align: center;
        }
        .premio-card h3 { margin:0 0 8px; color:#ffcc00; text-transform:uppercase; }
        .premio-card p { margin:6px 0; color:#ddd; font-weight:800; }
        .premio-card b { color:#fff; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }

        @media (max-width: 600px) { .ranking-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <img class="brand-logo" src="logo_peq.png" alt="Drift Show">
    <div id="event-title" class="event-title"></div>

    <h2>MI POSICIÓN</h2>
    <p class="subtitle">Ingresa tu dorsal o matrícula para consultar tus marcas</p>
    
    <div class="card-input">
        <input type="text" id="mi-dorsal" placeholder="DORSAL / MATRÍCULA" onkeydown="if(event.key==='Enter') consultarParticipante()">
        <button class="btn-accept" onclick="consultarParticipante()">Aceptar</button>
    </div>

    <div id="pantalla-estado">
        <div class="status-box pendiente">
            <p>Introduce tu dorsal o matrícula y pulsa aceptar</p>
        </div>
    </div>

    <div id="ultimo-resultado-esc" class="esc-result-card" style="display:none"></div>
    <div id="premio-publico-esc" class="premio-card" style="display:none"></div>

    <h2 id="ranking-title" style="margin-top:30px; font-size:1.2em">RANKING GENERAL</h2>
    <div id="esc-stats" class="esc-stats">
        <span>Participantes <b id="esc-total">0</b></span>
        <span>Terminados <b id="esc-medidos">0</b></span>
    </div>
    <div id="ranking-not-started" class="not-started" style="display:none">La prueba de escapes aún no ha comenzado</div>
    <div id="inicio-escapes" class="not-started" style="display:none"></div>
    <div id="ranking-container" class="ranking-container">
        <div class="rank-column">
            <h3>DB COCHES</h3>
            <div id="col-db-coche"></div>
        </div>
        <div class="rank-column">
            <h3>DB MOTOS</h3>
            <div id="col-db-moto"></div>
        </div>
        <div class="rank-column">
            <h3>SONORIDAD COCHES</h3>
            <div id="col-son-coche"></div>
        </div>
        <div class="rank-column">
            <h3>SONORIDAD MOTOS</h3>
            <div id="col-son-moto"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let rankingData = [];
        let inscritosEsc = {};
        let consultaRealizada = false;
        let ultimoResultadoTimer = null;
        let modoEscapesActivo = false;
        let premioPublicoEscapes = null;
        let configEvento = {};
        let inicioTimer = null;

        onValue(ref(db, 'config_evento'), snap => {
            configEvento = snap.val() || {};
            document.getElementById('event-title').innerText = configEvento.nombre || "";
            iniciarCuentaInicio();
        });

        onValue(ref(db, 'modo_actual'), snap => {
            modoEscapesActivo = (snap.val() || 'tab-show') === 'tab-esc';
            renderEstadoModoEscapes();
        });

        onValue(ref(db, 'inscritos_esc'), snap => {
            inscritosEsc = snap.val() || {};
            renderStatsEscapes();
        });

        onValue(ref(db, 'ranking_escapes'), snap => {
            rankingData = snap.exists() ? Object.values(snap.val()) : [];
            if(consultaRealizada) actualizarPantalla();
            renderRankingGlobal();
            renderStatsEscapes();
        });

        onValue(ref(db, 'ultimo_resultado_escapes'), snap => {
            renderUltimoResultadoEscape(snap.val());
        });

        onValue(ref(db, 'premio_publico_escapes'), snap => {
            premioPublicoEscapes = snap.val();
            renderPremioPublicoEscapes();
        });

        function renderPremioPublicoEscapes() {
            const box = document.getElementById('premio-publico-esc');
            const p = premioPublicoEscapes;
            if(!box || !p || (!p.activa && !p.ganador)) {
                if(box) { box.style.display = 'none'; box.innerHTML = ''; }
                return;
            }
            box.style.display = 'block';
            if(p.activa) {
                const candidatos = Object.values(p.candidatos || {});
                box.innerHTML = `
                    <h3>Premio del Público abierto</h3>
                    <p>Votación final entre los mejores de sonoridad.</p>
                    ${candidatos.map(c => `<p><b>${escHtml(c.categoria === 'moto' ? 'MOTO' : 'COCHE')} · #${escHtml(c.dorsal)} ${escHtml(c.piloto)}</b><br>${escHtml(c.coche)}</p>`).join('')}
                `;
                return;
            }
            const g = p.ganador || {};
            box.innerHTML = `
                <h3>Premio del Público</h3>
                <p>Ganador: <b>${escHtml(g.categoria === 'moto' ? 'MOTO' : 'COCHE')} · #${escHtml(g.dorsal)} ${escHtml(g.piloto)}</b></p>
                <p>${escHtml(g.coche || '')} · ${Number(g.votos || 0)} votos</p>
            `;
        }

        function renderUltimoResultadoEscape(r) {
            const box = document.getElementById('ultimo-resultado-esc');
            if(!box || !r) {
                if(box) box.style.display = 'none';
                return;
            }
            clearTimeout(ultimoResultadoTimer);
            const age = Date.now() - Number(r.ts || 0);
            if(r.ts && age > 10000) {
                box.style.display = 'none';
                return;
            }
            const dbClass = r.dbPodio ? 'podio-ok' : 'podio-out';
            const hzClass = r.hzPodio ? 'podio-ok' : 'podio-out';
            box.style.display = 'block';
            box.innerHTML = `
                <h3>#${escHtml(r.dorsal)} ${escHtml(r.piloto)}</h3>
                <div class="esc-result-grid">
                    <div class="esc-result-box">
                        <span>DB ${escHtml(r.categoria)}</span>
                        <b>${Number(r.db || 0).toFixed(1)} dB</b>
                        <strong class="${dbClass}">P${r.dbPos || '-'}</strong>
                    </div>
                    <div class="esc-result-box">
                        <span>SONORIDAD ${escHtml(r.categoria)}</span>
                        <b>${Number(r.sonoridad || 0).toFixed(1)} pts</b>
                        <strong class="${hzClass}">P${r.hzPos || '-'}</strong>
                    </div>
                </div>`;
            ultimoResultadoTimer = setTimeout(() => { box.style.display = 'none'; }, Math.max(0, 10000 - age));
        }

        function escHtml(v) {
            return String(v || '').replace(/[&<>"']/g, c => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c]));
        }

        window.consultarParticipante = () => {
            consultaRealizada = true;
            actualizarPantalla();
        };

        window.actualizarPantalla = () => {
            const query = normalizarBusqueda(document.getElementById('mi-dorsal').value);
            const screen = document.getElementById('pantalla-estado');
            
            if (!consultaRealizada) {
                screen.innerHTML = '<div class="status-box pendiente"><p>Introduce tu dorsal o matrícula y pulsa aceptar</p></div>';
                return;
            }

            if (!query) {
                screen.innerHTML = '<div class="status-box pendiente"><p>Introduce tu dorsal o matrícula.</p></div>';
                return;
            }

            const yo = rankingData.find(p => coincideParticipante(p, query));
            if (!yo) {
                screen.innerHTML = `<div class="status-box pendiente"><h3>${escHtml(document.getElementById('mi-dorsal').value)}</h3><p>Calienta que pronto te toca</p></div>`;
                return;
            }

            const miTipo = String(yo.tipoVehiculo || '').toLowerCase().includes('moto') ? 'moto' : 'coche';
            const miCategoria = miTipo === 'moto' ? 'MOTOS' : 'COCHES';
            const miCategoriaData = rankingData.filter(p => (String(p.tipoVehiculo || '').toLowerCase().includes('moto') ? 'moto' : 'coche') === miTipo);
            const rDB = [...miCategoriaData].sort((a,b) => Number(b.db || 0) - Number(a.db || 0));
            const rHZ = [...miCategoriaData].sort((a,b) => Number(b.sonoridad || 0) - Number(a.sonoridad || 0));
            
            const pDB = rDB.findIndex(p => coincideParticipante(p, query)) + 1;
            const pHZ = rHZ.findIndex(p => coincideParticipante(p, query)) + 1;

            const esPodioDB = pDB <= 3;
            const esPodioHZ = pHZ <= 3;
            const esCualquierPodio = esPodioDB || esPodioHZ;

            let instruccion = "Debes salir del podio";
            if (esPodioDB && esPodioHZ) instruccion = "ESTÁS EN AMBOS PODIOS. ELIGE";
            else if (esPodioDB) instruccion = "COLÓCATE EN PODIO DB " + miCategoria;
            else if (esPodioHZ) instruccion = "COLÓCATE EN PODIO SONORIDAD " + miCategoria;

            screen.innerHTML = `
                <div class="status-box ${esCualquierPodio ? 'en-podio' : 'fuera-podio'}">
                    <div style="font-size:1.1em; font-weight:bold">${yo.piloto}</div>
                    <div style="font-size:0.8em; opacity:0.8">${yo.coche}</div>
                    
                    <div class="pos-container">
                        <div class="pos-item">
                            <span class="pos-num">${pDB}º</span>
                            <span class="pos-label">DB ${miCategoria}</span>
                        </div>
                        <div class="pos-item">
                            <span class="pos-num">${pHZ}º</span>
                            <span class="pos-label">SONORIDAD ${miCategoria}</span>
                        </div>
                    </div>

                    <div class="instruccion-final">
                        ${instruccion}
                    </div>
                </div>
            `;
        };

        function renderRankingGlobal() {
            if(!modoEscapesActivo) {
                renderEstadoModoEscapes();
                return;
            }
            const tipoVehiculo = (v) => {
                const t = String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                return (t.includes('moto') || t.includes('bike')) ? 'moto' : 'coche';
            };
            const coches = rankingData.filter(p => tipoVehiculo(p.tipoVehiculo) === 'coche');
            const motos = rankingData.filter(p => tipoVehiculo(p.tipoVehiculo) === 'moto');
            const buildHTML = (lista, campo, unidad) => {
                const filtrada = lista.filter(p => Number(p[campo]) > 0).slice(0, 5);
                return filtrada.map((p, i) => `
                    <div class="rank-item">
                        <div class="p-info">
                            <b>${i+1}º. #${p.dorsal} ${p.piloto}</b>
                            <span>${p.coche}</span>
                        </div>
                        <div class="p-val">${p[campo]}${unidad}</div>
                    </div>
                `).join('') || '<div class="rank-item"><div class="p-info"><b>Sin datos</b></div></div>';
            };

            document.getElementById('col-db-coche').innerHTML = buildHTML([...coches].sort((a,b) => Number(b.db || 0) - Number(a.db || 0)), 'db', 'dB');
            document.getElementById('col-db-moto').innerHTML = buildHTML([...motos].sort((a,b) => Number(b.db || 0) - Number(a.db || 0)), 'db', 'dB');
            document.getElementById('col-son-coche').innerHTML = buildHTML([...coches].sort((a,b) => Number(b.sonoridad || 0) - Number(a.sonoridad || 0)), 'sonoridad', 'pts');
            document.getElementById('col-son-moto').innerHTML = buildHTML([...motos].sort((a,b) => Number(b.sonoridad || 0) - Number(a.sonoridad || 0)), 'sonoridad', 'pts');
        }

        function iniciarCuentaInicio() {
            if(inicioTimer) clearInterval(inicioTimer);
            actualizarCuentaInicio();
            inicioTimer = setInterval(actualizarCuentaInicio, 1000);
        }

        function actualizarCuentaInicio() {
            const box = document.getElementById('inicio-escapes');
            if(!box) return;
            if(!configEvento.fecha || !configEvento.horaInicio) {
                box.style.display = 'none';
                return;
            }
            const inicio = new Date(configEvento.fecha + 'T' + configEvento.horaInicio + ':00');
            const diff = inicio.getTime() - Date.now();
            if(diff <= 0) {
                box.style.display = 'none';
                return;
            }
            const totalSeg = Math.floor(diff / 1000);
            const h = Math.floor(totalSeg / 3600);
            const m = Math.floor((totalSeg % 3600) / 60);
            const s = totalSeg % 60;
            box.style.display = 'block';
            box.innerHTML = totalSeg <= 600
                ? `<b>FALTAN ${m}:${String(s).padStart(2,'0')}</b><br>Dirígete a la entrada de pista`
                : `La prueba empieza en <b>${h}h ${m}m</b>`;
        }

        function renderEstadoModoEscapes() {
            const ranking = document.getElementById('ranking-container');
            const aviso = document.getElementById('ranking-not-started');
            const stats = document.getElementById('esc-stats');
            const title = document.getElementById('ranking-title');
            if(modoEscapesActivo) {
                if(ranking) ranking.style.display = 'grid';
                if(aviso) aviso.style.display = 'none';
                if(stats) stats.style.display = 'flex';
                if(title) title.innerText = 'RANKING GENERAL';
                renderRankingGlobal();
            } else {
                if(ranking) ranking.style.display = 'none';
                if(aviso) aviso.style.display = 'block';
                if(stats) stats.style.display = 'none';
                if(title) title.innerText = 'ESCAPES';
            }
        }

        function renderStatsEscapes() {
            const total = Object.values(inscritosEsc || {}).filter(escapePagado).length;
            document.getElementById('esc-total').innerText = total;
            document.getElementById('esc-medidos').innerText = rankingData.length;
        }

        function escapePagado(p) {
            if(!p || !Object.prototype.hasOwnProperty.call(p, 'pagado')) return false;
            const v = String(p.pagado || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            return p.pagado === true || ['si','s','yes','y','true','1','pagado','ok'].includes(v);
        }

        function normalizarBusqueda(v) {
            return String(v || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/^#/, '').replace(/\s+/g, '');
        }

        function coincideParticipante(p, query) {
            return normalizarBusqueda(p.dorsal) === query || normalizarBusqueda(p.matricula) === query;
        }

        function normComb(v) {
            return String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes('diesel') ? 'diesel' : 'gasolina';
        }
</script>
</body>
</html>
