<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
    .title { color: #ffcc00; text-align: center; text-transform: uppercase; font-size: 1.3em; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; margin-bottom: 20px; }
    
    /* CARD COCHE EN PISTA */
    .card-active { background: #111; border: 3px solid #007bff; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); cursor: pointer; }
    .dorsal { font-size: 4em; font-weight: 900; color: #007bff; line-height: 1; }
    .nombre-pista { font-size: 1.8em; font-weight: bold; margin: 10px 0; text-transform: uppercase; color: #fff; }
    .coche-tag { background: #007bff; color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.9em; font-weight: bold; }

    .votos-box { display: flex; justify-content: space-around; background: #222; margin-top: 15px; padding: 15px; border-radius: 12px; }
    .voto-val { font-size: 2em; font-weight: bold; color: #ffcc00; display: block; }
    .voto-label { font-size: 0.7em; color: #888; text-transform: uppercase; }

    /* RANKING */
    .ranking-panel { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-top: 20px; }
    .ranking-table { width: 100%; border-collapse: collapse; }
    .ranking-table td { padding: 10px; border-bottom: 1px solid #222; }

    /* MODAL */
    #modal-ficha { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
    .ficha-content { background: #111; border: 2px solid #ffcc00; border-radius: 20px; padding: 25px; max-width: 550px; margin: 0 auto; }
    .label-f { color: #ffcc00; font-size: 0.75em; text-transform: uppercase; font-weight: bold; margin-top: 15px; display: block; border-left: 3px solid #ffcc00; padding-left: 8px; }
    .txt-f { font-size: 1.15em; color: #eee; margin: 5px 0; line-height: 1.4; }
    .btn-cerrar { background: #ffcc00; color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 1.1em; }
    
    .admin-zone { margin-top: 30px; padding: 20px; border: 1px dashed #444; border-radius: 15px; text-align: center; }
    .btn-csv { background: #333; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <div class="title">🎤 SPEAKER - TORREDEMBARRA</div>

  <div id="pista-container">
    <div style="text-align:center; color:#444; margin-top:50px;">ESPERANDO ACCIÓN DEL MASTER...</div>
  </div>

  <div class="ranking-panel">
    <div style="text-align:center; color:#ffcc00; font-size:0.8em; font-weight:bold; margin-bottom:10px;">🏆 TOP APOYO</div>
    <table class="ranking-table">
      <tbody id="ranking-body"></tbody>
    </table>
  </div>

  <div class="admin-zone">
    <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="importarFichas(event)">
    <button class="btn-csv" onclick="document.getElementById('csv-file').click()">📂 CARGAR FICHAS TÉCNICAS (FICHAS_TORREDEMBARRA.CSV)</button>
    <div id="status-carga" style="font-size:0.7em; margin-top:8px; color:#666;"></div>
  </div>

  <div id="modal-ficha">
    <div class="ficha-content" id="ficha-body"></div>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let fichasData = {};

    db.ref('fichas_pilotos').on('value', s => { 
        fichasData = s.val() || {}; 
        console.log("Fichas cargadas en memoria:", fichasData);
    });

    // ESCUCHA PISTA
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = `<div style="text-align:center; color:#444; margin-top:50px;">PISTA LIBRE</div>`;
        return;
      }
      let html = "";
      Object.keys(v.items).forEach(dorsal => {
        const item = v.items[dorsal];
        const dStr = String(dorsal).trim();
        html += `
          <div class="card-active" onclick="abrirFicha('${dStr}')">
            <div style="display:flex; justify-content:space-between;">
              <div class="dorsal">#${dStr}</div>
              <span class="coche-tag">${item.Coche || item.coche || "DRIFT"}</span>
            </div>
            <div class="nombre-pista">${item.Piloto || item.nombre || "Piloto"}</div>
            <div class="votos-box">
              <div style="text-align:center"><span class="voto-label">Pista</span><span class="voto-val">👏 ${item.ap || 0}</span></div>
              <div style="text-align:center"><span class="voto-label">Total</span><span class="voto-val" style="color:#00ff99;">🔥 ${(item.ap||0)+(item.h_ap||0)}</span></div>
            </div>
            <p style="text-align:center; color:#007bff; font-weight:bold; margin-top:10px; font-size:0.8em;">🔍 PULSA PARA VER BIOGRAFÍA</p>
          </div>`;
      });
      cont.innerHTML = html;
    });

    // RANKING
    db.ref('inscritos_drift').on('value', snap => {
      const data = snap.val();
      if (!data) return;
      let lista = Object.entries(data).map(([d, val]) => ({
        dorsal: d,
        nombre: val.Piloto || val.nombre || "Piloto",
        votos: (val.ap||0)+(val.h_ap||0)+(val.up||0)+(val.h_up||0)
      })).sort((a,b) => b.votos - a.votos);
      document.getElementById('ranking-body').innerHTML = lista.slice(0,10).map((p,i) => `
        <tr><td><b style="color:#ffcc00">${i+1}º</b></td><td><b style="color:#007bff;">#${p.dorsal}</b> ${p.nombre}</td><td style="text-align:right"><b>${p.votos}</b></td></tr>
      `).join('');
    });

    // FUNCIÓN FICHA (RESTAURADA TOTALMENTE)
    window.abrirFicha = (id) => {
      const f = fichasData[id];
      if (!f) { alert("Dorsal #" + id + " no encontrado. Asegúrate de haber subido el CSV de fichas."); return; }
      
      const val = (txt) => (txt && txt.toString().trim() !== "" && txt !== "undefined") ? txt : "---";

      document.getElementById('ficha-body').innerHTML = `
        <div style="text-align:center; border-bottom:2px solid #333; padding-bottom:15px; margin-bottom:15px;">
          <div style="font-size:4em; font-weight:900; color:#007bff; line-height:1;">#${id}</div>
          <div style="font-size:1.6em; font-weight:bold; text-transform:uppercase;">${val(f.nombre)}</div>
        </div>
        <span class="label-f">👤 Piloto</span>
        <p class="txt-f"><b>Edad:</b> ${val(f.edad)} años | <b>De:</b> ${val(f.residencia)}</p>
        <span class="label-f">🏎️ Vehículo</span>
        <p class="txt-f"><b>Modelo:</b> ${val(f.coche_modelo)}</p>
        <p class="txt-f"><b>Motor:</b> ${val(f.motor)} (${val(f.potencia)} CV)</p>
        <span class="label-f">🔧 Modificaciones</span>
        <p class="txt-f" style="font-size:0.95em; color:#bbb;">${val(f.mods)}</p>
        <span class="label-f">💡 Curiosidades</span>
        <p class="txt-f" style="color:#ffcc00; font-style:italic;">"${val(f.curiosidades)}"</p>
        <span class="label-f">🏆 Palmarés</span>
        <p class="txt-f">${val(f.palmares)}</p>
        <span class="label-f">📱 Instagram</span>
        <p class="txt-f" style="color:#007bff; font-weight:bold;">${val(f.ig)}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-ficha').style.display='none'">VOLVER AL PANEL</button>
      `;
      document.getElementById('modal-ficha').style.display = 'block';
    };

    // IMPORTADOR (AJUSTADO A TU CSV REAL)
    window.importarFichas = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep);
          if(!c[0] || c[0].trim() === "") continue;
          
          const d = c[0].trim();
          // Aseguramos que guardamos cada campo en su sitio
          nuevas[d] = {
            nombre: (c[1]||"").trim(),
            edad: (c[2]||"").trim(),
            residencia: (c[3]||"").trim(),
            coche_modelo: (c[4]||"").trim(),
            motor: (c[5]||"").trim(),
            potencia: (c[6]||"").trim(),
            mods: (c[7]||"").trim(),
            curiosidades: (c[8]||"").trim(),
            palmares: (c[9]||"").trim(),
            ig: (c[10]||"").trim()
          };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => {
            alert("✅ ¡Biografías cargadas! Pulsa ahora sobre un piloto en pista.");
        });
      };
      reader.readAsText(file, 'ISO-8859-1');
    };
  </script>
</body>
</html>
