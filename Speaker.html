<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --blue: #007bff; --yellow: #ffcc00; --bg: #000; --red: #ff0000; }
    
    body {
      background-color: var(--bg);
      background-image: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.92)), url('Fibra3.png');
      background-repeat: repeat;
      background-size: 420px; 
      background-attachment: fixed;
      color: #fff;
      font-family: 'Arial Black', Gadget, sans-serif;
      padding: 15px; 
      margin: 0;
    }
    
    .header { 
      text-align: center; 
      border-bottom: 3px solid var(--yellow);
      padding-bottom: 15px;
      margin-bottom: 20px;
      background: rgba(0,0,0,0.7);
      border-radius: 0 0 20px 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    
    .header-img {
      max-width: 280px;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 5px rgba(255, 204, 0, 0.5));
    }
    .event-title { color:var(--yellow); font-weight:900; text-transform:uppercase; margin-top:8px; }

    /* BANNER ESTADO DE PISTA */
    #banner-pista-live {
        width: 100%; max-width: 600px; margin: 0 auto 20px auto;
        padding: 15px; text-align: center; font-size: 1.2em; 
        font-weight: bold; border-radius: 15px; 
        display: none; text-transform: uppercase; border: 2px solid #fff;
        box-sizing: border-box;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
    
    #pista-container { 
      display: flex; 
      flex-direction: column; 
      gap: 25px; 
      max-width: 600px; 
      margin: 0 auto;
    }

    .card-active { 
      background: rgba(17, 17, 17, 0.98); 
      border: 4px solid var(--blue); 
      border-radius: 30px; 
      padding: 25px; 
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }
    
    .dorsal { font-size: 6em; font-weight: 900; color: var(--blue); line-height: 1; font-style: italic; margin: 0; }
    .car-photo { width:100%; aspect-ratio:16/9; object-fit:contain; background:#000; border-radius:18px; border:1px solid #333; margin-bottom:12px; display:block; }
    .coche-tag { background: var(--blue); color: #fff; padding: 8px 20px; border-radius: 10px; font-size: 1.2em; font-weight: bold; text-transform: uppercase; margin: 15px 0; display: inline-block; }
    .nombre-pista { font-size: 2em; font-weight: bold; text-transform: uppercase; margin: 5px 0; color: #fff; line-height: 1.1; }

    .votos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
    .v-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid #333; }
    .v-val { font-size: 2.5em; font-weight: bold; display: block; color: #fff; }
    .v-lab { font-size: 0.7em; color: #888; text-transform: uppercase; margin-top: 5px; display: block; }

    .btn-info { background: var(--yellow); color: #000; border: none; width: 100%; padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.2em; cursor: pointer; text-transform: uppercase; margin-top: 25px; }

    #modal-bio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; overflow-y: auto; }
    .bio-card { background: #111; border: 2px solid var(--yellow); border-radius: 30px; padding: 25px; max-width: 500px; margin: 50px auto; text-align: left; }
    .btn-cerrar { background: #333; color: #fff; border: none; width: 100%; padding: 15px; border-radius: 15px; margin-top: 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
    
    .admin-csv { margin-top: 28px; text-align: center; opacity: 0.95; padding: 18px; border-top: 1px solid #333; background: rgba(0,0,0,0.7); border-radius: 20px 20px 0 0; max-width:600px; margin-left:auto; margin-right:auto; }
    #contador-fichas { font-size: 0.75em; color: var(--yellow); margin-top: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    #lista-pilotos-evento { margin-top:12px; display:grid; gap:6px; text-align:left; font-family:Arial, sans-serif; }
    .speaker-piloto-row { display:flex; justify-content:space-between; gap:10px; background:#090909; border:1px solid #252525; border-radius:8px; padding:8px 10px; font-size:.82rem; }
    .speaker-piloto-row b { color:var(--yellow); }
  </style>
</head>
<body>

  <div class="header">
    <img src="logo.png" alt="Speaker Pro" class="header-img">
    <div id="event-title" class="event-title"></div>
  </div>

  <div id="banner-pista-live">CARGANDO ESTADO...</div>

  <div id="pista-container">
    <div style="text-align:center; padding:50px; color:#555; font-size:1.2em;">CONECTANDO CON PISTA...</div>
  </div>

  <div class="admin-csv">
    <span id="contador-fichas">Sistema: 0 fichas cargadas</span>
    <div id="lista-pilotos-evento"></div>
  </div>

  <div id="modal-bio"><div class="bio-card" id="bio-body"></div></div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let cacheFichas = {};
    let votacionActual = null;
    let taxiActivos = [];
    let acumuladoVotos = {};

    db.ref('config_evento').on('value', s => {
      const cfg = s.val() || {};
      document.getElementById('event-title').innerText = cfg.nombre || "";
    });

    // 1. ESCUCHAR ESTADO DE PISTA (BANNER)
    const banner = document.getElementById('banner-pista-live');
    db.ref('estado_pista').on('value', s => {
        const est = s.val();
        if(est && est.mensaje) {
            banner.style.display = 'block';
            banner.innerText = est.mensaje;
            banner.style.backgroundColor = est.color || '#333';
            if(est.id === 'btn-acc' || est.id === 'btn-obs') {
                banner.style.animation = "blink 1s infinite";
            } else {
                banner.style.animation = "none";
            }
        }
    });

    // 2. ESCUCHAR FICHAS TÉCNICAS
    db.ref('fichas_pilotos').on('value', s => { 
      cacheFichas = s.val() || {}; 
      const total = Object.keys(cacheFichas).length;
      document.getElementById('contador-fichas').innerText = `Sistema: ${total} fichas cargadas`;
    });

    db.ref('pilotos_evento').on('value', s => {
      const data = s.val() || {};
      if(!Object.keys(data).length) return;
      cacheFichas = {};
      Object.values(data).forEach(p => {
        const dorsal = normalizarDorsal(p.dorsal);
        if(!dorsal) return;
        cacheFichas[dorsal] = {
          nombre: p.piloto || "",
          motor: p.motor || "",
          potencia: p.potencia || "",
          foto: p.foto || "",
          mods: p.modificaciones || "",
          curiosidades: p.curiosidades || "",
          palmares: p.palmares || "",
          ig: p.instagram || ""
        };
      });
      document.getElementById('contador-fichas').innerText = `Sistema: ${Object.keys(cacheFichas).length} fichas cargadas`;
      renderListaPilotosEvento(data);
    });

    function renderListaPilotosEvento(data) {
      const cont = document.getElementById('lista-pilotos-evento');
      const rows = Object.values(data || {})
        .filter(p => p && p.activoShow !== false)
        .sort((a,b) => Number(a.dorsal) - Number(b.dorsal))
        .map(p => `<div class="speaker-piloto-row"><span><b>#${escHtml(p.dorsal || '')}</b> ${escHtml(p.alias || p.piloto || '')}</span><span>${escHtml(p.vehiculo || p.coche || '')}</span></div>`)
        .join('');
      cont.innerHTML = rows || '<div style="color:#777">Sin pilotos activos cargados.</div>';
    }

    // 3. ESCUCHAR PILOTOS EN PISTA (MULTITARJETA)
    db.ref('votacion_activa').on('value', snap => {
      votacionActual = snap.val();
      renderPista();
    });

    db.ref('copilotajes/completados').on('value', snap => {
      taxiActivos = Object.entries(snap.val() || {})
        .filter(([id, item]) => item && !item.finalizado)
        .sort((a,b) => (a[1].tsEntrada || 0) - (b[1].tsEntrada || 0))
        .map(([id, item]) => ({ id, ...item }));
      renderPista();
    });

    db.ref('historial_votos').on('value', snap => {
      acumuladoVotos = {};
      Object.values(snap.val() || {}).forEach(v => {
        const d = String(v.dorsal || "");
        if(!d) return;
        if(!acumuladoVotos[d]) acumuladoVotos[d] = { ap:0, up:0, dw:0 };
        acumuladoVotos[d].ap += parseInt(v.ap) || 0;
        acumuladoVotos[d].up += parseInt(v.up) || 0;
        acumuladoVotos[d].dw += parseInt(v.dw) || 0;
      });
      renderPista();
    });

    function renderPista() {
      const cont = document.getElementById('pista-container');
      cont.innerHTML = "";

      const v = votacionActual;
      if (v && v.activa !== false && v.items) {
        Object.keys(v.items).forEach(id => {
          if (id.toUpperCase() === "BATALLA") return;
          crearCardPista(cont, id, v.items[id], true);
        });
        return;
      }

      if (taxiActivos.length) {
        taxiActivos.forEach(item => {
          const id = extraerDorsal(item.piloto) || item.nPapel || "?";
          crearCardPista(cont, id, {
            nombre: `${limpiarPiloto(item.piloto)} & ${item.copiloto || ""}`,
            coche: "TAXI DRIFT",
            ap: 0, up: 0, dw: 0, h_ap: 0, h_up: 0, h_dw: 0
          }, false);
        });
        return;
      }

      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = '<div style="text-align:center; color:#555; padding:60px; font-size:1.8em; font-style:italic;">PISTA LIBRE</div>';
        return;
      }
    }

    function crearCardPista(cont, id, p, mostrarFicha) {
      const liveAp = parseInt(p.ap) || 0;
      const liveUp = parseInt(p.up) || 0;
      const liveDw = parseInt(p.dw) || 0;
      const hist = acumuladoVotos[id] || {};
      const accAp = (parseInt(p.h_ap) || 0) + (parseInt(hist.ap) || 0);
      const accUp = (parseInt(p.h_up) || 0) + (parseInt(hist.up) || 0);
      const accDw = (parseInt(p.h_dw) || 0) + (parseInt(hist.dw) || 0);
      const totalAp = liveAp + accAp;
      const totalUp = liveUp + accUp;
      const totalDw = liveDw + accDw;
      const card = document.createElement('div');
      card.className = "card-active";
      const detalles = [p.coche, p.motor, p.potencia ? `${p.potencia} CV` : ""].filter(Boolean).join(" · ");
      card.innerHTML = `
        ${p.foto ? `<img class="car-photo" src="${escHtml(p.foto)}" alt="">` : `<div class="dorsal">#${id}</div>`}
        <div class="coche-tag">${detalles || p.coche || "TAXI DRIFT"}</div>
        <div class="nombre-pista">${p.nombre || "PILOTO"}</div>
        <div class="votos-grid">
          <div class="v-box">
            <span class="v-val" style="color:var(--yellow);">${liveAp}</span>
            <span class="v-lab">👏 AHORA</span>
            <span class="v-lab">TOTAL ${totalAp}</span>
          </div>
          <div class="v-box">
            <span class="v-val" style="color:var(--blue);">${liveUp}</span>
            <span class="v-lab">👍 AHORA</span>
            <span class="v-lab">TOTAL ${totalUp}</span>
          </div>
          <div class="v-box">
            <span class="v-val" style="color:#ff4d4d;">${liveDw}</span>
            <span class="v-lab">👎 AHORA</span>
            <span class="v-lab">TOTAL ${totalDw}</span>
          </div>
        </div>
        ${mostrarFicha ? `<button class="btn-info" onclick="verFicha('${id}')">🔎 INFO MOTOR</button>` : ''}
      `;
      cont.appendChild(card);
    }

    function extraerDorsal(piloto) {
      const txt = String(piloto || "");
      const match = txt.match(/\[#(\d+)\]/) || txt.match(/^(\d+)/);
      return match ? match[1] : "";
    }

    function limpiarPiloto(piloto) {
      return String(piloto || "").split('|')[0].replace(/\[.*?\]/g,'').trim();
    }

    function normalizarTexto(v){
      return String(v || "").replace(/^\uFEFF/, "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    function normalizarDorsal(v){
      const s = String(v || "").trim().replace(/^#/, "");
      return /^\d+$/.test(s) ? String(parseInt(s, 10)) : normalizarTexto(s);
    }

    function escHtml(v){
      return String(v || "").replace(/[&<>"']/g, c => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c]));
    }

    function textoFicha(t){
      const raw = String(t || "").trim();
      if(!raw || raw === "undefined") return "---";
      const parts = raw
        .replace(/\r/g, "\n")
        .split(/\n+| · | • |; /)
        .map(x => x.trim())
        .filter(Boolean);
      if(parts.length <= 1) return escHtml(raw).replace(/\n/g, "<br>");
      return "<ul style='margin:8px 0 0 20px; padding:0;'>" + parts.map(x => "<li>" + escHtml(x) + "</li>").join("") + "</ul>";
    }

    function parseCSVLine(line, sep){
      const out = [];
      let cur = "", inside = false;
      for(let i = 0; i < line.length; i++){
        const ch = line[i];
        if(ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if(ch === '"') inside = !inside;
        else if(ch === sep && !inside) { out.push(cur.trim()); cur = ""; }
        else cur += ch;
      }
      out.push(cur.trim());
      return out.map(x => x.replace(/^"(.*)"$/, "$1").replace(/""/g, '"'));
    }

    function campo(row, names){
      for(const name of names){
        const key = normalizarTexto(name).replace(/[^a-z0-9]/g, "");
        const found = Object.keys(row).find(k => k.replace(/[^a-z0-9]/g, "") === key);
        if(found && row[found]) return row[found];
      }
      return "";
    }

    // 4. MOSTRAR INFO TÉCNICA
    window.verFicha = (id) => {
      const f = cacheFichas[id];
      if (!f) return alert("No hay ficha técnica para el dorsal #" + id + ". Sube el CSV.");
      const cl = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";
      
      document.getElementById('bio-body').innerHTML = `
        <h2 style="color:var(--blue); font-size:3em; margin:0; font-style:italic;">#${id}</h2>
        <h3 style="text-transform:uppercase; margin-bottom:20px;">${escHtml(cl(f.nombre))}</h3>
        <p><b>MOTOR:</b> <span style="color:#00ff99">${escHtml(cl(f.motor))}</span></p>
        <p><b>POTENCIA:</b> ${escHtml(cl(f.potencia))} CV</p>
        <p><b>MODS:</b><br><small>${textoFicha(f.mods)}</small></p>
        <p style="color:var(--yellow);"><b>CURIOSIDADES:</b><br><small>${textoFicha(f.curiosidades)}</small></p>
        <p><b>PALMARÉS:</b><br><small>${textoFicha(f.palmares)}</small></p>
        <p style="font-size:1.2em; color:var(--blue);">IG: ${escHtml(cl(f.ig))}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-bio').style.display='none'">CERRAR</button>
      `;
      document.getElementById('modal-bio').style.display = 'block';
    };

    // 5. IMPORTAR CSV
    window.importarCSV = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        const header = parseCSVLine(lines[0], sep).map(h => normalizarTexto(h));
        for(let i=1; i<lines.length; i++){
          const c = parseCSVLine(lines[i], sep);
          const row = {};
          header.forEach((h, idx) => row[h] = c[idx] || "");
          const dorsal = normalizarDorsal(campo(row, ["Dorsal"]));
          if(!dorsal) continue;
          nuevas[dorsal] = { 
              nombre: campo(row, ["Piloto", "Nombre", "Nombre+Apellidos"]),
              motor: campo(row, ["Motor"]),
              potencia: campo(row, ["PotenciaCV", "Potencia", "Potencia (CV)"]),
              mods: campo(row, ["Modificaciones", "Mods"]),
              curiosidades: campo(row, ["Curiosidades"]),
              palmares: campo(row, ["Palmares", "Palmarés"]),
              ig: campo(row, ["Instagram", "IG"])
          };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("Fichas actualizadas correctamente"));
      };
      reader.readAsText(e.target.files[0], 'ISO-8859-1');
    };
  </script>
</body>
</html>
