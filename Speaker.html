<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  <style>
    body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; padding-bottom: 100px; }
    .title { color: #ffcc00; text-align: center; text-transform: uppercase; font-size: 1.4em; border-bottom: 3px solid #ffcc00; padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 2px; }
    
    /* CARD COCHE EN PISTA */
    .card-active { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 3px solid #007bff; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 0 30px rgba(0, 123, 255, 0.4); cursor: pointer; transition: transform 0.2s; }
    .card-active:active { transform: scale(0.98); }
    
    .header-card { display: flex; justify-content: space-between; align-items: flex-start; }
    .dorsal { font-size: 5em; font-weight: 900; color: #007bff; line-height: 0.8; }
    .coche-tag { background: #007bff; color: white; padding: 6px 15px; border-radius: 8px; font-size: 0.9em; font-weight: bold; text-transform: uppercase; }
    .nombre-pista { font-size: 2.2em; font-weight: bold; margin: 15px 0 10px 0; text-transform: uppercase; color: #fff; border-left: 5px solid #ffcc00; padding-left: 12px; }

    .votos-box { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); margin-top: 20px; padding: 20px; border-radius: 15px; border: 1px solid #333; }
    .voto-val { font-size: 2.5em; font-weight: bold; color: #ffcc00; display: block; line-height: 1; }
    .voto-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

    /* RANKING */
    .ranking-panel { background: #111; border: 1px solid #333; border-radius: 20px; padding: 20px; margin-top: 30px; }
    .ranking-table { width: 100%; border-collapse: collapse; }
    .ranking-table td { padding: 15px 10px; border-bottom: 1px solid #222; }
    .pos-num { color: #ffcc00; font-weight: bold; font-size: 1.2em; width: 40px; }

    /* MODAL BIOGRAFÍA COMPLETA */
    #modal-ficha { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
    .ficha-content { background: #111; border: 2px solid #ffcc00; border-radius: 25px; padding: 35px; max-width: 600px; margin: 0 auto; box-shadow: 0 0 60px rgba(255,204,0,0.2); }
    .ficha-header { text-align: center; border-bottom: 2px solid #333; margin-bottom: 25px; padding-bottom: 20px; }
    .label-f { color: #ffcc00; font-size: 0.85em; text-transform: uppercase; font-weight: bold; margin-top: 20px; display: block; border-left: 4px solid #ffcc00; padding-left: 10px; }
    .txt-f { font-size: 1.3em; color: #eee; margin: 8px 0; line-height: 1.4; }
    .btn-cerrar { background: #ffcc00; color: #000; border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; margin-top: 35px; cursor: pointer; font-size: 1.2em; text-transform: uppercase; }
    
    .admin-zone { margin-top: 50px; padding: 25px; border: 2px dashed #444; border-radius: 20px; text-align: center; background: #0a0a0a; }
    .btn-csv { background: #333; color: #fff; border: 1px solid #555; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 1em; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <div class="title">🎤 SPEAKER DASHBOARD - TORREDEMBARRA</div>

  <div id="pista-container">
    <div style="text-align:center; color:#444; margin-top:80px; font-style:italic;">ESPERANDO COCHE EN PISTA...</div>
  </div>

  <div class="ranking-panel">
    <div style="text-align:center; color:#ffcc00; font-weight:bold; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px;">🏆 TOP APOYO PÚBLICO</div>
    <table class="ranking-table">
      <tbody id="ranking-body"></tbody>
    </table>
  </div>

  <div class="admin-zone">
    <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="importarFichas(event)">
    <button class="btn-csv" onclick="document.getElementById('csv-file').click()">📂 ACTUALIZAR BIOGRAFÍAS (.CSV)</button>
    <div id="status-carga" style="font-size:0.8em; margin-top:12px; color:#666;"></div>
  </div>

  <div id="modal-ficha">
    <div class="ficha-content" id="ficha-body"></div>
  </div>

  <script>
    const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localFichas = {};

    // Sincronizar Fichas
    db.ref('fichas_pilotos').on('value', snap => {
      localFichas = snap.val() || {};
      document.getElementById('status-carga').innerText = Object.keys(localFichas).length + " biografías cargadas.";
    });

    // Escuchar Master (Pista)
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = `<div style="text-align:center; color:#333; margin-top:80px; border:2px dashed #111; padding:40px; border-radius:25px;">PISTA LIBRE</div>`;
        return;
      }
      let html = "";
      Object.keys(v.items).forEach(dorsal => {
        const item = v.items[dorsal];
        const dStr = String(dorsal).trim();
        html += `
          <div class="card-active" onclick="abrirFicha('${dStr}')">
            <div class="header-card">
              <div class="dorsal">#${dStr}</div>
              <span class="coche-tag">${item.Coche || item.coche || "DRIFT"}</span>
            </div>
            <div class="nombre-pista">${item.Piloto || item.nombre || "Piloto"}</div>
            <div class="votos-box">
              <div style="text-align:center">
                <span class="voto-label">Pista</span>
                <span class="voto-val">👏 ${item.ap || 0}</span>
              </div>
              <div style="text-align:center">
                <span class="voto-label">Total</span>
                <span class="voto-val" style="color:#00ff99;">🔥 ${(item.ap||0)+(item.h_ap||0)}</span>
              </div>
            </div>
            <p style="text-align:center; color:#007bff; font-weight:bold; margin-top:20px; font-size:0.9em; letter-spacing:1px;">🔍 TOCAR PARA VER BIOGRAFÍA</p>
          </div>`;
      });
      cont.innerHTML = html;
    });

    // Ranking en vivo
    db.ref('inscritos_drift').on('value', snap => {
      const data = snap.val();
      if (!data) return;
      let lista = Object.entries(data).map(([d, val]) => ({
        d: d,
        n: val.Piloto || val.nombre || "Piloto",
        v: (val.ap||0)+(val.h_ap||0)+(val.up||0)+(val.h_up||0)
      })).sort((a,b) => b.v - a.v);
      document.getElementById('ranking-body').innerHTML = lista.slice(0,10).map((p,i) => `
        <tr><td class="pos-num">${i+1}º</td><td><b style="color:#007bff;">#${p.d}</b> ${p.n}</td><td style="text-align:right"><b>${p.v}</b></td></tr>
      `).join('');
    });

    // MOSTRAR FICHA (CORRECCIÓN DE COLUMNAS)
    window.abrirFicha = (id) => {
      const f = localFichas[id];
      if (!f) { alert("Dorsal #" + id + " no encontrado. Carga el CSV de Fichas."); return; }
      
      const clean = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";

      document.getElementById('ficha-body').innerHTML = `
        <div class="ficha-header">
          <div style="font-size:4.5em; font-weight:900; color:#007bff; line-height:1;">#${id}</div>
          <div style="font-size:1.8em; font-weight:bold; text-transform:uppercase; color:#fff; margin-top:10px;">${clean(f.nombre)}</div>
        </div>
        <span class="label-f">👤 Perfil Piloto</span>
        <p class="txt-f"><b>Edad:</b> ${clean(f.edad)} años</p>
        <p class="txt-f"><b>Ciudad:</b> ${clean(f.residencia)}</p>
        <span class="label-f">🏎️ Vehículo</span>
        <p class="txt-f"><b>Modelo:</b> ${clean(f.coche_modelo)}</p>
        <p class="txt-f"><b>Motor:</b> ${clean(f.motor)} | <b>Potencia:</b> ${clean(f.potencia)} CV</p>
        <span class="label-f">🔧 Modificaciones</span>
        <p class="txt-f" style="font-size:1.1em; color:#bbb;">${clean(f.mods)}</p>
        <span class="label-f">💡 Curiosidades</span>
        <p class="txt-f" style="color:#ffcc00; font-style:italic;">"${clean(f.curiosidades)}"</p>
        <span class="label-f">🏆 Palmarés</span>
        <p class="txt-f">${clean(f.palmares)}</p>
        <span class="label-f">📱 Instagram</span>
        <p class="txt-f" style="color:#007bff; font-weight:bold; font-size:1.4em;">${clean(f.ig)}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-ficha').style.display='none'">CERRAR BIOGRAFÍA</button>
      `;
      document.getElementById('modal-ficha').style.display = 'block';
    };

    // IMPORTADOR CSV (EXTREMADAMENTE PRECISO)
    window.importarFichas = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep);
          if(!c[0] || c[0].trim() === "") continue;
          
          const d = c[0].trim();
          // Mapeo 1 a 1 siguiendo tu CSV de Torredembarra
          nuevas[d] = {
            nombre:       (c[1]  || "").trim(),
            edad:         (c[2]  || "").trim(),
            residencia:   (c[3]  || "").trim(),
            coche_modelo: (c[4]  || "").trim(),
            motor:        (c[5]  || "").trim(),
            potencia:     (c[6]  || "").trim(),
            mods:         (c[7]  || "").trim(),
            curiosidades: (c[8]  || "").trim(),
            palmares:     (c[9]  || "").trim(),
            ig:           (c[10] || "").trim()
          };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("✅ Biografías actualizadas."));
      };
      reader.readAsText(file, 'ISO-8859-1');
    };
  </script>
</body>
</html>
