<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPEAKER PRO</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --blue: #007bff; --yellow: #ffcc00; --bg: #000; }
    body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; }
    
    .header { text-align: center; border-bottom: 2px solid var(--yellow); padding-bottom: 10px; margin-bottom: 15px; }
    .header h1 { font-size: 1.1em; color: var(--yellow); text-transform: uppercase; margin: 0; }
    
    #pista-container { display: flex; flex-direction: column; gap: 20px; }

    .card-active { background: #111; border: 4px solid var(--blue); border-radius: 30px; padding: 25px; text-align: center; }
    .dorsal { font-size: 6em; font-weight: 900; color: var(--blue); line-height: 1; font-style: italic; margin: 0; }
    .coche-tag { background: var(--blue); color: #fff; padding: 8px 20px; border-radius: 10px; font-size: 1.2em; font-weight: bold; text-transform: uppercase; margin: 15px 0; display: inline-block; }
    .nombre-pista { font-size: 2em; font-weight: bold; text-transform: uppercase; margin: 5px 0; color: #fff; }

    .votos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .v-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid #333; }
    .v-val { font-size: 2.5em; font-weight: bold; display: block; color: #fff; }
    .v-lab { font-size: 0.7em; color: #888; text-transform: uppercase; margin-top: 5px; display: block; }

    .btn-info { background: var(--yellow); color: #000; border: none; width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 1.2em; cursor: pointer; text-transform: uppercase; margin-top: 25px; }

    #modal-bio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; overflow-y: auto; }
    .bio-card { background: #111; border: 2px solid var(--yellow); border-radius: 30px; padding: 25px; max-width: 500px; margin: 0 auto; text-align: left; }
    .btn-cerrar { background: #333; color: #fff; border: none; width: 100%; padding: 15px; border-radius: 15px; margin-top: 25px; cursor: pointer; width: 100%; font-weight: bold; }
    
    /* ZONA DE CARGA DISCRETA */
    .admin-csv { margin-top: 50px; text-align: center; opacity: 0.6; padding: 20px; border-top: 1px solid #222; }
    #contador-fichas { font-size: 0.7em; color: #555; margin-top: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎤 PANEL SPEAKER</h1>
  </div>

  <div id="pista-container">
    <div style="text-align:center; padding:50px; color:#444;">CONECTANDO...</div>
  </div>

  <div class="admin-csv">
    <input type="file" id="csv-file" style="display:none;" onchange="importarCSV(event)">
    <button onclick="document.getElementById('csv-file').click()" style="padding:10px 20px; border-radius:10px; cursor:pointer; background:#1a1a1a; color:#777; border:1px solid #333; font-size: 0.8em;">📂 ACTUALIZAR CSV</button>
    <span id="contador-fichas">Sistema: 0 fichas cargadas</span>
  </div>

  <div id="modal-bio"><div class="bio-card" id="bio-body"></div></div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let cacheFichas = {};

    db.ref('fichas_pilotos').on('value', s => { 
      cacheFichas = s.val() || {}; 
      const total = Object.keys(cacheFichas).length;
      document.getElementById('contador-fichas').innerText = `Sistema: ${total} fichas cargadas`;
    });

    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      cont.innerHTML = "";

      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = '<div style="text-align:center; color:#222; padding:50px;">PISTA LIBRE</div>';
        return;
      }

      Object.keys(v.items).forEach(id => {
        if (id.toUpperCase() === "BATALLA") return;

        const p = v.items[id];
        const tAp = (parseInt(p.ap) || 0) + (parseInt(p.h_ap) || 0);
        const tUp = (parseInt(p.up) || 0) + (parseInt(p.h_up) || 0);
        
        const card = document.createElement('div');
        card.className = "card-active";
        card.innerHTML = `
          <div class="dorsal">#${id}</div>
          <div class="coche-tag">${p.Coche || p.coche || "DRIFT"}</div>
          <div class="nombre-pista">${p.Piloto || p.nombre || "PILOTO"}</div>
          <div class="votos-grid">
            <div class="v-box"> <span class="v-val" style="color:var(--yellow);">${tAp}</span> <span class="v-lab">👏 APLAUSOS</span> </div>
            <div class="v-box"> <span class="v-val" style="color:var(--blue);">${tUp}</span> <span class="v-lab">👍 LIKES</span> </div>
          </div>
          <button class="btn-info" onclick="verFicha('${id}')">🔎 INFO MOTOR</button>
        `;
        cont.appendChild(card);
      });
    });

    window.verFicha = (id) => {
      const f = cacheFichas[id];
      if (!f) return alert("Sube el CSV para ver info de #" + id);
      const cl = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";
      document.getElementById('bio-body').innerHTML = `
        <h2 style="color:var(--blue); font-size:3em; margin:0; font-style:italic;">#${id}</h2>
        <h3 style="text-transform:uppercase; margin-bottom:20px;">${cl(f.nombre)}</h3>
        <p><b>MOTOR:</b> <span style="color:#00ff99">${cl(f.motor)}</span></p>
        <p><b>POTENCIA:</b> ${cl(f.potencia)} CV</p>
        <p><b>MODS:</b> <small>${cl(f.mods)}</small></p>
        <p style="color:var(--yellow);"><i>"${cl(f.curiosidades)}"</i></p>
        <p style="font-size:1.2em; color:var(--blue);">IG: ${cl(f.ig)}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-bio').style.display='none'">CERRAR</button>
      `;
      document.getElementById('modal-bio').style.display = 'block';
    };

    window.importarCSV = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep).map(x => x.trim());
          if(!c[0]) continue;
          nuevas[c[0]] = { nombre:c[1], edad:c[2], residencia:c[3], coche_modelo:c[4], motor:c[5], potencia:c[6], mods:c[7], curiosidades:c[8], ig:c[10] };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("CSV Cargado"));
      };
      reader.readAsText(e.target.files[0], 'ISO-8859-1');
    };
  </script>
</body>
</html>
