<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
    .title { color: #ffcc00; text-align: center; text-transform: uppercase; font-size: 1.2em; margin-bottom: 20px; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
    
    /* COCHE ACTIVO */
    .card-speaker { background: #111; border: 3px solid #007bff; border-radius: 15px; padding: 20px; margin-bottom: 15px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 123, 255, 0.2); }
    .dorsal { font-size: 4em; font-weight: bold; color: #007bff; line-height: 1; }
    .nombre { font-size: 1.8em; font-weight: bold; margin: 10px 0; text-transform: uppercase; color: #fff; }
    .coche-tag { background: #007bff; color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.9em; font-weight: bold; }

    .votos-box { display: flex; justify-content: space-around; background: #222; margin-top: 15px; padding: 15px; border-radius: 10px; border: 1px solid #444; }
    .voto-val { font-size: 2em; font-weight: bold; color: #ffcc00; display: block; }
    .voto-label { font-size: 0.7em; color: #888; text-transform: uppercase; }

    /* RANKING */
    .ranking-panel { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-top: 20px; }
    .ranking-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
    .ranking-table th { text-align: left; color: #ffcc00; border-bottom: 1px solid #333; padding: 8px; font-size: 0.7em; }
    .ranking-table td { padding: 8px; border-bottom: 1px solid #222; }
    .votos-total-num { color: #00ff99; font-weight: bold; }

    /* MODAL */
    #modal-ficha { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
    .ficha-content { background: #111; border: 2px solid #ffcc00; border-radius: 20px; padding: 25px; max-width: 500px; margin: 0 auto; }
    .ficha-label { color: #ffcc00; font-size: 0.8em; text-transform: uppercase; font-weight: bold; margin-top: 15px; }
    .ficha-txt { font-size: 1.1em; color: #eee; line-height: 1.4; }
    .btn-cerrar { background: #ffcc00; color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; }

    .admin-panel { background: #111; border: 1px dashed #444; padding: 15px; margin-top: 30px; border-radius: 10px; text-align: center; }
    .btn-upload { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 8px; width: 100%; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <div class="title">🎤 SPEAKER - DRIFT SHOW</div>

  <div id="pista-container">
    <div style="text-align:center; color:#666; margin-top:40px;">ESPERANDO COCHE EN PISTA...</div>
  </div>

  <div class="ranking-panel">
    <div style="text-align: center; color: #ffcc00; font-size: 0.8em; font-weight: bold;">🏆 RANKING DE APOYO</div>
    <table class="ranking-table">
      <thead>
        <tr><th>Pos</th><th>Piloto</th><th style="text-align:right">Votos</th></tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>

  <div class="admin-panel">
    <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="importarFichas(event)">
    <button class="btn-upload" onclick="document.getElementById('csv-file').click()">📂 CARGAR FICHAS TÉCNICAS (.CSV)</button>
    <div id="status-carga" style="font-size:0.7em; margin-top:5px; color:#666;"></div>
  </div>

  <div id="modal-ficha">
    <div class="ficha-content" id="ficha-body"></div>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    let fichasData = {};

    // 1. Cargar Fichas
    db.ref('fichas_pilotos').on('value', s => { 
      fichasData = s.val() || {}; 
      document.getElementById('status-carga').innerText = Object.keys(fichasData).length + " fichas listas.";
    });

    // 2. ESCUCHA DE PISTA (CORREGIDA)
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      
      // Si no hay nada activo o no hay items, limpiar pantalla
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = `<div style="text-align:center; color:#666; margin-top:40px; border:1px dashed #333; padding:20px; border-radius:15px;">PISTA LIBRE</div>`;
        return;
      }

      let html = "";
      // Usamos Object.keys para asegurar que leemos los dorsales correctamente
      Object.keys(v.items).forEach(dorsal => {
        const data = v.items[dorsal];
        const dStr = String(dorsal).trim();
        
        // Buscamos el nombre: puede venir como 'nombre' o 'Piloto' según el CSV del Master
        const nombrePiloto = data.nombre || data.Piloto || "Piloto #" + dStr;
        const nombreCoche = data.coche || data.Coche || "DRIFT CAR";

        html += `
          <div class="card-speaker" onclick="abrirFicha('${dStr}')">
            <div style="display:flex; justify-content:space-between; align-items:start;">
              <div class="dorsal">#${dStr}</div>
              <span class="coche-tag">${nombreCoche}</span>
            </div>
            <div class="nombre">${nombrePiloto}</div>
            <div class="votos-box">
              <div style="text-align:center">
                <span class="voto-label">En directo</span>
                <span class="voto-val">👏 ${data.ap || 0}</span>
              </div>
              <div style="text-align:center">
                <span class="voto-label">Total Evento</span>
                <span class="voto-val" style="color:#00ff99;">🔥 ${(data.ap||0)+(data.h_ap||0)}</span>
              </div>
            </div>
            <p style="text-align:center; color:#007bff; font-weight:bold; margin-top:10px; font-size:0.8em;">🔍 VER BIOGRAFÍA</p>
          </div>`;
      });
      cont.innerHTML = html;
    });

    // 3. Ranking
    db.ref('inscritos_drift').on('value', snap => {
      const inscritos = snap.val();
      if (!inscritos) return;
      let lista = Object.entries(inscritos).map(([d, dta]) => {
        const t = (dta.ap||0)+(dta.h_ap||0)+(dta.up||0)+(dta.h_up||0);
        return { dorsal: d, nombre: dta.nombre || dta.Piloto || "Piloto", total: t };
      });
      lista.sort((a, b) => b.total - a.total);
      document.getElementById('ranking-body').innerHTML = lista.slice(0, 10).map((p, i) => `
        <tr>
          <td style="color:#ffcc00;">${i+1}º</td>
          <td><b style="color:#007bff;">#${p.dorsal}</b> ${p.nombre}</td>
          <td style="text-align:right" class="votos-total-num">${p.total}</td>
        </tr>
      `).join('');
    });

    // 4. Modal Ficha
    window.abrirFicha = (id) => {
      const f = fichasData[id];
      if(!f) { alert("No hay ficha para el #" + id); return; }
      document.getElementById('ficha-body').innerHTML = `
        <div style="text-align:center; border-bottom:1px solid #333; padding-bottom:10px;">
          <div style="font-size:3em; font-weight:bold; color:#007bff;">#${id}</div>
          <div style="font-size:1.5em; font-weight:bold; text-transform:uppercase;">${f.nombre}</div>
        </div>
        <div class="ficha-label">👤 PILOTO</div>
        <div class="ficha-txt">${f.edad} años | ${f.residencia}</div>
        <div class="ficha-label">🏎️ COCHE</div>
        <div class="ficha-txt"><b>${f.coche_modelo}</b> (${f.potencia} CV)</div>
        <div class="ficha-txt" style="font-size:0.9em; color:#999; margin-top:5px;">${f.mods}</div>
        <div class="ficha-label">💡 CURIOSIDAD</div>
        <div class="ficha-txt" style="color:#ffcc00;">"${f.curiosidades}"</div>
        <div class="ficha-label">🏆 PALMARÉS</div>
        <div class="ficha-txt">${f.palmares}</div>
        <div class="ficha-label">📱 INSTAGRAM</div>
        <div class="ficha-txt" style="color:#007bff;">${f.ig}</div>
        <button class="btn-cerrar" onclick="document.getElementById('modal-ficha').style.display='none'">CERRAR</button>
      `;
      document.getElementById('modal-ficha').style.display = 'block';
    }

    // 5. Importar
    window.importarFichas = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep);
          if(!c[0]) continue;
          const d = c[0].trim();
          nuevas[d] = {
            nombre: c[1], edad: c[2], residencia: c[3], coche_modelo: c[4],
            motor: c[5], potencia: c[6], mods: c[7], curiosidades: c[8],
            palmares: c[9], ig: c[10]
          };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("Fichas cargadas"));
      };
      reader.readAsText(file, 'ISO-8859-1');
    }
  </script>
</body>
</html>
