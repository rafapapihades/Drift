<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --blue: #007bff; --yellow: #ffcc00; --bg: #000; --card: #111; }
    body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; }
    
    .header { text-align: center; border-bottom: 2px solid var(--yellow); padding-bottom: 10px; margin-bottom: 20px; }
    .header h1 { font-size: 1.1em; color: var(--yellow); text-transform: uppercase; margin: 0; }

    /* TARJETA PISTA - DISEÑO VERTICAL */
    .card-active { 
      background: var(--card); 
      border: 3px solid var(--blue); 
      border-radius: 25px; 
      padding: 20px; 
      margin-bottom: 20px; 
      text-align: center; /* Centramos todo */
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .dorsal { 
      font-size: 6em; 
      font-weight: 900; 
      color: var(--blue); 
      line-height: 1; 
      font-style: italic;
      margin: 0;
    }

    .coche-tag { 
      background: var(--blue); 
      color: #fff; 
      padding: 5px 15px; 
      border-radius: 8px; 
      font-size: 1.2em; 
      font-weight: bold; 
      text-transform: uppercase;
      margin: 10px 0; /* Espacio arriba y abajo del dorsal */
      display: inline-block;
    }

    .nombre-pista { 
      font-size: 2em; 
      font-weight: bold; 
      text-transform: uppercase; 
      margin: 10px 0; 
      color: #fff; 
      line-height: 1.1;
    }

    /* VOTOS */
    .votos-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 15px; 
      width: 100%; 
      margin-top: 20px; 
    }
    .v-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #333; }
    .v-val { font-size: 2.5em; font-weight: bold; display: block; }
    .v-lab { font-size: 0.7em; color: #888; text-transform: uppercase; margin-top: 5px; display: block; }

    /* BOTÓN INFO */
    .btn-info-piloto { 
      background: var(--yellow); 
      color: #000; 
      border: none; 
      width: 100%; 
      padding: 20px; 
      border-radius: 15px; 
      font-weight: 900; 
      font-size: 1.3em; 
      cursor: pointer; 
      text-transform: uppercase; 
      margin-top: 25px; 
    }

    /* MODAL */
    #modal-bio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 20px; overflow-y: auto; }
    .bio-card { background: #111; border: 3px solid var(--yellow); border-radius: 30px; padding: 25px; max-width: 500px; margin: 0 auto; }
    .bio-label { color: var(--yellow); font-size: 0.8em; text-transform: uppercase; font-weight: bold; display: block; margin-top: 20px; text-align: left; border-left: 4px solid var(--yellow); padding-left: 10px; }
    .bio-val { font-size: 1.3em; color: #fff; margin: 8px 0; text-align: left; }
    .btn-cerrar { background: #222; color: #fff; border: 1px solid #444; width: 100%; padding: 18px; border-radius: 15px; margin-top: 30px; cursor: pointer; text-transform: uppercase; }
    
    .admin-csv { margin-top: 50px; text-align: center; opacity: 0.2; }
  </style>
</head>
<body>

  <div class="header"><h1>🎤 PANEL SPEAKER</h1></div>

  <div id="pista-container">
    <div style="text-align:center; color:#333; padding:50px;">ESPERANDO COCHE...</div>
  </div>

  <div class="admin-csv">
    <input type="file" id="csv-file" style="display:none;" onchange="importarCSV(event)">
    <button onclick="document.getElementById('csv-file').click()">📂 CSV</button>
  </div>

  <div id="modal-bio"><div class="bio-card" id="bio-body"></div></div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let cacheFichas = {};

    db.ref('fichas_pilotos').on('value', s => { cacheFichas = s.val() || {}; });

    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = '<div style="text-align:center; color:#222; padding:50px; border:2px dashed #111; border-radius:30px;">PISTA VACÍA</div>';
        return;
      }

      let html = "";
      Object.keys(v.items).forEach(id => {
        const p = v.items[id];
        const tAp = (parseInt(p.ap) || 0) + (parseInt(p.h_ap) || 0);
        const tUp = (parseInt(p.up) || 0) + (parseInt(p.h_up) || 0);
        
        html += `
          <div class="card-active">
            <div class="dorsal">#${id}</div>
            <div class="coche-tag">${p.Coche || p.coche || "Drift"}</div>
            <div class="nombre-pista">${p.Piloto || p.nombre || "Piloto"}</div>
            
            <div class="votos-grid">
              <div class="v-box">
                <span class="v-val" style="color:var(--yellow);">👏 ${tAp}</span>
                <span class="v-lab">Aplausos</span>
              </div>
              <div class="v-box">
                <span class="v-val" style="color:var(--blue);">👍 ${tUp}</span>
                <span class="v-lab">Dedo Arriba</span>
              </div>
            </div>
            
            <button class="btn-info-piloto" onclick="verFicha('${id}')">🔎 VER FICHA Y MOTOR</button>
          </div>`;
      });
      cont.innerHTML = html;
    });

    window.verFicha = (id) => {
      const f = cacheFichas[id];
      if (!f) return alert("Sin biografía para el #" + id);
      const cl = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";

      document.getElementById('bio-body').innerHTML = `
        <div style="text-align:center;">
          <div style="font-size:5em; font-weight:900; color:var(--blue); line-height:1;">#${id}</div>
          <h2 style="text-transform:uppercase; margin:10px 0;">${cl(f.nombre)}</h2>
        </div>
        <span class="bio-label">Piloto</span>
        <p class="bio-val">${cl(f.edad)} años | ${cl(f.residencia)}</p>
        <span class="bio-label">Vehículo</span>
        <p class="bio-val"><b>${cl(f.coche_modelo)}</b></p>
        <p class="bio-val"><span style="color:#00ff99">${cl(f.motor)}</span> | ${cl(f.potencia)} CV</p>
        <span class="bio-label">Mods</span>
        <p class="bio-val" style="font-size:0.9em; color:#bbb;">${cl(f.mods)}</p>
        <span class="bio-label">Historia</span>
        <p class="bio-val" style="color:var(--yellow); font-style:italic; font-size:1em;">"${cl(f.curiosidades)}"</p>
        <span class="bio-label">Instagram</span>
        <p class="bio-val" style="color:var(--blue); font-weight:bold;">${cl(f.ig)}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-bio').style.display='none'">CERRAR</button>
      `;
      document.getElementById('modal-bio').style.display = 'block';
    };

    window.importarCSV = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep).map(x => x.trim());
          if(!c[0]) continue;
          nuevas[c[0]] = { nombre:c[1], edad:c[2], residencia:c[3], coche_modelo:c[4], motor:c[5], potencia:c[6], mods:c[7], curiosidades:c[8], palmares:c[9], ig:c[10] };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("CSV Cargado"));
      };
      reader.readAsText(e.target.files[0], 'ISO-8859-1');
    };
  </script>
</body>
</html>
