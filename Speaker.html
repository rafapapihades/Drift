<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPEAKER PRO - DRIFT TORREDEMBARRA</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --blue: #007bff; --yellow: #ffcc00; --green: #00ff99; --bg: #000; }
    body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; padding-bottom: 100px; }
    
    .header { text-align: center; border-bottom: 2px solid var(--yellow); padding-bottom: 10px; margin-bottom: 20px; }
    .header h1 { font-size: 1.1em; color: var(--yellow); letter-spacing: 2px; margin: 0; text-transform: uppercase; }

    /* CARD EN PISTA */
    .card-active { background: #111; border: 3px solid var(--blue); border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(0, 123, 255, 0.3); cursor: pointer; position: relative; }
    .dorsal { font-size: 4.5em; font-weight: 900; color: var(--blue); line-height: 0.8; font-style: italic; }
    .nombre-pista { font-size: 1.8em; font-weight: bold; text-transform: uppercase; margin: 10px 0; border-left: 5px solid var(--yellow); padding-left: 10px; }
    .coche-tag { background: var(--blue); color: #fff; padding: 4px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; position: absolute; top: 20px; right: 20px; }

    /* CONTADORES CARD */
    .votos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .voto-box { background: #1a1a1a; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
    .v-val { font-size: 1.8em; font-weight: bold; display: block; }
    .v-lab { font-size: 0.65em; color: #888; text-transform: uppercase; margin-top: 4px; display: block; }

    /* RANKING DETALLADO */
    .ranking-panel { background: #080808; border-radius: 20px; padding: 20px; margin-top: 30px; border: 1px solid #222; }
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th { color: #555; font-size: 0.7em; text-transform: uppercase; padding-bottom: 10px; text-align: center; }
    .rank-table td { padding: 15px 5px; border-bottom: 1px solid #111; vertical-align: middle; }
    
    .r-pos { color: var(--yellow); font-weight: bold; width: 30px; font-size: 1.1em; }
    .r-info b { color: var(--blue); font-size: 1.1em; margin-right: 5px; }
    .r-info span { text-transform: uppercase; font-size: 0.9em; font-weight: 600; }
    
    .r-votos { text-align: center; width: 60px; }
    .v-badge { display: block; font-weight: bold; font-size: 1.1em; }
    .v-badge.ap { color: var(--yellow); }
    .v-badge.up { color: var(--blue); }

    /* MODAL BIO */
    #modal-bio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
    .bio-card { background: #111; border: 2px solid var(--yellow); border-radius: 30px; padding: 25px; max-width: 500px; margin: 0 auto; }
    .btn-cerrar { background: var(--yellow); color: #000; border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; margin-top: 25px; cursor: pointer; text-transform: uppercase; }
    
    .admin-zone { margin-top: 50px; padding: 20px; border: 2px dashed #333; border-radius: 20px; text-align: center; }
  </style>
</head>
<body>

  <div class="header"><h1>🎤 SPEAKER DASHBOARD</h1></div>

  <div id="pista-container">
    <div style="text-align:center; color:#444; padding:50px;">ESPERANDO SEÑAL...</div>
  </div>

  <div class="ranking-panel">
    <div style="text-align:center; color:var(--yellow); font-weight:bold; margin-bottom:15px; text-transform:uppercase;">🏆 CLASIFICACIÓN DE APOYO</div>
    <table class="rank-table">
      <thead>
        <tr>
          <th>POS</th>
          <th style="text-align:left">PILOTO</th>
          <th>👏</th>
          <th>👍</th>
        </tr>
      </thead>
      <tbody id="rank-body"></tbody>
    </table>
  </div>

  <div class="admin-zone">
    <input type="file" id="csv-file" style="display:none;" onchange="subirCSV(event)">
    <button style="background:#222; color:#666; border:1px solid #444; padding:10px; width:100%; border-radius:10px;" onclick="document.getElementById('csv-file').click()">📂 ACTUALIZAR FICHAS (CSV)</button>
  </div>

  <div id="modal-bio"><div class="bio-card" id="bio-body"></div></div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let cacheFichas = {};

    db.ref('fichas_pilotos').on('value', s => { cacheFichas = s.val() || {}; });

    // PISTA ACTUAL
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = '<div style="text-align:center; color:#333; padding:40px; border:2px dashed #111; border-radius:20px;">PISTA LIBRE</div>';
        return;
      }
      let html = "";
      Object.keys(v.items).forEach(id => {
        const p = v.items[id];
        const totalAp = (p.ap || 0) + (p.h_ap || 0);
        const totalUp = (p.up || 0) + (p.h_up || 0);
        html += `
          <div class="card-active" onclick="verFicha('${id}')">
            <span class="coche-tag">${p.Coche || p.coche || "Drift"}</span>
            <div class="dorsal">#${id}</div>
            <div class="nombre-pista">${p.Piloto || p.nombre || "Piloto"}</div>
            <div class="votos-grid">
              <div class="voto-box">
                <span class="v-val" style="color:var(--yellow);">👏 ${totalAp}</span>
                <span class="v-lab">Aplausos</span>
              </div>
              <div class="voto-box">
                <span class="v-val" style="color:var(--blue);">👍 ${totalUp}</span>
                <span class="v-lab">Dedo Arriba</span>
              </div>
            </div>
          </div>`;
      });
      cont.innerHTML = html;
    });

    // RANKING CON DESGLOSE DE ICONOS
    db.ref('inscritos_drift').on('value', snap => {
      const data = snap.val(); if (!data) return;
      let lista = Object.entries(data).map(([id, v]) => ({
        id: id,
        nombre: v.Piloto || v.nombre || "Piloto",
        ap: (v.ap || 0) + (v.h_ap || 0),
        up: (v.up || 0) + (v.h_up || 0),
        total: (v.ap || 0) + (v.h_ap || 0) + (v.up || 0) + (v.h_up || 0)
      })).sort((a,b) => b.total - a.total);

      document.getElementById('rank-body').innerHTML = lista.slice(0,10).map((p,i) => `
        <tr>
          <td class="r-pos">${i+1}º</td>
          <td class="r-info"><b>#${p.id}</b> <span>${p.nombre}</span></td>
          <td class="r-votos"><span class="v-badge ap">${p.ap}</span></td>
          <td class="r-votos"><span class="v-badge up">${p.up}</span></td>
        </tr>
      `).join('');
    });

    window.verFicha = (id) => {
      const f = cacheFichas[id];
      if (!f) return alert("No hay biografía para el #" + id);
      const cl = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";
      document.getElementById('bio-body').innerHTML = `
        <div style="text-align:center; margin-bottom:20px;">
          <div style="font-size:4em; font-weight:900; color:var(--blue); font-style:italic;">#${id}</div>
          <div style="font-size:1.6em; font-weight:bold; text-transform:uppercase;">${cl(f.nombre)}</div>
        </div>
        <div style="border-top:1px solid #333; padding-top:15px;">
          <p style="color:var(--yellow); font-size:0.8em; font-weight:bold; text-transform:uppercase; margin:10px 0 5px;">👤 Piloto</p>
          <p style="margin:0; font-size:1.1em;"><b>Edad:</b> ${cl(f.edad)} años | <b>De:</b> ${cl(f.residencia)}</p>
          
          <p style="color:var(--yellow); font-size:0.8em; font-weight:bold; text-transform:uppercase; margin:20px 0 5px;">🏎️ Vehículo</p>
          <p style="margin:0; font-size:1.1em;"><b>Modelo:</b> ${cl(f.coche_modelo)}</p>
          <p style="margin:5px 0 0; font-size:1.1em;"><b>Motor:</b> ${cl(f.motor)} | <b>Potencia:</b> ${cl(f.potencia)} CV</p>
          
          <p style="color:var(--yellow); font-size:0.8em; font-weight:bold; text-transform:uppercase; margin:20px 0 5px;">🔧 Preparación</p>
          <p style="margin:0; font-size:0.95em; color:#bbb;">${cl(f.mods)}</p>
          
          <p style="color:var(--yellow); font-size:0.8em; font-weight:bold; text-transform:uppercase; margin:20px 0 5px;">💡 Curiosidad</p>
          <p style="margin:0; font-size:1em; font-style:italic; color:var(--yellow);">"${cl(f.curiosidades)}"</p>
          
          <p style="color:var(--yellow); font-size:0.8em; font-weight:bold; text-transform:uppercase; margin:20px 0 5px;">📱 Instagram</p>
          <p style="margin:0; font-size:1.3em; color:var(--blue); font-weight:bold;">${cl(f.ig)}</p>
        </div>
        <button class="btn-cerrar" onclick="document.getElementById('modal-bio').style.display='none'">CERRAR FICHA</button>
      `;
      document.getElementById('modal-bio').style.display = 'block';
    };

    window.subirCSV = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep).map(x => x.trim());
          if(!c[0]) continue;
          nuevas[c[0]] = { nombre:c[1], edad:c[2], residencia:c[3], coche_modelo:c[4], motor:c[5], potencia:c[6], mods:c[7], curiosidades:c[8], palmares:c[9], ig:c[10] };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("✅ Biografías sincronizadas."));
      };
      reader.readAsText(e.target.files[0], 'ISO-8859-1');
    };
  </script>
</body>
</html>
