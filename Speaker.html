<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPEAKER PRO - DRIFT TORREDEMBARRA</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --blue: #007bff; --yellow: #ffcc00; --green: #00ff99; --bg: #000; }
    body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 100px; }
    
    .header { text-align: center; border-bottom: 2px solid var(--yellow); padding-bottom: 10px; margin-bottom: 20px; }
    .header h1 { font-size: 1.1em; color: var(--yellow); letter-spacing: 2px; margin: 0; }

    /* CARD EN PISTA */
    .card-active { background: #111; border: 3px solid var(--blue); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 25px rgba(0, 123, 255, 0.3); cursor: pointer; }
    .dorsal { font-size: 4.5em; font-weight: 900; color: var(--blue); line-height: 0.8; font-style: italic; }
    .nombre-pista { font-size: 1.8em; font-weight: bold; text-transform: uppercase; margin: 10px 0; border-left: 5px solid var(--yellow); padding-left: 10px; }
    .coche-tag { background: var(--blue); color: #fff; padding: 4px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }

    /* CONTADORES DE VOTOS */
    .votos-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .voto-card { background: #1a1a1a; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
    .voto-val { font-size: 1.8em; font-weight: bold; display: block; }
    .voto-label { font-size: 0.65em; color: #888; text-transform: uppercase; margin-top: 4px; display: block; }

    /* RANKING */
    .ranking-panel { background: #080808; border-radius: 15px; padding: 15px; margin-top: 30px; border: 1px solid #222; }
    .rank-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    .rank-table td { padding: 10px 5px; border-bottom: 1px solid #111; }
    .rank-pos { color: var(--yellow); font-weight: bold; width: 25px; }
    .rank-tot { text-align: right; font-weight: bold; color: var(--green); }

    /* MODAL BIO */
    #modal-bio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
    .bio-box { background: #111; border: 2px solid var(--yellow); border-radius: 25px; padding: 25px; max-width: 500px; margin: 0 auto; }
    .label-f { color: var(--yellow); font-size: 0.75em; text-transform: uppercase; font-weight: bold; margin-top: 15px; display: block; }
    .txt-f { font-size: 1.2em; color: #fff; margin: 5px 0; }
    .btn-cerrar { background: var(--yellow); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 25px; cursor: pointer; }

    .btn-csv { background: #222; color: #666; border: 1px dashed #444; width: 100%; padding: 15px; border-radius: 15px; margin-top: 40px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header"><h1>🎤 SPEAKER - DRIFT SHOW</h1></div>

  <div id="pista-container">
    <div style="text-align:center; color:#444; padding:50px;">ESPERANDO COCHE...</div>
  </div>

  <div class="ranking-panel">
    <div style="text-align:center; color:var(--yellow); font-size:0.8em; font-weight:bold; margin-bottom:10px;">🏆 TOP APOYO TOTAL</div>
    <table class="rank-table"><tbody id="rank-body"></tbody></table>
  </div>

  <input type="file" id="csv-in" style="display:none;" onchange="importarCSV(event)">
  <button class="btn-csv" onclick="document.getElementById('csv-in').click()">📂 RE-CARGAR BIOGRAFÍAS (ALINEADAS OK)</button>

  <div id="modal-bio"><div class="bio-box" id="bio-body"></div></div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let fichas = {};

    db.ref('fichas_pilotos').on('value', s => { fichas = s.val() || {}; });

    // Lógica de Pista con Votos Dobles
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = '<div style="text-align:center; color:#333; padding:50px; border:1px dashed #222; border-radius:20px;">PISTA LIBRE</div>';
        return;
      }

      let html = "";
      Object.keys(v.items).forEach(d => {
        const p = v.items[d];
        const totalAp = (p.ap || 0) + (p.h_ap || 0);
        const totalUp = (p.up || 0) + (p.h_up || 0);

        html += `
          <div class="card-active" onclick="abrirBio('${d}')">
            <div style="display:flex; justify-content:space-between; align-items:start;">
              <div class="dorsal">#${d}</div>
              <span class="coche-tag">${p.Coche || p.coche || "DRIFT"}</span>
            </div>
            <div class="nombre-pista">${p.Piloto || p.nombre || "Piloto"}</div>
            
            <div class="votos-container">
              <div class="voto-card">
                <span class="voto-val" style="color:var(--yellow);">👏 ${totalAp}</span>
                <span class="voto-label">Aplausos</span>
              </div>
              <div class="voto-card">
                <span class="voto-val" style="color:var(--blue);">👍 ${totalUp}</span>
                <span class="voto-label">Dedo Arriba</span>
              </div>
            </div>
            <p style="text-align:center; color:var(--blue); font-size:0.8em; margin-top:15px; font-weight:bold;">🔍 PULSA PARA BIOGRAFÍA</p>
          </div>`;
      });
      cont.innerHTML = html;
    });

    // Ranking Top 10
    db.ref('inscritos_drift').on('value', snap => {
      const data = snap.val(); if (!data) return;
      let list = Object.entries(data).map(([d, v]) => ({
        d: d,
        n: v.Piloto || v.nombre || "Piloto",
        v: (v.ap||0)+(v.h_ap||0)+(v.up||0)+(v.h_up||0)
      })).sort((a,b) => b.v - a.v);
      
      document.getElementById('rank-body').innerHTML = list.slice(0,10).map((p,i) => `
        <tr><td class="rank-pos">${i+1}º</td><td><b>#${p.d}</b> ${p.n}</td><td class="rank-tot">${p.v} Vts</td></tr>
      `).join('');
    });

    window.abrirBio = (id) => {
      const f = fichas[id];
      if (!f) { alert("Dorsal #" + id + " no encontrado."); return; }
      const cl = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";
      
      document.getElementById('bio-body').innerHTML = `
        <div style="text-align:center; border-bottom:1px solid #333; padding-bottom:15px; margin-bottom:15px;">
          <div style="font-size:4.5em; font-weight:900; color:var(--blue); line-height:1;">#${id}</div>
          <div style="font-size:1.6em; font-weight:bold; text-transform:uppercase;">${cl(f.nombre)}</div>
        </div>
        <span class="label-f">👤 Perfil</span>
        <p class="txt-f"><b>Edad:</b> ${cl(f.edad)} años | <b>De:</b> ${cl(f.residencia)}</p>
        <span class="label-f">🏎️ Vehículo</span>
        <p class="txt-f"><b>Coche:</b> ${cl(f.coche_modelo)}</p>
        <p class="txt-f"><b>Motor:</b> ${cl(f.motor)} | <b>CV:</b> ${cl(f.potencia)}</p>
        <span class="label-f">🔧 Preparación</span>
        <p class="txt-f" style="font-size:0.9em; color:#bbb;">${cl(f.mods)}</p>
        <span class="label-f">💡 Curiosidades</span>
        <p class="txt-f" style="color:var(--yellow); font-style:italic;">"${cl(f.curiosidades)}"</p>
        <span class="label-f">📱 Instagram</span>
        <p class="txt-f" style="color:var(--blue); font-weight:bold;">${cl(f.ig)}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-bio').style.display='none'">CERRAR</button>
      `;
      document.getElementById('modal-bio').style.display = 'block';
    };

    window.importarCSV = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep).map(x => x.trim());
          if(!c[0]) continue;
          nuevas[c[0]] = { nombre:c[1], edad:c[2], residencia:c[3], coche_modelo:c[4], motor:c[5], potencia:c[6], mods:c[7], curiosidades:c[8], palmares:c[9], ig:c[10] };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("✅ Fichas sincronizadas."));
      };
      reader.readAsText(file, 'ISO-8859-1');
    };
  </script>
</body>
</html>
