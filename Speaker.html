<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root { --blue: #007bff; --yellow: #ffcc00; --bg: #000; --card: #111; }
    body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; }
    
    .header { text-align: center; border-bottom: 2px solid var(--yellow); padding-bottom: 10px; margin-bottom: 25px; }
    .header h1 { font-size: 1.3em; color: var(--yellow); text-transform: uppercase; margin: 0; letter-spacing: 2px; }

    /* TARJETA PISTA GIGANTE */
    #pista-container { min-height: 300px; }
    .card-active { background: var(--card); border: 4px solid var(--blue); border-radius: 30px; padding: 30px; margin-bottom: 30px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
    
    .dorsal { font-size: 6.5em; font-weight: 900; color: var(--blue); line-height: 0.8; font-style: italic; text-shadow: 4px 4px 0px rgba(0,0,0,0.5); }
    .nombre-pista { font-size: 2.5em; font-weight: bold; text-transform: uppercase; margin: 20px 0; color: #fff; border-left: 8px solid var(--yellow); padding-left: 20px; }
    .coche-tag { background: var(--blue); color: #fff; padding: 8px 20px; border-radius: 10px; font-size: 1em; font-weight: bold; position: absolute; top: 30px; right: 30px; text-transform: uppercase; }

    /* VOTOS EN TARJETA */
    .votos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    .v-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
    .v-val { font-size: 3em; font-weight: bold; display: block; line-height: 1; }
    .v-lab { font-size: 0.8em; color: #888; text-transform: uppercase; margin-top: 10px; display: block; letter-spacing: 2px; }

    /* BOTÓN INFO PILOTO (REFORZADO) */
    .btn-info-piloto { background: var(--yellow); color: #000; border: none; width: 100%; padding: 25px; border-radius: 20px; font-weight: 900; font-size: 1.4em; cursor: pointer; text-transform: uppercase; margin-top: 35px; box-shadow: 0 8px 25px rgba(255, 204, 0, 0.4); }
    .btn-info-piloto:active { transform: scale(0.97); box-shadow: none; }

    /* MODAL BIOGRAFÍA */
    #modal-bio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 20px; overflow-y: auto; }
    .bio-card { background: #111; border: 3px solid var(--yellow); border-radius: 40px; padding: 35px; max-width: 600px; margin: 0 auto; }
    .bio-label { color: var(--yellow); font-size: 0.85em; text-transform: uppercase; font-weight: bold; display: block; margin-top: 25px; border-left: 5px solid var(--yellow); padding-left: 15px; }
    .bio-val { font-size: 1.6em; color: #fff; margin: 12px 0; line-height: 1.3; }
    .btn-cerrar { background: #222; color: #fff; border: 1px solid #444; width: 100%; padding: 22px; border-radius: 20px; font-weight: bold; margin-top: 45px; cursor: pointer; text-transform: uppercase; }
    
    .admin-csv { margin-top: 80px; text-align: center; opacity: 0.3; }
  </style>
</head>
<body>

  <div class="header"><h1>🎤 SPEAKER </h1></div>

  <div id="pista-container">
    <div style="text-align:center; color:#333; padding:100px; font-size:1.5em; font-style:italic;">ESPERANDO COCHE...</div>
  </div>

  <div class="admin-csv">
    <input type="file" id="csv-file" style="display:none;" onchange="importarCSV(event)">
    <button onclick="document.getElementById('csv-file').click()">📂 RE-CARGAR CSV DE FICHAS</button>
  </div>

  <div id="modal-bio"><div class="bio-card" id="bio-body"></div></div>

  <script>
    firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let cacheFichas = {};

    db.ref('fichas_pilotos').on('value', s => { cacheFichas = s.val() || {}; });

    // LÓGICA ÚNICA: COCHE EN PISTA
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      
      if (!v || v.activa === false || !v.items) {
        cont.innerHTML = '<div style="text-align:center; color:#222; padding:80px; border:3px dashed #111; border-radius:40px; font-size:1.2em;">PISTA LIBRE</div>';
        return;
      }

      let html = "";
      Object.keys(v.items).forEach(id => {
        const p = v.items[id];
        // SUMA DE VOTOS (Vivo + Histórico)
        const tAp = (parseInt(p.ap) || 0) + (parseInt(p.h_ap) || 0);
        const tUp = (parseInt(p.up) || 0) + (parseInt(p.h_up) || 0);
        
        html += `
          <div class="card-active">
            <span class="coche-tag">${p.Coche || p.coche || "Drift"}</span>
            <div class="dorsal">#${id}</div>
            <div class="nombre-pista">${p.Piloto || p.nombre || "Piloto"}</div>
            
            <div class="votos-grid">
              <div class="v-box">
                <span class="v-val" style="color:var(--yellow);">👏 ${tAp}</span>
                <span class="v-lab">Aplausos</span>
              </div>
              <div class="v-box">
                <span class="v-val" style="color:var(--blue);">👍 ${tUp}</span>
                <span class="v-lab">Dedo Arriba</span>
              </div>
            </div>
            
            <button class="btn-info-piloto" onclick="verFicha('${id}')">🔎 VER FICHA Y MOTOR</button>
          </div>`;
      });
      cont.innerHTML = html;
    });

    window.verFicha = (id) => {
      const f = cacheFichas[id];
      if (!f) return alert("Dorsal #" + id + " no encontrado en el CSV.");
      const cl = (t) => (t && t.toString().trim() !== "" && t !== "undefined") ? t : "---";

      document.getElementById('bio-body').innerHTML = `
        <div style="text-align:center;">
          <div style="font-size:6em; font-weight:900; color:var(--blue); font-style:italic; line-height:1;">#${id}</div>
          <h2 style="text-transform:uppercase; margin:15px 0; font-size:2.5em;">${cl(f.nombre)}</h2>
        </div>
        
        <span class="bio-label">Perfil del Piloto</span>
        <p class="bio-val"><b>Edad:</b> ${cl(f.edad)} años | <b>De:</b> ${cl(f.residencia)}</p>
        
        <span class="bio-label">Ficha Técnica Vehículo</span>
        <p class="bio-val"><b>Modelo:</b> ${cl(f.coche_modelo)}</p>
        <p class="bio-val"><b>Motor:</b> <span style="color:#00ff99">${cl(f.motor)}</span></p>
        <p class="bio-val"><b>Potencia:</b> ${cl(f.potencia)} CV</p>
        
        <span class="bio-label">Modificaciones Principales</span>
        <p class="bio-val" style="font-size:1.1em; color:#bbb;">${cl(f.mods)}</p>
        
        <span class="bio-label">Curiosidades</span>
        <p class="bio-val" style="color:var(--yellow); font-style:italic;">"${cl(f.curiosidades)}"</p>
        
        <span class="bio-label">Instagram Oficial</span>
        <p class="bio-val" style="color:var(--blue); font-weight:bold; font-size:1.8em;">${cl(f.ig)}</p>
        
        <button class="btn-cerrar" onclick="document.getElementById('modal-bio').style.display='none'">VOLVER A PISTA</button>
      `;
      document.getElementById('modal-bio').style.display = 'block';
    };

    window.importarCSV = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep).map(x => x.trim());
          if(!c[0]) continue;
          nuevas[c[0]] = { nombre:c[1], edad:c[2], residencia:c[3], coche_modelo:c[4], motor:c[5], potencia:c[6], mods:c[7], curiosidades:c[8], palmares:c[9], ig:c[10] };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("✅ CSV Actualizado."));
      };
      reader.readAsText(e.target.files[0], 'ISO-8859-1');
    };
  </script>
</body>
</html>
