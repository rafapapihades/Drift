<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEAKER PRO - DRIFT SHOW</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 50px; }
    .title { color: #ffcc00; text-align: center; text-transform: uppercase; font-size: 1.2em; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; margin-bottom: 15px; }
    
    /* ESTADO CONEXIÓN (DEBUG) */
    #debug-info { font-size: 0.7em; color: #444; text-align: center; margin-bottom: 10px; }

    /* CARD COCHE EN PISTA */
    .card-active { background: #111; border: 3px solid #007bff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { border-color: #007bff; } 50% { border-color: #0056b3; } 100% { border-color: #007bff; } }
    
    .dorsal { font-size: 3.5em; font-weight: bold; color: #007bff; line-height: 1; }
    .nombre { font-size: 1.6em; font-weight: bold; margin: 5px 0; text-transform: uppercase; color: #fff; }
    .coche-tag { background: #007bff; color: white; padding: 4px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }

    .votos-box { display: flex; justify-content: space-around; background: #222; margin-top: 10px; padding: 10px; border-radius: 10px; }
    .voto-val { font-size: 1.8em; font-weight: bold; color: #ffcc00; display: block; }
    .voto-label { font-size: 0.6em; color: #888; text-transform: uppercase; }

    /* RANKING */
    .ranking-panel { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; margin-top: 15px; }
    .ranking-table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
    .ranking-table th { text-align: left; color: #ffcc00; border-bottom: 1px solid #333; padding: 5px; }
    .ranking-table td { padding: 8px 5px; border-bottom: 1px solid #222; }

    /* MODAL */
    #modal-ficha { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 15px; overflow-y: auto; }
    .ficha-content { background: #111; border: 2px solid #ffcc00; border-radius: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
    .btn-cerrar { background: #ffcc00; color: #000; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; font-size: 1.1em; }
    
    .admin-btn { background: #222; color: #666; border: 1px solid #333; width: 100%; padding: 10px; border-radius: 5px; margin-top: 20px; font-size: 0.8em; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <div class="title">🎤 SPEAKER DRIFT SHOW</div>
  <div id="debug-info">Conectando a Firebase...</div>

  <div id="pista-container">
    <div style="text-align:center; color:#444; margin-top:30px;">ESPERANDO INICIO DEL MÁSTER...</div>
  </div>

  <div class="ranking-panel">
    <div style="text-align: center; color: #ffcc00; font-size: 0.7em; font-weight: bold; margin-bottom: 5px;">🏆 TOP APOYO PÚBLICO</div>
    <table class="ranking-table">
      <tbody id="ranking-body"></tbody>
    </table>
  </div>

  <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="importarFichas(event)">
  <button class="admin-btn" onclick="document.getElementById('csv-file').click()">⚙️ CARGAR FICHAS TÉCNICAS (.CSV)</button>

  <div id="modal-ficha">
    <div class="ficha-content" id="ficha-body"></div>
  </div>

  <script>
    // Configuración
    const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let fichasData = {};

    // 1. SINCRONIZAR FICHAS (Biografías)
    db.ref('fichas_pilotos').on('value', s => {
      fichasData = s.val() || {};
      console.log("Fichas cargadas:", Object.keys(fichasData).length);
    });

    // 2. ESCUCHA ACTIVA DE PISTA (REVISADA)
    // Escuchamos 'votacion_activa' pero también 'inscritos_drift' para asegurar datos
    db.ref('votacion_activa').on('value', snap => {
      const v = snap.val();
      const cont = document.getElementById('pista-container');
      const debug = document.getElementById('debug-info');

      if (!v || v.activa === false || !v.items) {
        debug.innerText = "Sistema Online - Pista Libre";
        cont.innerHTML = `<div style="text-align:center; color:#444; margin-top:30px; border:1px dashed #222; padding:20px; border-radius:10px;">SIN COCHES EN PISTA</div>`;
        return;
      }

      debug.innerText = "¡COCHE EN PISTA DETECTADO!";
      let html = "";
      
      Object.keys(v.items).forEach(dorsal => {
        const item = v.items[dorsal];
        const dStr = String(dorsal).trim();
        
        // Mapeo flexible de nombres (según lo que envíe el Master)
        const pNombre = item.nombre || item.Piloto || "Piloto #" + dStr;
        const pCoche = item.coche || item.Coche || "Vehículo Drift";

        html += `
          <div class="card-active" onclick="abrirFicha('${dStr}')">
            <div style="display:flex; justify-content:space-between; align-items:start;">
              <div class="dorsal">#${dStr}</div>
              <span class="coche-tag">${pCoche}</span>
            </div>
            <div class="nombre">${pNombre}</div>
            <div class="votos-box">
              <div style="text-align:center">
                <span class="voto-label">Aplausos en vivo</span>
                <span class="voto-val">👏 ${item.ap || 0}</span>
              </div>
              <div style="text-align:center">
                <span class="voto-label">Total Acumulado</span>
                <span class="voto-val" style="color:#00ff99;">🔥 ${(item.ap||0)+(item.h_ap||0)}</span>
              </div>
            </div>
            <div style="text-align:center; color:#007bff; font-weight:bold; margin-top:10px; font-size:0.8em;">👉 TOCAR PARA BIOGRAFÍA</div>
          </div>`;
      });
      cont.innerHTML = html;
    });

    // 3. RANKING
    db.ref('inscritos_drift').on('value', snap => {
      const data = snap.val();
      if (!data) return;
      let lista = Object.entries(data).map(([d, val]) => ({
        dorsal: d,
        nombre: val.nombre || val.Piloto || "Piloto",
        votos: (val.ap||0)+(val.h_ap||0)+(val.up||0)+(val.h_up||0)
      })).sort((a,b) => b.votos - a.votos);

      document.getElementById('ranking-body').innerHTML = lista.slice(0,10).map((p,i) => `
        <tr>
          <td style="color:#ffcc00; font-weight:bold; width:20px;">${i+1}º</td>
          <td><b style="color:#007bff;">#${p.dorsal}</b> ${p.nombre}</td>
          <td style="text-align:right; font-weight:bold; color:#00ff99;">${p.votos}</td>
        </tr>
      `).join('');
    });

    // 4. FUNCIÓN ABRIR FICHA
    window.abrirFicha = (id) => {
      const f = fichasData[id];
      if (!f) { alert("No hay biografía cargada para el #" + id); return; }
      
      document.getElementById('ficha-body').innerHTML = `
        <div style="text-align:center; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px;">
          <div style="font-size:3em; font-weight:bold; color:#007bff;">#${id}</div>
          <div style="font-size:1.4em; font-weight:bold; text-transform:uppercase;">${f.nombre}</div>
        </div>
        <p><b>📍 Residencia:</b> ${f.residencia}</p>
        <p><b>🚗 Coche:</b> ${f.coche_modelo} (${f.potencia} CV)</p>
        <p><b>🔧 Mods:</b> ${f.mods}</p>
        <p style="color:#ffcc00;"><b>💡 Curiosidad:</b> ${f.curiosidades}</p>
        <p><b>🏆 Palmarés:</b> ${f.palmares}</p>
        <p style="color:#007bff;"><b>📱 IG:</b> ${f.ig}</p>
        <button class="btn-cerrar" onclick="document.getElementById('modal-ficha').style.display='none'">VOLVER AL PANEL</button>
      `;
      document.getElementById('modal-ficha').style.display = 'block';
    };

    // 5. IMPORTAR CSV
    window.importarFichas = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        let nuevas = {};
        const sep = lines[0].includes(';') ? ';' : ',';
        for(let i=1; i<lines.length; i++){
          const c = lines[i].split(sep);
          if(!c[0]) continue;
          const d = c[0].trim();
          nuevas[d] = {
            nombre: c[1], residencia: c[3], coche_modelo: c[4],
            potencia: c[6], mods: c[7], curiosidades: c[8],
            palmares: c[9], ig: c[10]
          };
        }
        db.ref('fichas_pilotos').set(nuevas).then(() => alert("Fichas cargadas con éxito"));
      };
      reader.readAsText(file, 'ISO-8859-1');
    };
  </script>
</body>
</html>
