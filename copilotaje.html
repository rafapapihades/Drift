<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGÍSTICA TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #111; --card: rgba(25, 25, 25, 0.95); --green: #28a745; --red: #ff0000; --blue: #007bff; --orange: #fd7e14; }
        body { background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg); color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; }
        .header-top { display: flex; flex-direction: column; align-items: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border: 2px solid #333; margin-bottom: 15px; gap: 12px; }
        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; object-fit: contain; }
        .event-name-input { background: transparent; border: none; border-bottom: 2px solid #444; color: var(--accent); font-size: 1.2em; text-align: center; width: 90%; font-family: 'Arial Black', sans-serif; outline: none; }
        .main-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-search { background: var(--accent); border: none; border-radius: 10px; padding: 0 20px; cursor: pointer; font-size: 1.5em; transition: 0.2s; }
        .input-huge { width: 100%; height: 60px; background: #000; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1.2em; padding: 0 15px; box-sizing: border-box; margin-bottom: 15px; font-family: sans-serif; }
        .extra-fields { display: block; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed var(--accent); margin-bottom: 15px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-manual { width: 100%; height: 45px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 0 10px; box-sizing: border-box; font-family: sans-serif; font-size: 0.9em; }
        .label-mini { font-size: 0.65em; color: #888; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .pago-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .pago-option { flex: 1; padding: 15px; text-align: center; border-radius: 10px; border: 2px solid #444; cursor: pointer; transition: 0.3s; background: #000; font-size: 0.9em; opacity: 0.5; font-family: sans-serif; font-weight: bold; }
        .pago-option.selected { border-color: var(--accent); color: var(--accent); opacity: 1; background: rgba(255, 204, 0, 0.1); }
        .doc-box { background: #000; border: 1px solid var(--accent); border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px; }
        .doc-box b { font-size: 2.8em; font-family: monospace; color: var(--accent); }
        .chk-massive { width: 100%; height: 65px; background: #1a1a1a; border-radius: 10px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; gap: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn-add-massive { width: 100%; height: 75px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 1.3em; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 #155d27; }
        .btn-add-massive:disabled { background: #222; color: #555; box-shadow: none; opacity: 0.4; cursor: not-allowed; }
        .table-card { background: rgba(0,0,0,0.95); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; font-family: sans-serif; font-size: 0.85em;}
        .n-papel-cola { color: #000; background: var(--accent); font-weight: 900; font-family: monospace; font-size: 1.4em; padding: 5px 10px; border-radius: 5px; display: inline-block; min-width: 45px; text-align: center; }
        .btn-acceso { background: var(--blue); color: #fff; border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8em; }
        .badge-recinto { background: #111; color: var(--blue); border: 1px solid var(--blue); padding: 5px; border-radius: 5px; font-size: 0.7em; font-weight: bold; }
        .controls-row { display: flex; width: 100%; gap: 10px; justify-content: center; margin-top: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-mini { background: #222; color: #ccc; border: 1px solid #444; padding: 12px 16px; border-radius: 6px; font-size: 0.8em; text-transform: uppercase; cursor: pointer; font-family: sans-serif; font-weight: bold; flex: 1; min-width: 120px; }
        .asistente-aviso { padding: 12px; border-radius: 10px; margin-bottom: 15px; display: none; font-size: 0.9em; border: 2px solid var(--accent); background: #2c2505; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="logotaxi.jpg" alt="Logo" class="header-logo">
        <input type="text" id="nombre-evento" class="event-name-input" placeholder="NOMBRE DEL EVENTO">
    </div>

    <div class="main-card">
        <div id="aviso-repetido" class="asistente-aviso"></div>
        
        <div class="search-container">
            <input type="text" id="c-nombre" class="input-huge" style="margin-bottom:0" placeholder="BUSCAR NOMBRE, DNI o TICKET" autocomplete="off">
            <button class="btn-search" onclick="buscarParticipante()">🔍</button>
        </div>

        <div id="seccion-manual" class="extra-fields">
            <div class="input-group">
                <div><span class="label-mini">DNI / NIE</span><input type="text" id="c-dni" class="input-manual" placeholder="DNI"></div>
                <div><span class="label-mini">Fecha Nacimiento</span><input type="text" id="c-nac" class="input-manual" placeholder="DD/MM/AAAA" oninput="validarEdad(this.value)"></div>
            </div>
            <div style="margin-bottom: 10px;"><span class="label-mini">Instagram / TikTok</span><input type="text" id="c-redes" class="input-manual" placeholder="@usuario"></div>
            
            <div id="box-menor" style="display:none; background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--orange);">
                <div style="color:var(--orange); font-size:0.7em; font-weight:bold; margin-bottom:8px;">AUTORIZACIÓN MENOR DE EDAD</div>
                <div class="input-group">
                    <div><span class="label-mini" style="color:var(--orange)">DNI TUTOR</span><input type="text" id="c-dni-tutor" class="input-manual" placeholder="DNI"></div>
                    <div><span class="label-mini" style="color:var(--orange)">NOMBRE TUTOR</span><input type="text" id="c-nombre-tutor" class="input-manual" placeholder="Nombre completo"></div>
                </div>
            </div>
        </div>
        
        <select id="c-piloto" class="input-huge"></select>

        <div class="pago-container">
            <div id="pago-efectivo" class="pago-option selected" onclick="seleccionarPago('EFECTIVO')">💵 EFECTIVO</div>
            <div id="pago-tarjeta" class="pago-option" onclick="seleccionarPago('TARJETA')">💳 TARJETA</div>
        </div>

        <div class="doc-box"><small>Nº DOCUMENTO CORRELATIVO</small><br><b id="v-proximo-numero">001</b></div>

        <label class="chk-massive"><input type="checkbox" id="c-firma" onchange="fnValidar()"> <span style="font-family: sans-serif; font-weight: bold;">RESPONSABILIDAD FIRMADA</span></label>
        <button id="btn-add" class="btn-add-massive" disabled onclick="registrar()">CONFIRMAR REGISTRO</button>
    </div>

    <div class="table-card">
        <div style="font-size:0.85em; color:var(--accent); font-weight:bold; margin-bottom:15px; text-transform: uppercase; display: flex; justify-content: space-between;">
            <span>📋 Cola de Acceso</span>
            <span id="contador-espera">0 personas</span>
        </div>
        <table id="tabla-espera"></table>
    </div>

    <div class="controls-row">
        <button class="btn-mini" onclick="document.getElementById('csv-pilotos').click()">CSV PILOTOS (<span id="count-tag">0</span>)</button>
        <button class="btn-mini" id="btn-gestionar-pilotos" style="color:var(--accent); border-color:var(--accent);">ESTADO PILOTOS</button>
        <button class="btn-mini" id="btn-reset" style="color:var(--red); border-color:#522;">EXPORTAR Y REINICIAR</button>
    </div>
    <input type="file" id="csv-pilotos" hidden accept=".csv">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let registroRecuperado = null;
        let metodoPago = "EFECTIVO";
        let proximoNumeroLibre = 1;
        let esMenorFlag = false;

        const nombreInput = document.getElementById('c-nombre');
        const avisoBox = document.getElementById('aviso-repetido');
        const firmaChk = document.getElementById('c-firma');
        const btnAdd = document.getElementById('btn-add');
        const selPiloto = document.getElementById('c-piloto');
        const proximoNumTxt = document.getElementById('v-proximo-numero');

        // --- VALIDACIÓN DE EDAD ---
        window.validarEdad = (fecha) => {
            if(!fecha || fecha.length < 10) return;
            const parts = fecha.includes('/') ? fecha.split('/') : fecha.split('-');
            const [d, m, y] = parts.map(Number);
            const hoy = new Date();
            let edad = hoy.getFullYear() - y;
            if (hoy.getMonth() + 1 < m || (hoy.getMonth() + 1 === m && hoy.getDate() < d)) edad--;
            esMenorFlag = edad < 18;
            document.getElementById('box-menor').style.display = esMenorFlag ? 'block' : 'none';
        };

        window.seleccionarPago = (tipo) => {
            metodoPago = tipo;
            document.getElementById('pago-efectivo').classList.toggle('selected', tipo === 'EFECTIVO');
            document.getElementById('pago-tarjeta').classList.toggle('selected', tipo === 'TARJETA');
        };

        window.fnValidar = () => {
            btnAdd.disabled = !(nombreInput.value.trim() && firmaChk.checked);
        };

        // --- BUSCADOR CORREGIDO ---
        window.buscarParticipante = async () => {
            const busqueda = nombreInput.value.trim().toLowerCase();
            if (!busqueda) return;
            
            const snap = await get(ref(db, 'copilotajes/pre_inscritos'));
            const preData = snap.val() || {};

            const preKey = Object.keys(preData).find(key => 
                (preData[key].copiloto && preData[key].copiloto.toLowerCase().includes(busqueda)) || 
                (preData[key].dni && preData[key].dni.toLowerCase() === busqueda) ||
                (preData[key].nPapel && preData[key].nPapel.toString() === busqueda)
            );

            if (preKey) {
                const pre = preData[preKey];
                registroRecuperado = { ...pre, firebaseKey: preKey };
                
                avisoBox.innerHTML = `⚡ <b>PRE-INSCRIPCIÓN ENCONTRADA</b>: ${pre.copiloto}`;
                avisoBox.style.display = 'block';
                
                // Autocompletado forzado
                nombreInput.value = pre.copiloto || "";
                document.getElementById('c-dni').value = pre.dni || "";
                document.getElementById('c-nac').value = pre.fechaNac || "";
                document.getElementById('c-redes').value = pre.redes || "";
                
                if(pre.fechaNac) validarEdad(pre.fechaNac);
                if(pre.dniTutor) document.getElementById('c-dni-tutor').value = pre.dniTutor;
                if(pre.nombreTutor) document.getElementById('c-nombre-tutor').value = pre.nombreTutor;

                if(pre.metodoPago) {
                    seleccionarPago(pre.metodoPago.toUpperCase().includes("TARJETA") ? "TARJETA" : "EFECTIVO");
                }
                if(pre.piloto) setTimeout(() => { selPiloto.value = pre.piloto; }, 200);

                proximoNumTxt.innerText = pre.nPapel.toString().padStart(3, '0');
            } else {
                avisoBox.style.display = 'none';
                registroRecuperado = null;
                proximoNumTxt.innerText = proximoNumeroLibre.toString().padStart(3, '0');
            }
            fnValidar();
        };

        // --- GESTIÓN DE PILOTOS (Ignora cabecera CSV) ---
        document.getElementById('csv-pilotos').onchange = (e) => {
            const fr = new FileReader();
            fr.onload = async () => {
                let lineas = fr.result.split('\n').map(l => l.trim()).filter(l => l);
                lineas = lineas.filter(l => !l.toLowerCase().includes('dorsal') && !l.toLowerCase().includes('piloto'));
                const listaLimpia = lineas.map(linea => {
                    const columnas = linea.split(',');
                    return columnas.length >= 2 ? `${columnas[0]} - ${columnas[1]} (${columnas[2] || ''})` : linea;
                });
                await set(ref(db, 'copilotajes/config_pilotos'), listaLimpia);
            };
            fr.readAsText(e.target.files[0]);
        };

        // --- REGISTRAR (Sin Popups) ---
        window.registrar = async () => {
            const num = registroRecuperado ? registroRecuperado.nPapel : proximoNumeroLibre;
            
            const d = {
                nPapel: num,
                copiloto: nombreInput.value.trim(),
                piloto: selPiloto.value,
                metodoPago: metodoPago,
                dni: document.getElementById('c-dni').value.trim(),
                fechaNac: document.getElementById('c-nac').value.trim(),
                redes: document.getElementById('c-redes').value.trim(),
                esMenor: esMenorFlag,
                dniTutor: esMenorFlag ? document.getElementById('c-dni-tutor').value.trim() : "",
                nombreTutor: esMenorFlag ? document.getElementById('c-nombre-tutor').value.trim() : "",
                enRecinto: false,
                finalizado: false,
                ts: Date.now()
            };

            await push(ref(db, 'copilotajes/espera'), d);
            
            if(registroRecuperado && registroRecuperado.firebaseKey) {
                await remove(ref(db, `copilotajes/pre_inscritos/${registroRecuperado.firebaseKey}`));
            } else {
                await set(ref(db, 'copilotajes/ultimo_numero'), num);
            }

            location.reload(); 
        };

        // --- EXPORTAR Y PREGUNTAR REINICIO ---
        document.getElementById('btn-reset').onclick = async () => {
            const snap = await get(ref(db, 'copilotajes'));
            const data = snap.val();
            if(!data) return;

            let csv = "TICKET;NOMBRE;DNI;NACIMIENTO;REDES;MENOR;DNI_TUTOR;NOMBRE_TUTOR;PILOTO;PAGO;ESTADO\n";
            const procesar = (lista, estado) => {
                if(!lista) return;
                Object.values(lista).forEach(i => {
                    csv += `"${i.nPapel}";"${i.copiloto}";"${i.dni || ''}";"${i.fechaNac || ''}";"${i.redes || ''}";"${i.esMenor?'SI':'NO'}";"${i.dniTutor || ''}";"${i.nombreTutor || ''}";"${i.piloto}";"${i.metodoPago}";"${estado}"\n`;
                });
            };

            procesar(data.espera, "ESPERA");
            procesar(data.completados, "FINALIZADO");

            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `TAXI_DRIFT_LOG.csv`;
            link.click();

            // Pregunta de borrado tras exportar
            setTimeout(async () => {
                if(confirm("¿Quieres BORRAR todos los datos de la base de datos ahora? (Esto reiniciará la cola y el contador)")) {
                    await set(ref(db, 'copilotajes/espera'), null);
                    await set(ref(db, 'copilotajes/completados'), null);
                    await set(ref(db, 'copilotajes/ultimo_numero'), 0);
                    location.reload();
                }
            }, 1500);
        };

        // Sincronización inicial
        onValue(ref(db, 'copilotajes'), (snap) => {
            const data = snap.val() || {};
            proximoNumeroLibre = (data.ultimo_numero || 0) + 1;
            if(!registroRecuperado) proximoNumTxt.innerText = proximoNumeroLibre.toString().padStart(3, '0');
            
            const config = data.config_pilotos || [];
            const bajas = data.pilotos_baja || [];
            const activos = config.filter(p => !bajas.includes(p));
            
            document.getElementById('count-tag').innerText = activos.length;
            selPiloto.innerHTML = activos.map(p => `<option value="${p}">${p}</option>`).join('');

            const tEspera = document.getElementById('tabla-espera');
            tEspera.innerHTML = "";
            if(data.espera) {
                Object.entries(data.espera).sort((a,b)=>a[1].nPapel - b[1].nPapel).forEach(([id, item]) => {
                    tEspera.insertRow().innerHTML = `
                        <td><span class="n-papel-cola">${item.nPapel}</span></td>
                        <td><b>${item.copiloto}</b><br><small>${item.piloto}</small></td>
                        <td style="text-align:right">
                            ${item.enRecinto ? '<span class="badge-recinto">RECINTO</span>' : `<button class="btn-acceso" onclick="window.marcarAcceso('${id}')">ACCESO</button>`}
                        </td>`;
                });
            }
            document.getElementById('contador-espera').innerText = `${Object.keys(data.espera || {}).length} personas`;
        });

        window.marcarAcceso = (id) => update(ref(db, `copilotajes/espera/${id}`), { enRecinto: true });
        nombreInput.oninput = fnValidar;
    </script>
</body>
</html>
