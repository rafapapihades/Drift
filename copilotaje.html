<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGÍSTICA TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #111; --card: rgba(25, 25, 25, 0.95); --green: #28a745; --red: #ff0000; --blue: #007bff; }
        
        body { 
            background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg);
            color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; 
        }
        
        .header-top { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; 
            border: 2px solid #333; margin-bottom: 15px; gap: 12px; 
        }

        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; object-fit: contain; }
        
        .event-name-input { 
            background: transparent; border: none; border-bottom: 2px solid #444; 
            color: var(--accent); font-size: 1.2em; text-align: center; width: 90%; 
            font-family: 'Arial Black', sans-serif; outline: none;
        }

        .controls-row { 
            display: flex; width: 100%; gap: 10px; justify-content: center; margin-top: 10px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .btn-mini { background: #222; color: #ccc; border: 1px solid #444; padding: 12px 16px; border-radius: 6px; font-size: 0.8em; text-transform: uppercase; cursor: pointer; font-family: sans-serif; font-weight: bold; flex: 1; min-width: 120px; }
        .btn-reset { color: var(--red); border-color: #522; }

        .main-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .input-huge { width: 100%; height: 60px; background: #000; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1.2em; padding: 0 15px; box-sizing: border-box; margin-bottom: 15px; font-family: sans-serif; }
        
        .pago-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .pago-option { 
            flex: 1; padding: 15px; text-align: center; border-radius: 10px; 
            border: 2px solid #444; cursor: pointer; transition: 0.3s;
            background: #000; font-size: 0.9em; opacity: 0.5; font-family: sans-serif; font-weight: bold;
        }
        .pago-option.selected { border-color: var(--accent); color: var(--accent); opacity: 1; background: rgba(255, 204, 0, 0.1); }

        .asistente-aviso {
            padding: 12px; border-radius: 10px; margin-bottom: 15px; display: none; font-size: 0.9em; 
            border: 2px solid var(--green); background: #052c05; color: #afffaf; font-family: sans-serif; line-height: 1.4;
        }

        .doc-box { background: #000; border: 1px solid var(--accent); border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px; }
        .doc-box small { display: block; font-size: 0.6em; color: #666; font-family: sans-serif; margin-bottom: 2px; }
        .doc-box b { font-size: 2.8em; font-family: monospace; color: var(--accent); }

        .chk-massive { width: 100%; height: 65px; background: #1a1a1a; border-radius: 10px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; gap: 15px; cursor: pointer; margin-bottom: 20px; }
        .chk-massive input { transform: scale(2); }

        .btn-add-massive { width: 100%; height: 75px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 1.3em; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 #155d27; }
        .btn-add-massive:active { transform: translateY(3px); box-shadow: 0 3px 0 #155d27; }
        .btn-add-massive:disabled { background: #333; color: #555; box-shadow: none; opacity: 0.5; }

        .table-card { background: rgba(0,0,0,0.95); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #222; }
        
        .n-papel-cola { color: #000; background: var(--accent); font-weight: 900; font-family: monospace; font-size: 1.4em; padding: 5px 10px; border-radius: 5px; display: inline-block; min-width: 45px; text-align: center; }
        .time-tag { font-size: 0.7em; color: var(--blue); font-family: sans-serif; font-weight: bold; margin-left: 5px; }
        .car-tag { color: var(--accent); font-weight: bold; font-size: 0.85em; text-transform: uppercase; font-family: sans-serif; }
        
        .ready-container { display: flex; flex-direction: column; align-items: center; font-size: 0.65em; font-weight: bold; min-width: 100px; text-align: center; }
        .status-chk { transform: scale(2.2); cursor: pointer; margin-bottom: 8px; }
        .label-dentro { color: var(--green); }
        .label-fuera { color: #666; }

        #modal-bajas { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto; display:flex; align-items:center;}
        .modal-card { background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid var(--accent); max-width:500px; margin: 0 auto; width:100%;}
    </style>
</head>
<body>

    <div class="header-top">
        <img src="logotaxi.jpg" alt="Logo Taxi Drift" class="header-logo">
        <input type="text" id="nombre-evento" class="event-name-input" placeholder="NOMBRE DEL EVENTO">
    </div>

    <div class="main-card">
        <div id="aviso-repetido" class="asistente-aviso"></div>
        <input type="text" id="c-nombre" class="input-huge" placeholder="NOMBRE DEL PARTICIPANTE" autocomplete="off">
        
        <select id="c-piloto" class="input-huge"></select>

        <div class="pago-container">
            <div id="pago-efectivo" class="pago-option selected" onclick="seleccionarPago('EFECTIVO')">💵 EFECTIVO</div>
            <div id="pago-tarjeta" class="pago-option" onclick="seleccionarPago('TARJETA')">💳 TARJETA</div>
        </div>
        
        <div class="doc-box">
            <small>Nº DOCUMENTO CORRELATIVO</small>
            <b id="v-proximo-numero">001</b>
        </div>

        <label class="chk-massive">
            <input type="checkbox" id="c-firma"> 
            <span style="font-family: sans-serif; font-weight: bold;">RESPONSABILIDAD FIRMADA</span>
        </label>

        <button id="btn-add" class="btn-add-massive" disabled>CONFIRMAR REGISTRO</button>
    </div>

    <div class="table-card">
        <div style="font-size:0.8em; color:var(--accent); font-weight:bold; margin-bottom:15px; text-transform: uppercase;">📋 Cola de Acceso</div>
        <table id="tabla-espera"></table>
    </div>

    <div class="table-card">
        <div style="font-size:0.8em; color:var(--green); font-weight:bold; margin-bottom:15px; text-transform: uppercase;">🏁 Últimos en Pista</div>
        <table id="tabla-completados"></table>
    </div>

    <div class="controls-row">
        <button class="btn-mini" onclick="document.getElementById('csv-pilotos').click()">CARGAR CSV (<span id="count-tag">0</span>)</button>
        <button class="btn-mini" id="btn-gestionar-pilotos" style="color:var(--accent); border-color:var(--accent);">ESTADO PILOTOS</button>
        <button class="btn-mini btn-reset" id="btn-reset">EXPORTAR Y REINICIAR</button>
    </div>
    <input type="file" id="csv-pilotos" hidden accept=".csv">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let pilotosArray = [];
        let registroRecuperado = null;
        let metodoPago = "EFECTIVO";

        const nombreInput = document.getElementById('c-nombre');
        const avisoBox = document.getElementById('aviso-repetido');
        const firmaChk = document.getElementById('c-firma');
        const btnAdd = document.getElementById('btn-add');
        const selPiloto = document.getElementById('c-piloto');

        window.seleccionarPago = (tipo) => {
            metodoPago = tipo;
            document.getElementById('pago-efectivo').classList.toggle('selected', tipo === 'EFECTIVO');
            document.getElementById('pago-tarjeta').classList.toggle('selected', tipo === 'TARJETA');
        };

        const fnValidar = () => { 
            btnAdd.disabled = !(nombreInput.value.trim() && firmaChk.checked); 
        };

        // Detector de nombres repetidos
        nombreInput.addEventListener('input', async () => {
            const nombreBusqueda = nombreInput.value.trim().toLowerCase();
            if (nombreBusqueda.length < 3) {
                avisoBox.style.display = 'none';
                registroRecuperado = null;
                fnValidar();
                return;
            }
            const snap = await get(ref(db, 'copilotajes'));
            const data = snap.val() || {};
            const todos = [
                ...Object.values(data.espera || {}), 
                ...Object.values(data.completados || {})
            ];
            const encontrado = todos.find(r => r.copiloto.toLowerCase() === nombreBusqueda);
            if (encontrado) {
                avisoBox.innerHTML = `✅ <b>¡YA REGISTRADO!</b><br>Ticket <b>#${encontrado.nPapel.toString().padStart(3, '0')}</b>.<br>Datos recuperados.`;
                avisoBox.style.display = 'block';
                firmaChk.checked = true;
                registroRecuperado = encontrado;
                if(encontrado.metodoPago) seleccionarPago(encontrado.metodoPago);
            } else {
                avisoBox.style.display = 'none';
                registroRecuperado = null;
            }
            fnValidar();
        });

        firmaChk.onchange = fnValidar;

        // Listener Principal: Sincroniza pilotos y tablas
        onValue(ref(db, 'copilotajes'), (snap) => {
            const data = snap.val() || {};
            document.getElementById('v-proximo-numero').innerText = ((data.ultimo_numero || 0) + 1).toString().padStart(3, '0');
            
            const todosLosPilotosConfig = data.config_pilotos ? Object.values(data.config_pilotos) : [];
            const bajas = data.pilotos_baja ? Object.values(data.pilotos_baja) : [];
            
            pilotosArray = todosLosPilotosConfig.filter(p => !bajas.includes(p));
            document.getElementById('count-tag').innerText = pilotosArray.length;

            selPiloto.innerHTML = '';
            pilotosArray.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p; opt.innerText = p;
                selPiloto.appendChild(opt);
            });

            // Tablas Visuales
            const tEspera = document.getElementById('tabla-espera');
            tEspera.innerHTML = "";
            if(data.espera) {
                Object.entries(data.espera).sort((a,b)=>a[1].nPapel - b[1].nPapel).forEach(([id, item]) => {
                    const row = tEspera.insertRow();
                    row.innerHTML = `
                        <td><span class="n-papel-cola">${item.nPapel.toString().padStart(3, '0')}</span></td>
                        <td>
                            <strong>${item.copiloto}</strong> <span class="time-tag">⏱ ${item.horaRegistro}</span><br>
                            <span style="font-size:0.8em; color:#bbb;">${item.piloto}</span>
                        </td>
                        <td style="text-align:right">
                            <div class="ready-container">
                                <input type="checkbox" class="status-chk" ${item.enRecinto?'checked':''}>
                                <span class="${item.enRecinto ? 'label-dentro' : 'label-fuera'}">${item.enRecinto ? 'DENTRO' : 'ESPERA'}</span>
                            </div>
                        </td>
                    `;
                    row.querySelector('input').onchange = (e) => update(ref(db, `copilotajes/espera/${id}`), { enRecinto: e.target.checked });
                });
            }

            const tComp = document.getElementById('tabla-completados');
            tComp.innerHTML = "";
            if(data.completados) {
                Object.values(data.completados).sort((a,b) => b.nPapel - a.nPapel).slice(0, 5).forEach(item => {
                    const row = tComp.insertRow();
                    row.innerHTML = `
                        <td><span class="n-papel-cola" style="background:#444; color:#aaa;">${item.nPapel.toString().padStart(3, '0')}</span></td>
                        <td><strong>${item.copiloto}</strong><br><small>${item.piloto}</small></td>
                        <td style="color:var(--green); font-size:0.7em; text-align:right;">${item.finalizado ? '🏁 '+ (item.duracionTotal || '') : '● EN PISTA'}</td>
                    `;
                });
            }
        });

        // Registrar Nuevo o Recuperar
        btnAdd.onclick = async () => {
            const horaActual = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            if (registroRecuperado) {
                // Si estaba en completados, lo quitamos de allí para re-meterlo en espera
                const snapC = await get(ref(db, 'copilotajes/completados'));
                if(snapC.exists()){
                    Object.entries(snapC.val()).forEach(([id, reg]) => {
                        if(reg.nPapel === registroRecuperado.nPapel) remove(ref(db, `copilotajes/completados/${id}`));
                    });
                }
                await push(ref(db, 'copilotajes/espera'), {
                    ...registroRecuperado,
                    piloto: selPiloto.value,
                    metodoPago: metodoPago,
                    enRecinto: false, 
                    horaRegistro: horaActual,
                    finalizado: false // Resetear estado de pista
                });
            } else {
                const snapNum = await get(ref(db, 'copilotajes/ultimo_numero'));
                const num = (snapNum.val() || 0) + 1;
                await push(ref(db, 'copilotajes/espera'), {
                    nPapel: num,
                    copiloto: nombreInput.value.trim(),
                    piloto: selPiloto.value,
                    metodoPago: metodoPago,
                    enRecinto: false,
                    horaRegistro: horaActual
                });
                await set(ref(db, 'copilotajes/ultimo_numero'), num);
            }
            nombreInput.value = ""; firmaChk.checked = false; seleccionarPago('EFECTIVO'); fnValidar();
        };

        // Gestión Pilotos
        document.getElementById('btn-gestionar-pilotos').onclick = async () => {
            const snap = await get(ref(db, 'copilotajes'));
            const data = snap.val() || {};
            const config = data.config_pilotos ? Object.values(data.config_pilotos) : [];
            const bajas = data.pilotos_baja ? Object.values(data.pilotos_baja) : [];
            let modalHtml = `<div id="modal-bajas"><div class="modal-card"><h2 style="color:var(--accent)">ESTADO PILOTOS</h2><div style="max-height:60vh; overflow-y:auto">`;
            config.forEach(p => {
                const activo = !bajas.includes(p);
                modalHtml += `<label style="display:flex; align-items:center; background:#000; padding:15px; margin-bottom:10px; border-radius:8px; border:1px solid #333;"><input type="checkbox" class="chk-piloto-estado" data-nombre="${p}" ${activo?'checked':''} style="transform:scale(1.8); margin-right:20px;"><span>${p}</span></label>`;
            });
            modalHtml += `</div><button id="btn-cerrar-modal" class="btn-add-massive" style="height:60px; margin-top:10px">GUARDAR Y SALIR</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('btn-cerrar-modal').onclick = async () => {
                const nuevasBajas = [];
                document.querySelectorAll('.chk-piloto-estado').forEach(c => { if(!c.checked) nuevasBajas.push(c.dataset.nombre); });
                await set(ref(db, 'copilotajes/pilotos_baja'), nuevasBajas);
                document.getElementById('modal-bajas').remove();
            };
        };

        // Exportar CSV completo
        document.getElementById('btn-reset').onclick = async () => {
            const snap = await get(ref(db, 'copilotajes'));
            if (!snap.exists()) return alert("No hay datos");
            const data = snap.val();
            let csv = "N TICKET,COPILOTO,PILOTO,PAGO,REGISTRO,ENTRADA PISTA,SALIDA PISTA,DURACION\n";
            const listado = [...Object.values(data.espera || {}), ...Object.values(data.completados || {})].sort((a,b) => a.nPapel - b.nPapel);
            listado.forEach(v => {
                csv += `${v.nPapel},"${v.copiloto}","${v.piloto}","${v.metodoPago || 'EF'}",${v.horaRegistro || ''},${v.horaEntradaTexto || ''},${v.horaSalidaTexto || ''},${v.duracionTotal || ''}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Resumen_TaxiDrift_${new Date().toLocaleDateString()}.csv`;
            link.click();
            setTimeout(async () => {
                if(confirm("¿BORRAR TODO Y REINICIAR DÍA?")) {
                    await remove(ref(db, 'copilotajes'));
                    location.reload();
                }
            }, 1500);
        };

        // CSV Pilotos
        document.getElementById('csv-pilotos').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "").slice(1);
                const obj = {};
                lines.forEach((l, i) => { 
                    const c = l.split(l.includes(';') ? ';' : ',');
                    if(c.length >= 3) obj[i] = `[#${c[0].trim()}] ${c[1].trim()} | ${c[2].trim()}`;
                });
                set(ref(db, 'copilotajes/config_pilotos'), obj);
                set(ref(db, 'copilotajes/pilotos_baja'), []);
            };
            r.readAsText(e.target.files[0]);
        };

        onValue(ref(db, 'copilotajes/nombre_evento'), s => document.getElementById('nombre-evento').value = s.val() || "");
        document.getElementById('nombre-evento').onchange = (e) => set(ref(db, 'copilotajes/nombre_evento'), e.target.value);
    </script>
</body>
</html>
