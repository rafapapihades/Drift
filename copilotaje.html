<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGÍSTICA TAXI DRIFT - CONTROL TOTAL</title>
    <style>
        :root { --accent: #ffcc00; --bg: #111; --card: rgba(25, 25, 25, 0.95); --green: #28a745; --red: #ff0000; --blue: #007bff; --orange: #fd7e14; }
        body { background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg); color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; }
        
        /* Header fijo */
        .header-top { display: flex; flex-direction: column; align-items: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border: 2px solid #333; margin-bottom: 15px; }
        .header-logo { width: 100%; max-width: 350px; height: auto; }
        .event-title { color: var(--accent); font-size: 1.4em; margin-top: 10px; text-transform: uppercase; }
        
        .main-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        
        /* Buscador */
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-huge { width: 100%; height: 60px; background: #000; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1.2em; padding: 0 15px; box-sizing: border-box; font-family: sans-serif; }
        .btn-search { background: var(--accent); border: none; border-radius: 10px; padding: 0 20px; cursor: pointer; font-size: 1.5em; }

        .extra-fields { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed var(--accent); margin-bottom: 15px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-manual { width: 100%; height: 45px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 0 10px; box-sizing: border-box; font-family: sans-serif; }
        .label-mini { font-size: 0.65em; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        /* Pago */
        .pago-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .pago-option { flex: 1; padding: 15px; text-align: center; border-radius: 10px; border: 2px solid #444; cursor: pointer; background: #000; opacity: 0.5; font-family: sans-serif; font-weight: bold; }
        .pago-option.selected { border-color: var(--accent); color: var(--accent); opacity: 1; background: rgba(255, 204, 0, 0.1); }
        
        .doc-box { background: #000; border: 1px solid var(--accent); border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px; }
        .doc-box b { font-size: 2.8em; font-family: monospace; color: var(--accent); }
        
        .chk-massive { width: 100%; height: 65px; background: #1a1a1a; border-radius: 10px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; gap: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn-add-massive { width: 100%; height: 75px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 1.3em; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 #155d27; }
        .btn-add-massive:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Tabla */
        .table-card { background: rgba(0,0,0,0.95); border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; font-size: 0.7em; color: var(--accent); padding: 10px 5px; border-bottom: 2px solid #333; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; font-family: sans-serif; font-size: 0.85em; vertical-align: middle; }
        
        .n-papel-cola { color: #000; background: var(--accent); font-weight: 900; font-family: monospace; font-size: 1.2em; padding: 4px 8px; border-radius: 4px; }
        .btn-status { border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8em; color: #fff; }
        .bg-blue { background: var(--blue); }
        .bg-green { background: var(--green); }
        
        .asistente-aviso { padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none; border: 2px solid var(--accent); background: #2c2505; text-align: center; font-family: sans-serif; }

        /* Modal Pilotos con Checkboxes */
        #modal-pilotos { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box; }
        .modal-content { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--accent); }
        .piloto-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-family: sans-serif; }
        .piloto-row input { transform: scale(1.5); cursor: pointer; }

        .controls-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-mini { background: #222; color: #ccc; border: 1px solid #444; padding: 12px; border-radius: 6px; font-size: 0.8em; font-weight: bold; flex: 1; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="logotaxi.jpg" alt="Logo" class="header-logo">
        <div class="event-title">LOGÍSTICA Y TIEMPOS DRIFT</div>
    </div>

    <div class="main-card">
        <div id="aviso-repetido" class="asistente-aviso"></div>
        
        <div class="search-container">
            <input type="text" id="c-nombre" class="input-huge" placeholder="BUSCAR PRE-REGISTRO (NOMBRE/DNI/TURNO)..." autocomplete="off">
            <button class="btn-search" onclick="buscarParticipante()">🔍</button>
        </div>

        <div class="extra-fields">
            <div class="input-group">
                <div><span class="label-mini">DNI / NIE</span><input type="text" id="c-dni" class="input-manual"></div>
                <div><span class="label-mini">F. Nacimiento</span><input type="text" id="c-nac" class="input-manual" placeholder="DD/MM/AAAA" oninput="validarEdad(this.value)"></div>
            </div>
            <div class="input-group">
                <div><span class="label-mini">Instagram</span><input type="text" id="c-redes" class="input-manual"></div>
                <div><span class="label-mini">Piloto Seleccionado</span><select id="c-piloto" class="input-manual" style="background:#000; color:#fff"></select></div>
            </div>
            
            <div id="box-menor" style="display:none; margin-top:10px; padding:10px; border:1px solid var(--orange); border-radius:8px;">
                <span class="label-mini" style="color:var(--orange)">Datos del Tutor</span>
                <div class="input-group">
                    <input type="text" id="c-nombre-tutor" class="input-manual" placeholder="Nombre Tutor">
                    <input type="text" id="c-dni-tutor" class="input-manual" placeholder="DNI Tutor">
                </div>
            </div>
        </div>

        <div class="pago-container">
            <div id="pago-efectivo" class="pago-option selected" onclick="seleccionarPago('EFECTIVO')">💵 EFECTIVO</div>
            <div id="pago-tarjeta" class="pago-option" onclick="seleccionarPago('TARJETA')">💳 TARJETA</div>
        </div>

        <div class="doc-box"><small>Nº TICKET</small><br><b id="v-proximo-numero">---</b></div>

        <label class="chk-massive">
            <input type="checkbox" id="c-firma" onchange="fnValidar()" style="transform: scale(2)"> 
            <span>RESPONSABILIDAD FIRMADA</span>
        </label>
        
        <button id="btn-add" class="btn-add-massive" disabled onclick="registrar()">DAR ENTRADA A PISTA</button>
    </div>

    <div class="table-card">
        <table id="tabla-tiempos">
            <thead>
                <tr>
                    <th>TURNO</th>
                    <th>PARTICIPANTE</th>
                    <th>REGISTRO</th>
                    <th>ENTRADA</th>
                    <th>SALIDA</th>
                    <th>DURACIÓN</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <div class="controls-row">
        <button class="btn-mini" onclick="document.getElementById('csv-pilotos').click()">CARGAR PILOTOS</button>
        <button class="btn-mini" onclick="abrirPilotos()" style="color:var(--accent)">ESTADO PILOTOS</button>
        <button class="btn-mini" id="btn-reset" style="color:var(--red)">REINICIAR EVENTO</button>
    </div>
    <input type="file" id="csv-pilotos" hidden accept=".csv">

    <!-- Modal Pilotos -->
    <div id="modal-pilotos">
        <div class="modal-content">
            <h3 style="color:var(--accent); margin-top:0">PILOTOS DISPONIBLES</h3>
            <div id="lista-check-pilotos"></div>
            <button class="btn-add-massive" style="height:50px; margin-top:20px; font-size:1em;" onclick="document.getElementById('modal-pilotos').style.display='none'">CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let registroRecuperado = null;
        let metodoPago = "EFECTIVO";
        let proximoNumeroLibre = 1;
        let esMenorFlag = false;

        const formatTime = () => new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit', second:'2-digit'});

        // --- BUSCADOR ---
        window.buscarParticipante = async () => {
            const busqueda = document.getElementById('c-nombre').value.trim().toLowerCase();
            if (!busqueda) return;
            
            const snap = await get(ref(db, 'copilotajes/pre_inscritos'));
            const preData = snap.val() || {};

            const preKey = Object.keys(preData).find(key => 
                (preData[key].copiloto && preData[key].copiloto.toLowerCase().includes(busqueda)) || 
                (preData[key].dni && preData[key].dni.toLowerCase() === busqueda) ||
                (preData[key].nPapel && preData[key].nPapel.toString() === busqueda)
            );

            if (preKey) {
                const pre = preData[preKey];
                registroRecuperado = { ...pre, firebaseKey: preKey };
                
                document.getElementById('aviso-repetido').innerHTML = `✅ <b>PRE-REGISTRO HALLADO</b>: Turno ${pre.nPapel}`;
                document.getElementById('aviso-repetido').style.display = 'block';
                
                // Carga de datos corregida
                document.getElementById('c-nombre').value = pre.copiloto;
                document.getElementById('c-dni').value = pre.dni || "";
                document.getElementById('c-nac').value = pre.fecha_nac || "";
                document.getElementById('c-redes').value = pre.insta || "";
                document.getElementById('v-proximo-numero').innerText = pre.nPapel.toString().padStart(3, '0');
                
                if(pre.fecha_nac) validarEdad(pre.fecha_nac);
                if(pre.tutor) document.getElementById('c-nombre-tutor').value = pre.tutor;
                if(pre.tutor_dni) document.getElementById('c-dni-tutor').value = pre.tutor_dni;
                if(pre.metodoPago) seleccionarPago(pre.metodoPago);
            }
            fnValidar();
        };

        // --- REGISTRO Y TIEMPOS ---
        window.registrar = async () => {
            const num = registroRecuperado ? registroRecuperado.nPapel : proximoNumeroLibre;
            const horaActual = formatTime();

            const d = {
                nPapel: num,
                copiloto: document.getElementById('c-nombre').value.trim(),
                piloto: document.getElementById('c-piloto').value,
                dni: document.getElementById('c-dni').value,
                fechaNac: document.getElementById('c-nac').value,
                redes: document.getElementById('c-redes').value,
                pago: metodoPago,
                horaRegistro: registroRecuperado ? new Date(registroRecuperado.ts).toLocaleTimeString() : horaActual,
                horaEntrada: horaActual, // Entra a pista ahora
                horaSalida: "",
                duracion: "",
                status: "EN_PISTA"
            };

            await push(ref(db, 'copilotajes/activos'), d);
            
            if(registroRecuperado) {
                await remove(ref(db, `copilotajes/pre_inscritos/${registroRecuperado.firebaseKey}`));
            } else {
                await set(ref(db, 'copilotajes/ultimo_numero'), num);
            }
            location.reload();
        };

        window.finalizarTanda = async (id, hEntrada) => {
            const hSalida = formatTime();
            
            // Calcular duración
            const inicio = new Date(`01/01/2000 ${hEntrada}`);
            const fin = new Date(`01/01/2000 ${hSalida}`);
            const diffMs = fin - inicio;
            const mins = Math.floor(diffMs / 60000);
            const secs = Math.floor((diffMs % 60000) / 1000);
            const duracionStr = `${mins}m ${secs}s`;

            await update(ref(db, `copilotajes/activos/${id}`), {
                horaSalida: hSalida,
                duracion: duracionStr,
                status: "FINALIZADO"
            });
        };

        // --- GESTIÓN PILOTOS (CHECKBOXES) ---
        onValue(ref(db, 'copilotajes'), (snap) => {
            const data = snap.val() || {};
            proximoNumeroLibre = (data.ultimo_numero || 0) + 1;
            if(!registroRecuperado) document.getElementById('v-proximo-numero').innerText = proximoNumeroLibre.toString().padStart(3, '0');

            // Listado de Pilotos
            const listaOriginal = data.config_pilotos || [];
            const bajas = data.pilotos_baja || [];
            
            // Selector de registro
            const activos = listaOriginal.filter(p => !bajas.includes(p));
            document.getElementById('c-piloto').innerHTML = activos.map(p => `<option value="${p}">${p}</option>`).join('');

            // Modal Gestión
            const contenedorCheck = document.getElementById('lista-check-pilotos');
            contenedorCheck.innerHTML = listaOriginal.map(p => `
                <div class="piloto-row">
                    <span>${p}</span>
                    <input type="checkbox" ${!bajas.includes(p) ? 'checked' : ''} onchange="togglePiloto('${p}', this.checked)">
                </div>
            `).join('');

            // Tabla de Tiempos
            const cuerpo = document.getElementById('cuerpo-tabla');
            cuerpo.innerHTML = "";
            if(data.activos) {
                Object.entries(data.activos).reverse().forEach(([id, item]) => {
                    const row = cuerpo.insertRow();
                    row.innerHTML = `
                        <td><span class="n-papel-cola">${item.nPapel}</span></td>
                        <td><b>${item.copiloto}</b><br><small>${item.piloto}</small></td>
                        <td>${item.horaRegistro}</td>
                        <td>${item.horaEntrada}</td>
                        <td id="salida-${id}">${item.horaSalida || '---'}</td>
                        <td id="dur-${id}">${item.duracion || '---'}</td>
                        <td>
                            ${item.status === "EN_PISTA" 
                                ? `<button class="btn-status bg-green" onclick="finalizarTanda('${id}', '${item.horaEntrada}')">FINALIZAR</button>` 
                                : `<span style="color:var(--green)">✅ OK</span>`}
                        </td>
                    `;
                });
            }
        });

        window.togglePiloto = async (nombre, estaActivo) => {
            const snap = await get(ref(db, 'copilotajes/pilotos_baja'));
            let bajas = snap.val() || [];
            if(estaActivo) bajas = bajas.filter(b => b !== nombre);
            else if(!bajas.includes(nombre)) bajas.push(nombre);
            await set(ref(db, 'copilotajes/pilotos_baja'), bajas);
        };

        // --- UTILIDADES ---
        window.validarEdad = (f) => {
            if(f.length !== 10) return;
            const [d,m,y] = f.split('/');
            const edad = new Date().getFullYear() - y;
            esMenorFlag = edad < 18;
            document.getElementById('box-menor').style.display = esMenorFlag ? 'block' : 'none';
        };

        window.seleccionarPago = (t) => {
            metodoPago = t;
            document.getElementById('pago-efectivo').classList.toggle('selected', t === 'EFECTIVO');
            document.getElementById('pago-tarjeta').classList.toggle('selected', t === 'TARJETA');
        };

        window.fnValidar = () => {
            document.getElementById('btn-add').disabled = !document.getElementById('c-firma').checked;
        };

        window.abrirPilotos = () => document.getElementById('modal-pilotos').style.display = 'block';

        document.getElementById('btn-reset').onclick = async () => {
            if(confirm("¿REINICIAR TODO? Se borrarán tiempos y turnos.")) {
                await set(ref(db, 'copilotajes/activos'), null);
                await set(ref(db, 'copilotajes/ultimo_numero'), 0);
                location.reload();
            }
        };

        // Carga CSV Pilotos
        document.getElementById('csv-pilotos').onchange = (e) => {
            const fr = new FileReader();
            fr.onload = async () => {
                const list = fr.result.split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().includes('piloto'));
                await set(ref(db, 'copilotajes/config_pilotos'), list);
            };
            fr.readAsText(e.target.files[0]);
        };
    </script>
</body>
</html>
