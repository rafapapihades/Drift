<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRIFT SHOW LIVE</title>
  <style>
    body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; padding: 10px; margin: 0; }
    .contenedor { max-width: 450px; margin: auto; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; border: 2px solid #ffcc00; min-height: 90vh; display: flex; flex-direction: column; justify-content: center; }
    
    #banner-estado { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2); }
    
    .voto-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid #ffcc00; }
    .piloto-nom { color: #ffcc00; font-size: 1.3em; text-transform: uppercase; margin-bottom: 5px; }
    
    .v-btns { display: flex; justify-content: space-around; margin-top: 15px; }
    .btn-voto { font-size: 3.5em; cursor: pointer; background: none; border: none; padding: 10px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    
    /* BLOQUEO: Solo cuando ya se ha votado */
    .votos-bloqueados .btn-voto { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
    .btn-voto.seleccionado { transform: scale(1.3); filter: none !important; opacity: 1 !important; }

    .timer { color: #ff4444; font-size: 2.2em; font-weight: bold; margin-top: 20px; animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    #sorteo-box { margin-top: 30px; font-size: 0.8em; color: #aaa; border: 1px dashed #444; padding: 10px; border-radius: 10px; }
    #id-num { font-size: 2em; color: #ffcc00; display: block; letter-spacing: 4px; }
  </style>
</head>
<body>

<div class="contenedor">
    <div id="banner-estado">CONECTANDO...</div>
    
    <div id="seccion-votos" style="display:none">
        <div id="lista-votables"></div>
        <div id="timer-box" class="timer"></div>
    </div>

    <div id="sorteo-box">
        Nº PARA EL SORTEO
        <span id="id-num">-----</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" }));

    // --- ID USUARIO ---
    let USER_ID = localStorage.getItem('drift_user_id');
    if (!USER_ID) {
        USER_ID = Math.floor(10000 + Math.random() * 90000).toString();
        localStorage.setItem('drift_user_id', USER_ID);
    }
    document.getElementById('id-num').innerText = USER_ID;

    let currentDorsal = "";
    let yaVoto = false;

    // --- MONITOR ESTADO PISTA ---
    onValue(ref(db, 'estado_pista'), s => {
        const p = s.val();
        if (p) {
            const b = document.getElementById('banner-estado');
            b.innerText = p.mensaje;
            b.style.backgroundColor = p.color;
            b.style.color = (p.color === "yellow" || p.color === "#ffcc00") ? "#000" : "#fff";
        }
    });

    // --- MONITOR VOTACIÓN ---
    onValue(ref(db, 'votacion_activa'), async s => {
        const v = s.val();
        const seccion = document.getElementById('seccion-votos');
        const lista = document.getElementById('lista-votables');

        if (!v || !v.activa) {
            seccion.style.display = 'none';
            lista.innerHTML = "";
            currentDorsal = "";
            yaVoto = false; // Reset total al cerrar
            return;
        }

        // SI CAMBIA EL DORSAL, RESETEAMOS TODO PARA EL NUEVO PILOTO
        if (currentDorsal !== v.dorsal) {
            currentDorsal = v.dorsal;
            lista.innerHTML = ""; 
            
            // Comprobamos si ya votamos para este nuevo dorsal
            const snap = await get(ref(db, `registro_votos/${currentDorsal}/${USER_ID}`));
            yaVoto = snap.exists();
        }

        seccion.style.display = 'block';

        // Dibujar tarjetas si la lista está vacía
        if (v.items && lista.innerHTML === "") {
            Object.entries(v.items).forEach(([id, data]) => {
                const card = document.createElement('div');
                card.className = 'voto-card';
                card.innerHTML = `
                    <div class="piloto-nom">${data.nombre}</div>
                    <div class="v-btns ${yaVoto ? 'votos-bloqueados' : ''}">
                        <button class="btn-voto" onclick="enviarVoto('${id}','ap')">👏</button>
                        <button class="btn-voto" onclick="enviarVoto('${id}','up')">👍</button>
                        <button class="btn-voto" onclick="enviarVoto('${id}','dw')">👎</button>
                    </div>
                `;
                lista.appendChild(card);
            });
        }

        // Bloqueo por tiempo o por voto realizado
        const containerBtns = document.querySelector('.v-btns');
        if (containerBtns) {
            if (yaVoto || v.timer === 0) {
                containerBtns.classList.add('votos-bloqueados');
            } else {
                containerBtns.classList.remove('votos-bloqueados');
            }
        }

        // Timer de cierre
        const tDiv = document.getElementById('timer-box');
        if (v.timer > 0 && v.timer <= 5) {
            tDiv.innerText = `¡CIERRE EN ${v.timer}s!`;
        } else {
            tDiv.innerText = "";
        }
    });

    // --- FUNCIÓN ENVIAR VOTO ---
    window.enviarVoto = async (idPiloto, tipo) => {
        if (yaVoto) return;

        // Doble check de tiempo
        const tSnap = await get(ref(db, 'votacion_activa/timer'));
        if (tSnap.exists() && tSnap.val() === 0) {
            alert("VOTACIÓN CERRADA");
            return;
        }

        const updates = {};
        updates[`votacion_activa/items/${idPiloto}/${tipo}`] = increment(1);
        updates[`registro_votos/${currentDorsal}/${USER_ID}`] = { voto: tipo, ts: Date.now() };
        updates[`participantes_sorteo/${USER_ID}/votos_totales`] = increment(1);

        try {
            await update(ref(db), updates);
            yaVoto = true;
            document.querySelector('.v-btns').classList.add('votos-bloqueados');
            alert("VOTO ENVIADO - Nº " + USER_ID);
        } catch (e) {
            alert("ERROR DE CONEXIÓN");
        }
    };
</script>
</body>
</html>
