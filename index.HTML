<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIFT SHOW</title>
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.9)), url('Fibra3.png'); 
            background-repeat: repeat; 
            background-size: 420px; 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            text-align: center; 
        }
        .overlay { 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 0, 0, 0.4); 
            box-sizing: border-box;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(10px);    
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .v-btn { font-size: 4.5em; filter: grayscale(1); margin: 10px; transition: 0.2s; cursor: pointer; display: inline-block; }
        .v-act { filter: grayscale(0) !important; transform: scale(1.2); }
        #timer-box { color: #ff0000; font-weight: bold; font-size: 1.5em; margin-top: 15px; height: 25px; }
        .vote-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            padding: 12px 8px;
            margin: 12px 0;
        }
        .vote-title {
            color: #ffcc00;
            font-size: 1.05em;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
        }
        .vote-sub {
            color: #aaa;
            font-size: 0.8em;
            margin-top: 3px;
        }
        .vote-car-img { width:100%; max-height:150px; object-fit:cover; border-radius:10px; margin:8px 0; border:1px solid rgba(255,255,255,.15); }
        .vote-card .v-btn { font-size: 3.3em; margin: 4px 8px; }
        
        .rank-card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            margin: 8px 0; 
            border-left: 4px solid #ffcc00; 
            display: flex; 
            justify-content: space-between; 
            text-align: left;
            box-sizing: border-box;
        }
        .rank-card .rank-pos {
            color: #ffcc00;
            font-size: 1.35em;
            font-weight: 900;
            margin-right: 8px;
        }
        .esc-crono {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            font-size: 0.85em;
            color: #aaa;
        }
        .esc-crono b {
            display: block;
            color: #ffcc00;
            font-size: 1.45em;
            margin-top: 3px;
        }
        .esc-result-card {
            background: #050505;
            border: 2px solid #ffcc00;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 14px;
        }
        .esc-result-card h3 { margin: 0 0 10px; color: #ffcc00; text-transform: uppercase; }
        .esc-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .esc-result-box { background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px 6px; }
        .esc-result-box span { display: block; color: #999; font-size: .7em; font-weight: 900; text-transform: uppercase; }
        .esc-result-box b { display: block; font-size: 1.35em; margin: 4px 0; }
        .podio-ok { color: #00ff99; }
        .podio-out { color: #ffcc00; }
        .esc-current-card {
            background: rgba(0,0,0,.72);
            border: 1px solid rgba(255,204,0,.55);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 14px;
            text-align: left;
        }
        .esc-current-card h3 {
            margin: 0 0 8px;
            color: #ffcc00;
            text-transform: uppercase;
        }
        .esc-current-card p {
            margin: 4px 0;
            color: #ddd;
            font-size: .95em;
        }
        .esc-current-card b { color: #fff; }

        .sorteo-info {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            font-size: 0.8em;
            color: #aaa;
        }
        #id-num { color: #ffcc00; font-size: 2em; display: block; font-weight: bold; letter-spacing: 3px; }
        .brand-logo { width:min(260px,80vw); height:auto; margin-bottom:8px; }
        .event-title { color:#ffcc00; font-weight:900; text-transform:uppercase; margin-bottom:14px; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="glass-panel">
            <img class="brand-logo" src="logo2.jpg" alt="Drift Show">
            <div id="event-title" class="event-title"></div>
            
            <div id="ui-show" style="display:none; width: 100%;">
                <h1 id="s-mensaje" style="font-size: 2.8em; margin: 0; text-shadow: 2px 2px 4px #000;"></h1>
                <h2 id="s-info" style="color:#007bff; margin: 15px 0; min-height: 1.2em; font-size: 1.8em;"></h2>
                
                <div id="voto-box" style="display:none;">
                    <div id="votos-lista"></div>
                    <div id="timer-box"></div>
                </div>
            </div>

            <div id="ui-esc" style="display:none; width: 100%">
                <div class="esc-crono">
                    <span>MEDIDOS <b id="esc-progreso">0/0</b></span>
                </div>
                <div id="coche-prueba-esc" class="esc-current-card" style="display:none"></div>
                <div id="ultimo-resultado-esc" class="esc-result-card" style="display:none"></div>
                <h2 style="color:#ffcc00; font-size: 1.5em; margin-top: 0;">DB GASOLINA</h2>
                <div id="l-db-gas"></div>
                <h2 style="color:#ffcc00; font-size: 1.5em; margin-top: 16px;">DB DIÉSEL</h2>
                <div id="l-db-diesel"></div>
                <h2 style="color:#ffcc00; font-size: 1.5em; margin-top: 16px;">HZ GASOLINA</h2>
                <div id="l-hz-gas"></div>
                <h2 style="color:#ffcc00; font-size: 1.5em; margin-top: 16px;">HZ DIÉSEL</h2>
                <div id="l-hz-diesel"></div>
            </div>

            <div class="sorteo-info">
                Nº DE PARTICIPANTE PARA EL SORTEO
                <span id="id-num">-----</span>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" }));
        let totalEscapes = 0;
        let medidosEscapes = 0;
        let cronoEscapesTimer = null;
        let ultimoResultadoTimer = null;

        onValue(ref(db, 'config_evento'), snap => {
            const cfg = snap.val() || {};
            document.getElementById('event-title').innerText = cfg.nombre || "";
        });

        function generarUserId() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        let USER_ID = localStorage.getItem('drift_user_id');
        if (!USER_ID) {
            USER_ID = generarUserId();
            localStorage.setItem('drift_user_id', USER_ID);
        }
        document.getElementById('id-num').innerText = USER_ID;

        let miVotos = {};
        let currentDorsal = "";

        onValue(ref(db, 'sorteo_reset_ts'), s => {
            const resetTs = s.val() || 0;
            const localResetTs = parseInt(localStorage.getItem('drift_sorteo_reset_ts') || '0');
            if(resetTs && resetTs > localResetTs) {
                USER_ID = generarUserId();
                localStorage.setItem('drift_user_id', USER_ID);
                localStorage.setItem('drift_sorteo_reset_ts', resetTs.toString());
                document.getElementById('id-num').innerText = USER_ID;
                miVotos = {};
            }
        });

        onValue(ref(db, 'modo_actual'), s => {
            const m = s.val() || 'tab-show';
            document.getElementById('ui-show').style.display = m==='tab-show'?'block':'none';
            document.getElementById('ui-esc').style.display = m==='tab-esc'?'block':'none';
        });

        onValue(ref(db, 'inscritos_esc'), s => {
            totalEscapes = s.exists() ? Object.keys(s.val()).length : 0;
            pintarProgresoEscapes();
        });

        onValue(ref(db, 'crono_evento'), s => {
            clearInterval(cronoEscapesTimer);
            cronoEscapesTimer = null;
        });

        function fmtTime(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            return `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
        }

        function pintarProgresoEscapes() {
            document.getElementById('esc-progreso').innerText = `${medidosEscapes}/${totalEscapes}`;
        }

        onValue(ref(db, 'ultimo_resultado_escapes'), s => {
            renderUltimoResultadoEscape(s.val());
        });

        onValue(ref(db, 'escape_prueba_actual'), s => {
            renderCochePruebaEscape(s.val());
        });

        function renderUltimoResultadoEscape(r) {
            const box = document.getElementById('ultimo-resultado-esc');
            if(!box || !r) {
                if(box) box.style.display = 'none';
                return;
            }
            clearTimeout(ultimoResultadoTimer);
            const age = Date.now() - Number(r.ts || 0);
            if(r.ts && age > 10000) {
                box.style.display = 'none';
                return;
            }
            const dbClass = r.dbPodio ? 'podio-ok' : 'podio-out';
            const hzClass = r.hzPodio ? 'podio-ok' : 'podio-out';
            box.style.display = 'block';
            box.innerHTML = `
                <h3>#${escHtml(r.dorsal)} ${escHtml(r.piloto)}</h3>
                <div class="esc-result-grid">
                    <div class="esc-result-box">
                        <span>DB ${escHtml(r.categoria)}</span>
                        <b>${Number(r.db || 0).toFixed(1)} dB</b>
                        <strong class="${dbClass}">P${r.dbPos || '-'}</strong>
                    </div>
                    <div class="esc-result-box">
                        <span>HZ ${escHtml(r.categoria)}</span>
                        <b>${Math.round(Number(r.hz || 0))} Hz</b>
                        <strong class="${hzClass}">P${r.hzPos || '-'}</strong>
                    </div>
                </div>`;
            ultimoResultadoTimer = setTimeout(() => { box.style.display = 'none'; }, Math.max(0, 10000 - age));
        }

        function renderCochePruebaEscape(p) {
            const box = document.getElementById('coche-prueba-esc');
            if(!box || !p) {
                if(box) box.style.display = 'none';
                return;
            }
            box.style.display = 'block';
            box.innerHTML = `
                <h3>Prueba sonido #${escHtml(p.dorsal)}</h3>
                <p><b>Coche:</b> ${escHtml(p.coche || '-')}</p>
                <p><b>Combustible:</b> ${escHtml(p.combustible || '-')}</p>
                <p><b>Potencia:</b> ${escHtml(p.potencia || '-')} CV</p>`;
        }

        function escHtml(v) {
            return String(v || '').replace(/[&<>"']/g, c => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c]));
        }

        onValue(ref(db, 'estado_pista'), s => {
            const e = s.val();
            const msg = document.getElementById('s-mensaje');
            let texto = e?.mensaje || "";
            texto = texto.replace(/^[^A-ZÁÉÍÓÚÑ]*(EN PISTA|PISTA LIBRE)/i, '$1');
            msg.innerText = texto;
            msg.style.color = e?.color || "white";
        });

        onValue(ref(db, 'votacion_activa'), s => {
            const v = s.val();
            const box = document.getElementById('voto-box');
            const timerDisplay = document.getElementById('timer-box');

            if(v?.activa) {
                if (currentDorsal !== v.dorsal) {
                    currentDorsal = v.dorsal || "0";
                    miVotos = Object.fromEntries(Object.entries(miVotos).filter(([id]) => v.items?.[id]));
                }
                box.style.display = 'block';
                document.getElementById('s-info').innerText = "";
                renderVotos(v);
                const timers = Object.values(v.items || {}).map(item => Number(item.timer || 0)).filter(t => t > 0 && t <= 10);
                if(timers.length) {
                    timerDisplay.innerText = `CIERRE EN: ${Math.max(...timers)}...`;
                } else {
                    timerDisplay.innerText = "";
                }
            } else {
                box.style.display = 'none';
                document.getElementById('s-info').innerText = "";
                document.getElementById('votos-lista').innerHTML = "";
                miVotos = {};
                currentDorsal = "";
            }
        });

        window.votar = async (itemId, tipo) => {
            if(!itemId) return;
            const votoPrevioSnap = await get(ref(db, `registro_votos/${itemId}/${USER_ID}`));
            const votoPrevio = votoPrevioSnap.val();
            const tipoPrevio = votoPrevio?.tipo || "";
            if(tipoPrevio === tipo) {
                miVotos[itemId] = tipo;
                pintarSeleccion(itemId);
                return;
            }

            const updates = {};
            if(tipoPrevio) {
                updates[`votacion_activa/items/${itemId}/${tipoPrevio}`] = increment(-1);
            } else {
                updates[`participantes_sorteo/${USER_ID}/votos_totales`] = increment(1);
            }

            updates[`votacion_activa/items/${itemId}/${tipo}`] = increment(1);
            updates[`registro_votos/${itemId}/${USER_ID}`] = { tipo: tipo, ts: Date.now() };
            updates[`participantes_sorteo/${USER_ID}/ultimo_voto`] = Date.now();

            await update(ref(db), updates);
            
            miVotos[itemId] = tipo;
            pintarSeleccion(itemId);
        };

        function renderVotos(v) {
            const lista = document.getElementById('votos-lista');
            const items = Object.entries(v.items || {}).filter(([id]) => id !== "BATALLA");
            lista.innerHTML = items.map(([id, item]) => {
                const coche = item.coche ? ` (${item.coche})` : "";
                const detalles = [item.coche, item.motor, item.potencia ? `${item.potencia} CV` : ""].filter(Boolean).join(" · ");
                return `
                    <div class="vote-card" data-item="${id}">
                        ${item.foto ? `<img class="vote-car-img" src="${escHtml(item.foto)}" alt="">` : ''}
                        <div class="vote-title">${item.nombre || "PILOTO"}</div>
                        <div class="vote-sub">${escHtml(detalles || coche.replace(/[()]/g, ''))}</div>
                        ${item.timer > 0 && item.timer <= 10 ? `<div id="timer-${id}" style="color:#ff3333; font-weight:900; margin-top:8px;">CIERRE EN: ${item.timer}...</div>` : ''}
                        <span id="v-${id}-ap" class="v-btn" onclick="votar('${id}','ap')">👏</span>
                        <span id="v-${id}-up" class="v-btn" onclick="votar('${id}','up')">👍</span>
                        <span id="v-${id}-dw" class="v-btn" onclick="votar('${id}','dw')">👎</span>
                    </div>
                `;
            }).join('');
            items.forEach(([id]) => cargarSeleccionGuardada(id));
        }

        async function cargarSeleccionGuardada(itemId) {
            const snap = await get(ref(db, `registro_votos/${itemId}/${USER_ID}`));
            const voto = snap.val();
            if(voto?.tipo) miVotos[itemId] = voto.tipo;
            else delete miVotos[itemId];
            pintarSeleccion(itemId);
        }

        function pintarSeleccion(itemId) {
            document.querySelectorAll(`[id^="v-${itemId}-"]`).forEach(b => b.classList.remove('v-act'));
            const tipo = miVotos[itemId];
            if(tipo) {
                const btn = document.getElementById(`v-${itemId}-${tipo}`);
                if(btn) btn.classList.add('v-act');
            }
        }

        onValue(ref(db, 'ranking_escapes'), s => {
            const data = s.exists() ? Object.values(s.val()) : [];
            medidosEscapes = data.length;
            pintarProgresoEscapes();
            const normComb = (v) => String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes('diesel') ? 'diesel' : 'gasolina';
            const render = (arr, tId, campo, unidad) => {
                document.getElementById(tId).innerHTML = arr.slice(0,5).map((p, i) => 
                    `<div class="rank-card"><span><span class="rank-pos">${i+1}º</span><b>#${p.dorsal}</b> ${p.piloto}<br><small>${p.coche}</small></span><b>${p[campo]}${unidad}</b></div>`).join('') || '<div class="rank-card">Sin datos</div>';
            };
            const gas = data.filter(p => normComb(p.combustible) === 'gasolina');
            const diesel = data.filter(p => normComb(p.combustible) === 'diesel');
            render(gas.filter(p => Number(p.db) > 0).sort((a,b)=>Number(b.db)-Number(a.db)), 'l-db-gas', 'db', 'dB');
            render(diesel.filter(p => Number(p.db) > 0).sort((a,b)=>Number(b.db)-Number(a.db)), 'l-db-diesel', 'db', 'dB');
            render(gas.filter(p => Number(p.hz) > 0).sort((a,b)=>Number(a.hz)-Number(b.hz)), 'l-hz-gas', 'hz', 'Hz');
            render(diesel.filter(p => Number(p.hz) > 0).sort((a,b)=>Number(a.hz)-Number(b.hz)), 'l-hz-diesel', 'hz', 'Hz');
        });
    </script>
</body>
</html>
