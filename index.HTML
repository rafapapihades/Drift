<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRIFT SHOW LIVE - PÚBLICO</title>
  <style>
    body {
      background-image: url('logo_peq.png');
      background-repeat: repeat;
      background-size: 200px;
      background-position: top right;
      background-color: #000;
      color: #fff;
      font-family: 'Arial Black', Gadget, sans-serif;
      padding: 10px; margin: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .contenedor-principal {
      background: rgba(0, 0, 0, 0.97);
      border: 2px solid #ffcc00;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 30px #000;
      text-align: center;
    }
    #banner-estado {
      padding: 15px; font-weight: bold; border-radius: 10px; margin-bottom: 20px;
      text-transform: uppercase; font-size: 1.2em; border: 1px solid rgba(255,255,255,0.2);
    }
    #lista-votables { display: flex; flex-direction: column; gap: 15px; }
    .voto-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px; border-radius: 12px; border-left: 5px solid #ffcc00;
    }
    .nombre-piloto { font-weight: bold; font-size: 1.2em; color: #ffcc00; text-transform: uppercase; }
    .coche-piloto { font-size: 0.8em; color: #aaa; margin-bottom: 10px; font-style: italic; }
    
    /* BOTONES */
    .v-btns { display: flex; justify-content: space-around; font-size: 2.8em; margin-top: 10px; }
    .btn-voto { cursor: pointer; filter: brightness(0.6) grayscale(0.5); transition: 0.3s; padding: 5px; pointer-events: auto; }
    .btn-voto:active { transform: scale(0.9); }
    .btn-voto.seleccionado { filter: none !important; transform: scale(1.2); }
    
    /* ESTADO BLOQUEADO */
    .votos-bloqueados .btn-voto { cursor: not-allowed; pointer-events: none; opacity: 0.2; filter: grayscale(1); }
    
    .timer-alerta { 
      color: #ff4444; 
      font-weight: bold; 
      margin-top: 20px; 
      font-size: 1.8em; 
      text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
      animation: flash 1s infinite;
    }
    @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    
    #id-sorteo-box { 
      background: #1a1a1a;
      border: 1px dashed #ffcc00;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
    }
    #id-label { font-size: 0.7em; color: #aaa; display: block; margin-bottom: 5px; }
    #id-numero { font-size: 1.8em; color: #ffcc00; letter-spacing: 5px; }
  </style>
</head>
<body>

<div class="contenedor-principal">
  <div id="banner-estado">CONECTANDO...</div>
  
  <div id="seccion-votos" style="display:none">
    <div id="lista-votables"></div>
    <div id="cuenta-atras" class="timer-alerta"></div>
  </div>

  <div id="id-sorteo-box">
    <span id="id-label">Nº DE PARTICIPANTE PARA EL SORTEO</span>
    <span id="id-numero">-----</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const DB_URL = "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com";
  const db = getDatabase(initializeApp({ databaseURL: DB_URL }));

  // --- ID USUARIO ---
  let storedID = localStorage.getItem('drift_user_id');
  if (!storedID || isNaN(storedID) || storedID.length !== 5) {
    const numAleatorio = Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem('drift_user_id', numAleatorio.toString());
    storedID = numAleatorio.toString();
  }
  const USER_ID = storedID;
  document.getElementById('id-numero').innerText = USER_ID;

  let currentDorsalGlobal = "";
  let yaVotoEnEstaRonda = false;

  const lista = document.getElementById('lista-votables');
  const divVotos = document.getElementById('seccion-votos');
  const timerDiv = document.getElementById('cuenta-atras');

  function resetUIVotos() {
    divVotos.style.display = 'none';
    lista.innerHTML = "";
    timerDiv.innerText = "";
    currentDorsalGlobal = "";
    yaVotoEnEstaRonda = false;
  }

  // --- MONITOR ESTADO PISTA ---
  onValue(ref(db, 'estado_pista'), s => {
    const p = s.val();
    if (!p) return;
    const b = document.getElementById('banner-estado');
    b.innerText = String(p.mensaje || "").replace('🏎️ ', '');
    b.style.background = p.color || "#222";
  });

  // --- MONITOR VOTACIÓN ACTIVA ---
  onValue(ref(db, 'votacion_activa'), async s => {
    const v = s.val();

    if (v && v.activa) {
      divVotos.style.display = 'block';

      // Si cambia el piloto o ronda, comprobamos si este usuario ya votó
      if (currentDorsalGlobal !== v.dorsal) {
        currentDorsalGlobal = v.dorsal || "";
        lista.innerHTML = ""; 
        const check = await get(ref(db, `registro_votos/${currentDorsalGlobal}/${USER_ID}`));
        yaVotoEnEstaRonda = check.exists();
      }

      // Dibujar tarjetas si no están creadas
      if (v.items && lista.innerHTML === "") {
        Object.entries(v.items).forEach(([id, data]) => {
          crearTarjetaUI(id, data?.nombre || "", data?.coche || "");
        });
      }

      // LÓGICA DE BLOQUEO: Solo bloqueamos si el usuario ya votó O si el timer es exactamente 0
      // Nota: El controlador de pista manda 999 al inicio, por lo que NO se bloquea al salir el coche.
      if (yaVotoEnEstaRonda || v.timer === 0) {
        lista.classList.add('votos-bloqueados');
      } else {
        lista.classList.remove('votos-bloqueados');
      }

      // Mostrar cuenta atrás solo cuando sea real (ej. menor a 10 segundos)
      if (v.timer !== undefined && v.timer > 0 && v.timer <= 5) {
        timerDiv.style.display = "block";
        timerDiv.innerText = `¡CIERRE EN ${v.timer}s!`;
      } else {
        timerDiv.style.display = "none";
      }

    } else {
      resetUIVotos();
    }
  });

  function crearTarjetaUI(id, nombre, coche) {
    const card = document.createElement('div');
    card.className = 'voto-card';
    card.id = "card-" + id;
    card.innerHTML = `
      <div class="nombre-piloto">${nombre}</div>
      <div class="coche-piloto">${coche}</div>
      <div class="v-btns">
        <span class="btn-voto v-ap" data-id="${id}" data-voto="ap">👏</span>
        <span class="btn-voto v-up" data-id="${id}" data-voto="up">👍</span>
        <span class="btn-voto v-dw" data-id="${id}" data-voto="dw">👎</span>
      </div>
    `;
    
    // Delegación de eventos para los botones
    card.querySelectorAll('.btn-voto').forEach(btn => {
        btn.onclick = () => {
            const idV = btn.getAttribute('data-id');
            const tipoV = btn.getAttribute('data-voto');
            enviarVoto(idV, tipoV);
        };
    });
    
    lista.appendChild(card);
  }

  async function enviarVoto(idVotable, tipoVoto) {
    if (!currentDorsalGlobal || yaVotoEnEstaRonda) return;

    // Verificar si el timer ha cerrado (solo si es exactamente 0)
    const snap = await get(ref(db, 'votacion_activa/timer'));
    if (snap.exists() && snap.val() === 0) {
        alert("¡Votación cerrada!");
        return;
    }

    const updates = {};
    updates[`votacion_activa/items/${idVotable}/${tipoVoto}`] = increment(1);
    updates[`registro_votos/${currentDorsalGlobal}/${USER_ID}`] = { voto: tipoVoto, ts: Date.now() };
    updates[`participantes_sorteo/${USER_ID}/votos_totales`] = increment(1);
    updates[`participantes_sorteo/${USER_ID}/ultimo_voto`] = Date.now();

    try {
      await update(ref(db), updates);
      yaVotoEnEstaRonda = true;
      lista.classList.add('votos-bloqueados');
      
      const btn = document.querySelector(`#card-${idVotable} .v-${tipoVoto}`);
      if (btn) btn.classList.add('seleccionado');
      
      alert("¡VOTO REGISTRADO!\nTu Nº para el sorteo: " + USER_ID);
    } catch (e) {
      alert("Error de conexión al votar.");
    }
  }
</script>
</body>
</html>
