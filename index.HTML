<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIFT SHOW</title>
    <style>
        body { 
            background-image: url('logo.jpg'); 
            background-repeat: repeat; 
            background-size: 400px; 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            text-align: center; 
        }
        .overlay { 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 0, 0, 0.4); 
            box-sizing: border-box;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(10px);    
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .v-btn { font-size: 4.5em; filter: grayscale(1); margin: 10px; transition: 0.2s; cursor: pointer; display: inline-block; }
        .v-act { filter: grayscale(0) !important; transform: scale(1.2); }
        #timer-box { color: #ff0000; font-weight: bold; font-size: 1.5em; margin-top: 15px; height: 25px; }
        .vote-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            padding: 12px 8px;
            margin: 12px 0;
        }
        .vote-title {
            color: #ffcc00;
            font-size: 1.05em;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
        }
        .vote-sub {
            color: #aaa;
            font-size: 0.8em;
            margin-top: 3px;
        }
        .vote-card .v-btn { font-size: 3.3em; margin: 4px 8px; }
        
        .rank-card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            margin: 8px 0; 
            border-left: 4px solid #ffcc00; 
            display: flex; 
            justify-content: space-between; 
            text-align: left;
            box-sizing: border-box;
        }

        .sorteo-info {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            font-size: 0.8em;
            color: #aaa;
        }
        #id-num { color: #ffcc00; font-size: 2em; display: block; font-weight: bold; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="glass-panel">
            
            <div id="ui-show" style="display:none; width: 100%;">
                <h1 id="s-mensaje" style="font-size: 2.8em; margin: 0; text-shadow: 2px 2px 4px #000;"></h1>
                <h2 id="s-info" style="color:#007bff; margin: 15px 0; min-height: 1.2em; font-size: 1.8em;"></h2>
                
                <div id="voto-box" style="display:none;">
                    <div id="votos-lista"></div>
                    <div id="timer-box"></div>
                </div>
            </div>

            <div id="ui-esc" style="display:none; width: 100%">
                <h2 style="color:#ffcc00; font-size: 1.8em; margin-top: 0;">RANKING dB</h2>
                <div id="l-db"></div>
                <h2 style="color:#ffcc00; font-size: 1.8em; margin-top: 20px;">RANKING SONORIDAD</h2>
                <div id="l-hz"></div>
            </div>

            <div class="sorteo-info">
                Nº DE PARTICIPANTE PARA EL SORTEO
                <span id="id-num">-----</span>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" }));

        let USER_ID = localStorage.getItem('drift_user_id');
        if (!USER_ID) {
            USER_ID = Math.floor(10000 + Math.random() * 90000).toString();
            localStorage.setItem('drift_user_id', USER_ID);
        }
        document.getElementById('id-num').innerText = USER_ID;

        let miVotos = {};
        let currentDorsal = "";

        onValue(ref(db, 'modo_actual'), s => {
            const m = s.val() || 'tab-show';
            document.getElementById('ui-show').style.display = m==='tab-show'?'block':'none';
            document.getElementById('ui-esc').style.display = m==='tab-esc'?'block':'none';
        });

        onValue(ref(db, 'estado_pista'), s => {
            const e = s.val();
            const msg = document.getElementById('s-mensaje');
            msg.innerText = e?.mensaje || "";
            msg.style.color = e?.color || "white";
        });

        onValue(ref(db, 'votacion_activa'), s => {
            const v = s.val();
            const box = document.getElementById('voto-box');
            const timerDisplay = document.getElementById('timer-box');

            if(v?.activa) {
                if (currentDorsal !== v.dorsal) {
                    currentDorsal = v.dorsal || "0";
                    miVotos = Object.fromEntries(Object.entries(miVotos).filter(([id]) => v.items?.[id]));
                }
                box.style.display = 'block';
                document.getElementById('s-info').innerText = "";
                renderVotos(v);
                if(v.timer !== undefined && v.timer > 0 && v.timer < 10) {
                    timerDisplay.innerText = `CIERRE EN: ${v.timer}...`;
                } else {
                    timerDisplay.innerText = "";
                }
            } else {
                box.style.display = 'none';
                document.getElementById('s-info').innerText = "";
                document.getElementById('votos-lista').innerHTML = "";
                miVotos = {};
                currentDorsal = "";
            }
        });

        window.votar = async (itemId, tipo) => {
            const tSnap = await get(ref(db, `votacion_activa/items/${itemId}/timer`));
            const timer = tSnap.exists() ? Number(tSnap.val()) : 999;
            if(timer > 0 && timer < 10) return;
            if(!itemId) return;

            const updates = {};
            if(miVotos[itemId]) {
                updates[`votacion_activa/items/${itemId}/${miVotos[itemId]}`] = increment(-1);
            }

            updates[`votacion_activa/items/${itemId}/${tipo}`] = increment(1);
            updates[`registro_votos/${itemId}/${USER_ID}`] = { tipo: tipo, ts: Date.now() };
            updates[`participantes_sorteo/${USER_ID}/votos_totales`] = increment(1);
            updates[`participantes_sorteo/${USER_ID}/ultimo_voto`] = Date.now();

            await update(ref(db), updates);
            
            miVotos[itemId] = tipo;
            pintarSeleccion(itemId);
        };

        function renderVotos(v) {
            const lista = document.getElementById('votos-lista');
            const items = Object.entries(v.items || {}).filter(([id]) => id !== "BATALLA");
            lista.innerHTML = items.map(([id, item]) => {
                const coche = item.coche ? ` (${item.coche})` : "";
                return `
                    <div class="vote-card" data-item="${id}">
                        <div class="vote-title">#${id} ${item.nombre || "PILOTO"}</div>
                        <div class="vote-sub">${coche.replace(/[()]/g, '')}</div>
                        ${item.timer > 0 && item.timer < 10 ? `<div id="timer-${id}" style="color:#ff3333; font-weight:900; margin-top:8px;">CIERRE EN: ${item.timer}...</div>` : ''}
                        <span id="v-${id}-ap" class="v-btn" onclick="votar('${id}','ap')">👏</span>
                        <span id="v-${id}-up" class="v-btn" onclick="votar('${id}','up')">👍</span>
                        <span id="v-${id}-dw" class="v-btn" onclick="votar('${id}','dw')">👎</span>
                    </div>
                `;
            }).join('');
            items.forEach(([id]) => pintarSeleccion(id));
        }

        function pintarSeleccion(itemId) {
            document.querySelectorAll(`[id^="v-${itemId}-"]`).forEach(b => b.classList.remove('v-act'));
            const tipo = miVotos[itemId];
            if(tipo) {
                const btn = document.getElementById(`v-${itemId}-${tipo}`);
                if(btn) btn.classList.add('v-act');
            }
        }

        onValue(ref(db, 'ranking_escapes'), s => {
            if(!s.exists()) return;
            const data = Object.values(s.val());
            const render = (arr, tId, sFn, u) => {
                document.getElementById(tId).innerHTML = arr.sort(sFn).slice(0,10).map(p => 
                    `<div class="rank-card"><span><b>${p.dorsal}</b> ${p.piloto}<br><small>${p.coche}</small></span><b>${p[u.toLowerCase()==='db'?'db':'hz']}${u}</b></div>`).join('');
            };
            render([...data], 'l-db', (a,b)=>b.db-a.db, 'dB');
            render([...data], 'l-hz', (a,b)=>a.hz-b.hz, 'Hz');
        });
    </script>
</body>
</html>
