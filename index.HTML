<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRIFT SHOW LIVE</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
    .contenedor { max-width: 400px; margin: auto; background: #111; padding: 20px; border-radius: 20px; border: 2px solid #ffcc00; }
    
    /* BANNER ESTADO */
    #banner-estado { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
    
    /* BOTONES DE VOTO - ULTRA VISIBLES */
    .voto-card { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #ffcc00; }
    .v-btns { display: flex; justify-content: space-around; margin-top: 15px; }
    
    .btn-voto { 
        font-size: 3.5em; 
        cursor: pointer !important; 
        background: none; border: none; 
        padding: 10px; transition: 0.2s;
        display: inline-block;
        -webkit-tap-highlight-color: transparent;
    }
    
    /* ESTADO BLOQUEADO: Si ya votó, bajamos opacidad */
    .bloqueado { opacity: 0.2 !important; pointer-events: none !important; filter: grayscale(1); }
    
    .timer { color: #ff4444; font-size: 2em; font-weight: bold; margin-top: 15px; }
    #id-box { margin-top: 20px; font-size: 0.8em; color: #ffcc00; border: 1px dashed #444; padding: 10px; }
    
    /* BOTÓN EMERGENCIA */
    .btn-reset { margin-top: 10px; font-size: 0.6em; background: #333; color: #777; border: none; padding: 5px; cursor: pointer; }
  </style>
</head>
<body>

<div class="contenedor">
    <div id="banner-estado">CONECTANDO...</div>
    
    <div id="seccion-votos" style="display:none">
        <div id="lista-votables"></div>
        <div id="timer" class="timer"></div>
    </div>

    <div id="id-box">
        TU Nº DE SORTEO: <span id="id-num">-----</span><br>
        <button class="btn-reset" onclick="localStorage.clear(); location.reload();">RESETEAR MI ID</button>
    </div>
    <div id="debug" style="font-size:0.7em; color: #555; margin-top:10px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" }));

    // 1. IDENTIFICACIÓN USUARIO
    let USER_ID = localStorage.getItem('drift_user_id');
    if (!USER_ID) {
        USER_ID = Math.floor(10000 + Math.random() * 90000).toString();
        localStorage.setItem('drift_user_id', USER_ID);
    }
    document.getElementById('id-num').innerText = USER_ID;

    let localDorsal = "";
    let yaVoto = false;

    // 2. MONITOR PISTA
    onValue(ref(db, 'estado_pista'), s => {
        const p = s.val();
        if (p) {
            const b = document.getElementById('banner-estado');
            b.innerText = p.mensaje;
            b.style.backgroundColor = p.color;
            b.style.color = (p.color === "yellow" || p.color === "#ffcc00") ? "#000" : "#fff";
        }
    });

    // 3. MONITOR VOTACIÓN
    onValue(ref(db, 'votacion_activa'), async s => {
        const v = s.val();
        const seccion = document.getElementById('seccion-votos');
        const lista = document.getElementById('lista-votables');
        const debug = document.getElementById('debug');

        if (!v || !v.activa) {
            seccion.style.display = 'none';
            localDorsal = "";
            return;
        }

        seccion.style.display = 'block';

        // ¿ES UN COCHE NUEVO?
        if (localDorsal !== v.dorsal) {
            localDorsal = v.dorsal;
            lista.innerHTML = ""; // Limpiar UI
            
            // Comprobar si ya votó en esta ronda
            const check = await get(ref(db, `registro_votos/${localDorsal}/${USER_ID}`));
            yaVoto = check.exists();
            debug.innerText = `Dorsal en pista: ${localDorsal} | ¿Has votado?: ${yaVoto ? 'SÍ' : 'NO'}`;
        }

        // DIBUJAR BOTONES SI NO ESTÁN
        if (v.items && lista.innerHTML === "") {
            Object.entries(v.items).forEach(([id, data]) => {
                const card = document.createElement('div');
                card.className = 'voto-card';
                card.innerHTML = `
                    <div style="font-weight:bold; color:#ffcc00">${data.nombre}</div>
                    <div class="v-btns">
                        <button class="btn-voto" onclick="votar('${id}','ap')">👏</button>
                        <button class="btn-voto" onclick="votar('${id}','up')">👍</button>
                        <button class="btn-voto" onclick="votar('${id}','dw')">👎</button>
                    </div>
                `;
                lista.appendChild(card);
            });
        }

        // BLOQUEO VISUAL REAL
        // Solo bloqueamos si yaVoto es true O si el timer es estrictamente 0
        if (yaVoto || v.timer === 0) {
            lista.classList.add('bloqueado');
        } else {
            lista.classList.remove('bloqueado');
        }

        // TIMER
        const tDiv = document.getElementById('timer');
        if (v.timer > 0 && v.timer <= 5) {
            tDiv.innerText = `¡CIERRE EN ${v.timer}s!`;
        } else {
            tDiv.innerText = "";
        }
    });

    // 4. FUNCIÓN DE VOTAR
    window.votar = async (idPiloto, tipo) => {
        if (yaVoto) return;
        
        // Verificar timer antes de procesar
        const tSnap = await get(ref(db, 'votacion_activa/timer'));
        if (tSnap.exists() && tSnap.val() === 0) {
            alert("¡TIEMPO AGOTADO!");
            return;
        }

        const updates = {};
        updates[`votacion_activa/items/${idPiloto}/${tipo}`] = increment(1);
        updates[`registro_votos/${localDorsal}/${USER_ID}`] = { voto: tipo, ts: Date.now() };
        updates[`participantes_sorteo/${USER_ID}/votos_totales`] = increment(1);

        try {
            await update(ref(db), updates);
            yaVoto = true;
            document.getElementById('lista-votables').classList.add('bloqueado');
            alert("¡VOTO RECIBIDO! Nº " + USER_ID);
        } catch (e) {
            alert("Error de conexión");
        }
    };
</script>

</body>
</html>
