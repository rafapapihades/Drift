<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRIFT SHOW LIVE - PÚBLICO</title>
  <style>
    body {
      background-image: url('logo_peq.png');
      background-repeat: repeat;
      background-size: 200px;
      background-position: top right;
      background-color: #000;
      color: #fff;
      font-family: 'Arial Black', Gadget, sans-serif;
      padding: 10px; margin: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .contenedor-principal {
      background: rgba(0, 0, 0, 0.97);
      border: 2px solid #ffcc00;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 30px #000;
      text-align: center;
    }
    #banner-estado {
      padding: 15px; font-weight: bold; border-radius: 10px; margin-bottom: 20px;
      text-transform: uppercase; font-size: 1.2em; border: 1px solid rgba(255,255,255,0.2);
    }
    #lista-votables { display: flex; flex-direction: column; gap: 15px; }
    .voto-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px; border-radius: 12px; border-left: 5px solid #ffcc00;
    }
    .voto-card.es-batalla {
      border-left: 5px solid #ff4444; background: rgba(255, 0, 0, 0.15);
    }
    .nombre-piloto { font-weight: bold; font-size: 1.2em; color: #ffcc00; text-transform: uppercase; }
    .coche-piloto { font-size: 0.8em; color: #aaa; margin-bottom: 10px; font-style: italic; }
    .v-btns { display: flex; justify-content: space-around; font-size: 2.8em; margin-top: 10px; }
    .btn-voto { cursor: pointer; filter: brightness(0.5) grayscale(1); transition: 0.3s; padding: 5px; }
    .btn-voto.seleccionado { filter: none !important; transform: scale(1.2); }
    .votos-bloqueados .btn-voto { cursor: not-allowed; pointer-events: none; opacity: 0.3; }
    .timer-alerta { color: #ff4444; font-weight: bold; margin-top: 15px; font-size: 1.4em; }
    
    /* CAJA DEL ID DE SORTEO MÁS VISIBLE */
    #id-sorteo-box { 
      background: #1a1a1a;
      border: 1px dashed #ffcc00;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
    }
    #id-label { font-size: 0.7em; color: #aaa; display: block; margin-bottom: 5px; }
    #id-numero { font-size: 1.8em; color: #ffcc00; letter-spacing: 5px; }
  </style>
</head>
<body>

<div class="contenedor-principal">
  <div id="banner-estado">CONECTANDO...</div>
  
  <div id="seccion-votos" style="display:none">
    <div id="lista-votables"></div>
    <div id="cuenta-atras" class="timer-alerta"></div>
  </div>

  <div id="id-sorteo-box">
    <span id="id-label">Nº DE PARTICIPANTE PARA EL SORTEO</span>
    <span id="id-numero">-----</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const DB_URL = "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com";
  const db = getDatabase(initializeApp({ databaseURL: DB_URL }));

  // --- GENERACIÓN DE ID NUMÉRICA DE 5 CIFRAS ---
  if (!localStorage.getItem('drift_user_id')) {
    // Genera un número entre 10000 y 99999
    const numAleatorio = Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem('drift_user_id', numAleatorio.toString());
  }
  const USER_ID = localStorage.getItem('drift_user_id');
  document.getElementById('id-numero').innerText = USER_ID;

  let currentDorsalGlobal = "";
  let yaVotoEnEstaRonda = false;

  const lista = document.getElementById('lista-votables');
  const divVotos = document.getElementById('seccion-votos');
  const timerDiv = document.getElementById('cuenta-atras');

  function resetUIVotos() {
    divVotos.style.display = 'none';
    lista.innerHTML = "";
    timerDiv.innerText = "";
    currentDorsalGlobal = "";
    yaVotoEnEstaRonda = false;
  }

  // Estado Pista
  onValue(ref(db, 'estado_pista'), s => {
    const p = s.val();
    if (!p) return;
    const b = document.getElementById('banner-estado');
    b.innerText = String(p.mensaje || "").replace('🏎️ ', '');
    b.style.background = p.color || "#222";
  });

  // Votación Activa
  onValue(ref(db, 'votacion_activa'), async s => {
    const v = s.val();

    if (v && v.activa) {
      if (currentDorsalGlobal !== v.dorsal) {
        currentDorsalGlobal = v.dorsal || "";
        lista.innerHTML = "";
        
        // Comprobar si ya votó
        const check = await get(ref(db, `registro_votos/${currentDorsalGlobal}/${USER_ID}`));
        yaVotoEnEstaRonda = check.exists();
      }

      divVotos.style.display = 'block';

      if (v.items && lista.innerHTML === "") {
        Object.entries(v.items).forEach(([id, data]) => {
          crearTarjetaUI(id, data?.nombre || "", data?.coche || "");
        });
      }

      if (yaVotoEnEstaRonda) {
        lista.classList.add('votos-bloqueados');
      } else {
        lista.classList.remove('votos-bloqueados');
      }

      timerDiv.innerText = (v.timer > 0) ? `¡CIERRE EN ${v.timer}s!` : "";
    } else {
      resetUIVotos();
    }
  });

  function crearTarjetaUI(id, nombre, coche) {
    const esBatalla = id === 'BATALLA';
    const card = document.createElement('div');
    card.className = 'voto-card' + (esBatalla ? ' es-batalla' : '');
    card.id = "card-" + id;

    card.innerHTML = `
      <div class="nombre-piloto">${esBatalla ? "🔥 BATALLA 🔥" : nombre}</div>
      <div class="coche-piloto">${coche}</div>
      <div class="v-btns">
        <span class="btn-voto v-ap" onclick="enviarVoto('${id}','ap')">👏</span>
        <span class="btn-voto v-up" onclick="enviarVoto('${id}','up')">👍</span>
        <span class="btn-voto v-dw" onclick="enviarVoto('${id}','dw')">👎</span>
      </div>
    `;
    lista.appendChild(card);
  }

  window.enviarVoto = async (idVotable, tipoVoto) => {
    if (!currentDorsalGlobal || yaVotoEnEstaRonda) return;

    const updates = {};
    updates[`votacion_activa/items/${idVotable}/${tipoVoto}`] = increment(1);
    updates[`registro_votos/${currentDorsalGlobal}/${USER_ID}`] = { voto: tipoVoto, ts: Date.now() };
    updates[`participantes_sorteo/${USER_ID}/votos_totales`] = increment(1);
    updates[`participantes_sorteo/${USER_ID}/ultimo_voto`] = Date.now();

    try {
      await update(ref(db), updates);
      yaVotoEnEstaRonda = true;
      lista.classList.add('votos-bloqueados');
      
      const btn = document.querySelector(`#card-${idVotable} .v-${tipoVoto}`);
      if (btn) btn.classList.add('seleccionado');
      
      alert("¡VOTO REGISTRADO! Suerte en el sorteo.");
    } catch (e) {
      alert("Error al votar.");
    }
  };
</script>
</body>
</html>
