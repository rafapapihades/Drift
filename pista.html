<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ESTADO DE PISTA</title>

  <style>
    * { box-sizing: border-box; }
    body { background:#000; margin:0; padding:10px; height:95vh; display:flex; flex-direction:column; gap:10px; font-family:sans-serif; }

    .btn-pista { 
        flex:1; border:none; border-radius:15px; color:white; font-size:1.8em; 
        font-weight:bold; text-transform:uppercase; cursor:pointer; 
        display:flex; align-items:center; justify-content:center; text-align:center; 
    }
    
    .btn-coche { background:#007bff; }
    .btn-libre { background:#008000; }
    .btn-obs   { background:#ffcc00; color:#000; }
    .btn-acc   { background:#cc0000; }

    /* Estilo para el botón que está activo en Firebase */
    .active-now { 
        opacity:1 !important; 
        outline:8px solid #fff; 
        outline-offset:-8px; 
        box-shadow:0 0 40px rgba(255,255,255,0.6);
    }
    .btn-pista:not(.active-now) { opacity:0.2; }

    #mensaje-master {
        position:fixed;
        inset:0;
        z-index:20;
        display:none;
        align-items:center;
        justify-content:center;
        padding:18px;
        background:rgba(0,0,0,.82);
    }
    .mensaje-card {
        width:min(720px, 100%);
        border:4px solid #ffcc00;
        border-radius:18px;
        background:#111;
        color:#fff;
        padding:24px;
        text-align:center;
        box-shadow:0 0 40px rgba(255,204,0,.35);
    }
    .mensaje-card h2 {
        margin:0 0 14px;
        color:#ffcc00;
        font-size:2.1em;
    }
    #mensaje-texto {
        margin:0 0 22px;
        font-size:2.4em;
        line-height:1.18;
        font-weight:900;
        white-space:pre-wrap;
    }
    .mensaje-card button {
        width:100%;
        border:0;
        border-radius:14px;
        padding:18px;
        background:#ffcc00;
        color:#000;
        font-size:1.8em;
        font-weight:900;
        text-transform:uppercase;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <div id="mensaje-master">
    <div class="mensaje-card">
      <h2>MENSAJE DE MASTER</h2>
      <p id="mensaje-texto"></p>
      <button onclick="confirmarMensajeMaster()">OK</button>
    </div>
  </div>

  <button id="btn-libre" class="btn-pista btn-libre" onclick="enviarEstado('PISTA LIBRE', '#008000', 'btn-libre')">PISTA LIBRE</button>
  <button id="btn-obs" class="btn-pista btn-obs" onclick="enviarEstado('OBSTÁCULO', '#ffcc00', 'btn-obs')">OBSTÁCULO</button>
  <button id="btn-acc" class="btn-pista btn-acc" onclick="enviarEstado('ACCIDENTE', '#cc0000', 'btn-acc')">ACCIDENTE</button>

  <button id="btn-coche" class="btn-pista btn-coche" onclick="enviarEstado('COCHE EN PISTA', '#007bff', 'btn-coche')">COCHE EN PISTA</button>

  <script>
    // CONFIGURACIÓN
    const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SESSION_KEY = 'drift_pista_session_id';
    const LAST_READ_KEY = 'drift_pista_last_read_ts';
    const sessionId = localStorage.getItem(SESSION_KEY) || ('PISTA-' + Math.random().toString(36).slice(2, 7).toUpperCase());
    localStorage.setItem(SESSION_KEY, sessionId);
    const sessionRef = db.ref('pista_sessions/' + sessionId);
    let mensajeActivoTs = 0;
    let vibracionMensajeTimer = null;

    function actualizarSesion(extra = {}) {
      sessionRef.update({
        lastSeen: Date.now(),
        ua: navigator.userAgent,
        ...extra
      });
    }
    function iniciarVibracionMensaje() {
      if (!navigator.vibrate || vibracionMensajeTimer) return;
      navigator.vibrate([220, 140, 220, 140, 420]);
      vibracionMensajeTimer = setInterval(() => {
        const panelVisible = document.getElementById('mensaje-master').style.display === 'flex';
        if (!panelVisible) return detenerVibracionMensaje();
        navigator.vibrate([220, 140, 220, 140, 420]);
      }, 1600);
    }
    function detenerVibracionMensaje() {
      if (vibracionMensajeTimer) clearInterval(vibracionMensajeTimer);
      vibracionMensajeTimer = null;
      if (navigator.vibrate) navigator.vibrate(0);
    }

    actualizarSesion();
    setInterval(() => actualizarSesion(), 8000);
    sessionRef.onDisconnect().update({ lastSeen: 0 });

    // MANDAR ESTADO
    window.enviarEstado = async (msg, col, id) => {
      if (navigator.vibrate) navigator.vibrate(60); // Vibración táctil
      await db.ref('estado_pista').set({ 
        mensaje: msg, 
        color: col, 
        id: id,
        ts: Date.now() 
      });
      if(id === 'btn-libre') iniciarCierreVotacionGlobal();
    };

    async function iniciarCierreVotacionGlobal(){
      const snap = await db.ref('votacion_activa').once('value');
      const v = snap.val();
      if(!v || !v.activa || Number(v.timer || 0) > 0) return;
      let count = 10;
      await db.ref('votacion_activa').update({ timer: count });
      if(v.items) {
        Object.keys(v.items).forEach(idItem => {
          db.ref('votacion_activa/items/' + idItem).update({ timer: count, cerrando: true });
        });
      }
      const interval = setInterval(async () => {
        count--;
        const updates = { 'votacion_activa/timer': count };
        Object.keys((v && v.items) || {}).forEach(idItem => updates['votacion_activa/items/' + idItem + '/timer'] = count);
        await db.ref().update(updates);
        if(count <= 0) {
          clearInterval(interval);
          const finalSnap = await db.ref('votacion_activa').once('value');
          const finalV = finalSnap.val();
          if(finalV && finalV.items) {
            Object.entries(finalV.items).forEach(([idItem, data]) => {
              if((data.ap||0)+(data.up||0)+(data.dw||0) > 0) {
                db.ref('historial_votos').push({ dorsal:idItem, info:data.nombre, participantes:(idItem === 'BATALLA' ? finalV.dorsal : ''), ap:data.ap||0, up:data.up||0, dw:data.dw||0, ts:Date.now() });
              }
            });
          }
          await db.ref('votacion_activa').set({ activa:false, timer:0, dorsal:"" });
        }
      }, 1000);
    }

    // RECIBIR ESTADO (Para que el botón se ilumine si el Master o alguien lo cambia)
    db.ref('estado_pista').on('value', (s) => {
      const data = s.val();
      // Quitamos el brillo a todos
      document.querySelectorAll('.btn-pista').forEach(b => b.classList.remove('active-now'));
      
      if(data && data.id) {
        const btnActivo = document.getElementById(data.id);
        if(btnActivo) btnActivo.classList.add('active-now');
      }
    });

    db.ref('mensaje_pista').on('value', (snap) => {
      const data = snap.val();
      const panel = document.getElementById('mensaje-master');
      const texto = document.getElementById('mensaje-texto');

      if(data && data.texto && data.ts) {
        mensajeActivoTs = data.ts;
        texto.innerText = data.texto;
        const leidoLocal = Number(localStorage.getItem(LAST_READ_KEY) || 0);
        const pendiente = leidoLocal < data.ts;
        panel.style.display = pendiente ? 'flex' : 'none';
        actualizarSesion({ lastMessageTs: data.ts });
        if (pendiente) iniciarVibracionMensaje();
        else detenerVibracionMensaje();
      } else {
        mensajeActivoTs = 0;
        texto.innerText = '';
        panel.style.display = 'none';
        detenerVibracionMensaje();
        actualizarSesion({ lastMessageTs: 0 });
      }
    });

    window.confirmarMensajeMaster = () => {
      if(!mensajeActivoTs) return;
      document.getElementById('mensaje-master').style.display = 'none';
      localStorage.setItem(LAST_READ_KEY, String(mensajeActivoTs));
      detenerVibracionMensaje();
      actualizarSesion({ lastReadTs: mensajeActivoTs });
    };
  </script>
</body>
</html>
