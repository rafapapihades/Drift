<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PISTA - DRIFT SHOW</title>

  <style>
    * { box-sizing: border-box; }
    body { background:#000; margin:0; padding:10px; height:90vh; display:flex; flex-direction:column; gap:10px; font-family:sans-serif; overflow:hidden; }

    .btn-pista { flex:1; border:none; border-radius:15px; color:white; font-size:1.8em; font-weight:bold; text-transform:uppercase; cursor:pointer; transition:0.3s; display:flex; align-items:center; justify-content:center; text-align:center; padding:10px; }
    .btn-libre { background:#008000; }
    .btn-coche { background:#007bff; }
    .btn-obs   { background:#ffcc00; color:#000; }
    .btn-acc   { background:#cc0000; }

    .active-now { opacity:1 !important; outline:6px solid #fff; outline-offset:-6px; box-shadow:0 0 40px rgba(255,255,255,0.5); transform: scale(0.98); }
    .btn-pista:not(.active-now) { opacity:0.3; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <button id="btn-coche" class="btn-pista btn-coche" onclick="activarVotoPista()">🏎️ COCHE EN PISTA</button>
  <button id="btn-libre" class="btn-pista btn-libre" onclick="enviarEstado('🟢 PISTA LIBRE', '#008000', 'btn-libre')">PISTA LIBRE</button>
  <button id="btn-obs" class="btn-pista btn-obs" onclick="enviarEstado('⚠️ OBSTÁCULO', '#ffcc00', 'btn-obs')">OBSTÁCULO</button>
  <button id="btn-acc" class="btn-pista btn-acc" onclick="enviarEstado('🔴 ACCIDENTE', '#cc0000', 'btn-acc')">ACCIDENTE</button>

  <script>
    const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getOnce(path) {
      return db.ref(path).once('value');
    }

    // Al pulsar COCHE EN PISTA
    window.activarVotoPista = async () => {
      const snapVot = await getOnce('votacion_activa');
      const vot = snapVot.val();

      if(!vot || !vot.activa || !vot.dorsal){
        alert("Primero deben poner el dorsal en CONTROL MASTER");
        return;
      }
      
      // Cambiamos el estado visual
      enviarEstado('🏎️ EN PISTA: ' + vot.dorsal, '#007bff', 'btn-coche');
      // Aseguramos que el público vea la pestaña de votar
      await db.ref('modo_actual').set('tab-show');
    };

    window.enviarEstado = async (msg, col, id) => {
      if (navigator.vibrate) navigator.vibrate(60);
      
      // Actualizamos el estado general
      await db.ref('estado_pista').set({ mensaje: msg, color: col, id: id });

      if(id === 'btn-libre'){
        // --- CAMBIO CLAVE 1: Limpia el dorsal en el Master ---
        await db.ref('comando_limpiar').set(Date.now());

        // --- CAMBIO CLAVE 2: Permite que el público vuelva a votar ---
        await db.ref('registro_votos').set(null);

        const snap = await getOnce('votacion_activa');
        const v = snap.val();

        if(v && v.activa){
          // Guardar resultados en el historial antes de cerrar
          Object.entries(v.items).forEach(([idItem, data]) => {
            if((data.ap||0)+(data.up||0)+(data.dw||0) > 0){
              db.ref('historial_votos').push({
                dorsal: idItem, info: data.nombre, 
                ap: data.ap||0, up: data.up||0, dw: data.dw||0, 
                ts: Date.now()
              });
            }
          });

          // Cuenta atrás de 5 segundos para que dejen de llegar votos
          let count = 5;
          await db.ref('votacion_activa').update({ timer: count });
          const interval = setInterval(async () => {
            count--;
            await db.ref('votacion_activa').update({ timer: count });
            if(count <= 0){
              clearInterval(interval);
              await db.ref('votacion_activa').set({ activa:false, timer:0, dorsal:"" });
            }
          }, 1000);
        }
      }
    };

    // Escuchar cambios para iluminar el botón activo en este móvil
    db.ref('estado_pista').on('value', (s) => {
      document.querySelectorAll('.btn-pista').forEach(b => b.classList.remove('active-now'));
      const data = s.val();
      if(data && data.id) {
        const btn = document.getElementById(data.id);
        if(btn) btn.classList.add('active-now');
      }
    });
  </script>
</body>
</html>
