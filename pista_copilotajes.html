<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #003399; --orange: #fd7e14; --grey: #444; }
        
        body { 
            background-image: url('Fibra3.png'); 
            background-repeat: repeat; 
            background-color: var(--bg);
            color: #fff; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            padding: 10px; margin: 0; 
        }

        .header { 
            text-align: center; padding: 15px; 
            background: rgba(0,0,0,0.9); border-radius: 12px;
            border-bottom: 3px solid var(--red); margin-bottom: 15px; 
        }

        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; object-fit: contain; }

        .card { background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        .section-title { font-size: 0.85em; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        .matricula { display: inline-flex; align-items: center; background: #fff; color: #000; border-radius: 4px; overflow: hidden; font-family: 'Arial', sans-serif; font-weight: 900; border: 1px solid #fff; margin-top: 5px; }
        .m-bandera { background: var(--blue); color: white; padding: 4px 5px; font-size: 0.6em; text-align: center; line-height: 1; }
        .m-num { padding: 2px 12px; font-size: 1.4em; min-width: 35px; text-align: center; }

        .n-doc { background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: 900; margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 8px; border-bottom: 1px solid #222; }

        /* Botones */
        .btn-recinto { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.75em; box-shadow: 0 4px 0 #002266; }
        .btn-pista { background: var(--green); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.85em; box-shadow: 0 4px 0 #155d27; }
        .btn-salida { background: var(--orange); color: white; border: none; padding: 12px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.75em; box-shadow: 0 4px 0 #a04e0e; }
        .btn-change { background: #222; color: var(--accent); border: 1px solid #444; padding: 8px; border-radius: 6px; font-size: 0.6em; cursor: pointer; margin-top: 8px; text-transform: uppercase; width: 100%; font-weight: bold; }

        #modal-cambio, #custom-confirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); width: 90%; max-width: 450px; text-align: center; }
        .select-modal { width: 100%; padding: 15px; margin: 20px 0; background: #000; color: #fff; border: 1px solid var(--accent); border-radius: 8px; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logotaxi.jpg" alt="Logo" class="header-logo">
    </div>

    <input type="search" id="buscador" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:10px; margin-bottom:15px;" placeholder="🔍 BUSCAR DORSAL O NOMBRE..." oninput="filtrar()">

    <div class="card">
        <div class="section-title">⏳ 1. COLA DE ACCESO (PENDIENTES)</div>
        <table><tbody id="lista-cola-acceso"></tbody></table>
    </div>

    <div class="card" style="border-color: var(--blue);">
        <div class="section-title" style="color: var(--blue);">📍 2. ESPERA EN RECINTO (LISTOS)</div>
        <table><tbody id="lista-espera-recinto"></tbody></table>
    </div>

    <div class="card" style="border-color: var(--green);">
        <div class="section-title" style="color: var(--green);">🏁 3. EN PISTA / RETORNO</div>
        <table><tbody id="lista-pista-activa"></tbody></table>
    </div>

    <div id="modal-cambio">
        <div class="modal-content">
            <h3 style="color: var(--accent);">REASIGNAR COCHE</h3>
            <select id="nuevo-piloto-select" class="select-modal"></select>
            <button class="btn-pista" onclick="ejecutarCambio()">REASIGNAR</button><br><br>
            <button onclick="cerrarModal()" style="background:none; color:white; border:none; cursor:pointer;">VOLVER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, get, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let idSeleccionado = null;
        let listaPilotosActivos = [];

        function generarMatriculaHTML(pilotoData) {
            const d = pilotoData.match(/\[#(\d+)\]/) || pilotoData.match(/^(\d+)/);
            const num = d ? d[1] : "??";
            const nom = pilotoData.replace(/\[#\d+\]/, "").replace(/^\d+[\s,.-]*/, "").split('|')[0].trim();
            return `<div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                        <div class="matricula"><div class="m-bandera">E</div><div class="m-num">${num}</div></div>
                        <span style="font-size:0.9em; color:#bbb;">${nom}</span>
                    </div>`;
        }

        // ACCIONES
        window.marcarEnRecinto = (id) => update(ref(db, `copilotajes/espera/${id}`), { enRecinto: true });
        
        window.confirmarSubida = async (id) => {
            const snap = await get(ref(db, `copilotajes/espera/${id}`));
            if(snap.exists()){
                const d = snap.val();
                const dMatch = d.piloto.match(/\[#(\d+)\]/) || d.piloto.match(/^(\d+)/);
                const dorsal = dMatch ? dMatch[1] : "0";
                
                // Activar Speaker
                await update(ref(db, 'votacion_activa'), { activa: true });
                await set(ref(db, `votacion_activa/items/${dorsal}`), {
                    nombre: `${d.piloto.split('|')[0].replace(/\[.*?\]/g,'').trim()} & ${d.copiloto}`,
                    coche: "TAXI DRIFT", ap:0, up:0, dw:0
                });

                // Mover a Pista
                const newRef = push(ref(db, 'copilotajes/completados'));
                await set(newRef, { ...d, horaPista: new Date().toLocaleTimeString(), finalizado: false });
                await remove(ref(db, `copilotajes/espera/${id}`));
            }
        };

        window.confirmarSalidaRecinto = async (id) => {
            if(confirm("¿ACOMPAÑADO A SALIDA?")) {
                await update(ref(db, `copilotajes/completados/${id}`), { finalizado: true });
            }
        };

        window.abrirModalCambio = (id) => { idSeleccionado = id; document.getElementById('modal-cambio').style.display = 'flex'; };
        window.cerrarModal = () => document.getElementById('modal-cambio').style.display = 'none';
        window.ejecutarCambio = async () => {
            await update(ref(db, `copilotajes/espera/${idSeleccionado}`), { piloto: document.getElementById('nuevo-piloto-select').value });
            cerrarModal();
        };

        // ESCUCHA DE DATOS
        onValue(ref(db, 'copilotajes'), (snap) => {
            const data = snap.val() || {};
            
            // Pilotos para el modal
            const config = data.config_pilotos ? Object.values(data.config_pilotos) : [];
            const bajas = data.pilotos_baja ? Object.values(data.pilotos_baja) : [];
            listaPilotosActivos = config.filter(p => !bajas.includes(p));
            document.getElementById('nuevo-piloto-select').innerHTML = listaPilotosActivos.map(p => `<option value="${p}">${p}</option>`).join('');

            const tCola = document.getElementById('lista-cola-acceso');
            const tRecinto = document.getElementById('lista-espera-recinto');
            const tPista = document.getElementById('lista-pista-activa');

            tCola.innerHTML = ""; tRecinto.innerHTML = ""; tPista.innerHTML = "";

            if(data.espera) {
                Object.entries(data.espera).sort((a,b)=>a[1].nPapel - b[1].nPapel).forEach(([id, item]) => {
                    const html = `<tr><td>
                        <span class="n-doc">${item.nPapel.toString().padStart(3,'0')}</span> <b>${item.copiloto}</b>
                        ${generarMatriculaHTML(item.piloto)}
                        <button class="btn-change" onclick="abrirModalCambio('${id}')">🔄 REASIGNAR</button>
                    </td><td style="width:110px">`;
                    
                    if(!item.enRecinto) {
                        tCola.innerHTML += html + `<button class="btn-recinto" onclick="marcarEnRecinto('${id}')">LLEGÓ</button></td></tr>`;
                    } else {
                        tRecinto.innerHTML += html + `<button class="btn-pista" onclick="confirmarSubida('${id}')">A PISTA</button></td></tr>`;
                    }
                });
            }

            if(data.completados) {
                Object.entries(data.completados).filter(x => !x[1].finalizado).forEach(([id, item]) => {
                    tPista.innerHTML += `<tr><td>
                        <span class="n-doc" style="background:#444; color:#fff">${item.nPapel.toString().padStart(3,'0')}</span> <b>${item.copiloto}</b>
                        ${generarMatriculaHTML(item.piloto)}
                    </td><td style="width:110px"><button class="btn-salida" onclick="confirmarSalidaRecinto('${id}')">SALIDA</button></td></tr>`;
                });
            }
        });

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tr').forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none');
        };
    </script>
</body>
</html>
