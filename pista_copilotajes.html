<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #007bff; --orange: #fd7e14; }
        * { box-sizing: border-box; }
        body { 
            background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg);
            color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; 
        }
        .header { text-align: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border-bottom: 3px solid var(--red); margin-bottom: 15px; }
        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; }
        
        .pista-status-bar { width: 100%; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 1.2em; border: 2px solid #333; }
        
        .container { display: flex; flex-direction: column; gap: 20px; }
        .column { background: rgba(20,20,20,0.9); padding: 15px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: var(--accent); text-transform: uppercase; font-size: 1.1em; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #888; font-size: 0.8em; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.9em; }

        .btn { padding: 10px 15px; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8em; }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        
        .time-info { color: var(--accent); font-family: monospace; font-size: 1.1em; }
        .ticket-num { background: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; color: var(--accent); }
        
        #buscador { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; margin-bottom: 10px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="header-logo" alt="Logo">
        <div style="margin-top:10px; color:var(--accent)">CONTROL DE TIEMPOS EN PISTA</div>
    </div>

    <input type="text" id="buscador" placeholder="🔍 BUSCAR CO-PILOTO O TICKET..." onkeyup="filtrar()">

    <div class="container">
        <div class="column">
            <h2>⏱️ ESPERANDO EN RECINTO</h2>
            <table>
                <thead>
                    <tr>
                        <th>TICKET</th>
                        <th>CO-PILOTO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tabla-recinto"></tbody>
            </table>
        </div>

        <div class="column" style="border-color: var(--blue);">
            <h2 style="color: var(--blue);">🏎️ EN PISTA</h2>
            <table>
                <thead>
                    <tr>
                        <th>TICKET</th>
                        <th>PILOTO / CO-PILOTO</th>
                        <th>TIEMPO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tabla-pista"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Función para dar formato de hora HH:MM
        function formatoHora() {
            return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        // 1. PASAR DE RECINTO A PISTA
        window.entrarPista = async (id, item) => {
            const updates = {};
            const ahora = Date.now();
            
            const itemActualizado = {
                ...item,
                ts_entrada: ahora,
                horaEntradaTexto: formatoHora(),
                estado: "EN PISTA"
            };

            updates[`copilotajes/pista/${id}`] = itemActualizado;
            updates[`copilotajes/espera/${id}`] = null;
            
            await db.ref().update(updates);
        };

        // 2. FINALIZAR VIAJE (CALCULA DURACIÓN Y HORA SALIDA)
        window.finalizarViaje = async (id, item) => {
            const ahora = Date.now();
            const inicio = item.ts_entrada || ahora;
            const diff = ahora - inicio;
            
            // Calcular minutos y segundos
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const duracionStr = `${m}:${s.toString().padStart(2, '0')}`;

            const itemFinal = {
                ...item,
                ts_salida: ahora,
                horaSalidaTexto: formatoHora(),
                duracionTotal: duracionStr,
                estado: "FINALIZADO",
                finalizado: true
            };

            const updates = {};
            updates[`copilotajes/completados/${id}`] = itemFinal;
            updates[`copilotajes/pista/${id}`] = null;

            if(confirm(`¿Finalizar viaje de ${item.copiloto}? Duración: ${duracionStr}`)) {
                await db.ref().update(updates);
            }
        };

        function generarFilaHTML(id, item, esRecinto) {
            if (esRecinto) {
                return `
                    <tr>
                        <td><span class="ticket-num">${item.nPapel}</span></td>
                        <td><b>${item.copiloto}</b><br><small>${item.piloto || 'Sin asignar'}</small></td>
                        <td><button class="btn btn-blue" onclick='entrarPista("${id}", ${JSON.stringify(item)})'>ENTRA PISTA ▶️</button></td>
                    </tr>
                `;
            } else {
                return `
                    <tr>
                        <td><span class="ticket-num">${item.nPapel}</span></td>
                        <td><b>${item.piloto}</b><br><small>con ${item.copiloto}</small></td>
                        <td class="time-info" data-ts="${item.ts_entrada}">
                            <span class="cronometro">0:00</span>
                        </td>
                        <td><button class="btn btn-red" onclick='finalizarViaje("${id}", ${JSON.stringify(item)})'>FIN ✅</button></td>
                    </tr>
                `;
            }
        }

        function renderizarTodo(snap) {
            const data = snap.val() || {};
            const tRecinto = document.getElementById('tabla-recinto');
            const tPista = document.getElementById('tabla-pista');
            
            tRecinto.innerHTML = "";
            tPista.innerHTML = "";

            if(data.espera) {
                Object.entries(data.espera).forEach(([id, item]) => {
                    tRecinto.innerHTML += generarFilaHTML(id, item, true);
                });
            }

            if(data.pista) {
                Object.entries(data.pista).forEach(([id, item]) => {
                    tPista.innerHTML += generarFilaHTML(id, item, false);
                });
            }
            filtrar();
        }

        db.ref('copilotajes').on('value', renderizarTodo);

        // Cronómetro visual para la tabla
        setInterval(() => {
            document.querySelectorAll('.time-info').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'));
                const diff = Date.now() - ts;
                const m = Math.floor(diff/60000);
                const s = Math.floor((diff%60000)/1000);
                el.querySelector('.cronometro').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            });
        }, 1000);

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tbody tr').forEach(tr => {
                tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none';
            });
        };
    </script>
</body>
</html>
