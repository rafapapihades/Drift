<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #007bff; --orange: #fd7e14; }
        * { box-sizing: border-box; }
        body { 
            background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg);
            color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; 
        }
        .header { text-align: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border-bottom: 3px solid var(--red); margin-bottom: 15px; }
        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; }
        .event-title { color:var(--accent); font-weight:900; text-transform:uppercase; margin-top:8px; }
        
        .pista-status-bar {
            width: 100%; padding: 15px; border-radius: 10px; text-align: center;
            font-size: 1.2em; font-weight: 900; text-transform: uppercase;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .card { background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        .section-title { font-size: 0.85em; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        .n-doc { background: var(--accent); color: #000; padding: 8px 12px; border-radius: 8px; font-weight: 900; margin-right: 10px; font-size: 2.2em; display: inline-block; line-height: 1; }
        .matricula { display: inline-flex; align-items: center; background: #fff; color: #000; border-radius: 4px; overflow: hidden; border: 1px solid #fff; margin-top: 5px; }
        .m-bandera { background: #003399; color: white; padding: 4px 5px; font-size: 0.6em; }
        .m-num { padding: 2px 12px; font-size: 1.4em; font-weight: 900; }
        .time-info { font-size: 0.75em; color: #00ff99; display: block; margin-top: 8px; font-family: sans-serif; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 8px; border-bottom: 1px solid #222; }

        .btn-recinto { background: #003399; color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #002266; }
        .btn-pista { background: var(--green); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #155d27; }
        .btn-salida { background: var(--orange); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #a04e0e; }
        .btn-devolver { background: #333; color: #aaa; border: 1px solid #444; padding: 8px; border-radius: 6px; font-size: 0.65em; cursor: pointer; margin-top: 8px; width: 100%; }
        .btn-reasignar { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.6em; cursor: pointer; margin-top: 8px; }
        .btn-incidencia { background: #8b0000; color: #fff; border: 1px solid #ff3333; padding: 8px; border-radius: 6px; font-size: 0.65em; cursor: pointer; margin-top: 8px; width: 100%; font-weight: 900; }
        .incidencia-count { color: #ff6666; font-size: 0.8em; margin: -8px 0 12px; font-family: sans-serif; font-weight: bold; text-align: center; }
        .show-grid { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: stretch; }
        .show-select { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; font-size: 1em; font-weight: bold; }
        .btn-show { background: #6b1b8f; color: #fff; border: none; border-radius: 10px; padding: 12px 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #3b0f50; }
        .badge-show { background:#6b1b8f; color:#fff; border-radius:6px; padding:4px 8px; font-size:.72em; font-weight:900; margin-left:6px; }
        .piloto-preview { display:flex; align-items:center; gap:10px; margin-top:10px; padding:8px; border:1px solid #333; border-radius:10px; background:#050505; text-align:left; font-family:Arial, sans-serif; }
        .piloto-preview img { width:74px; height:42px; object-fit:cover; border-radius:6px; border:1px solid #444; background:#000; flex:0 0 auto; }
        .piloto-preview b { display:block; color:var(--accent); font-size:.9em; line-height:1.15; }
        .piloto-preview span { display:block; color:#aaa; font-size:.75em; margin-top:2px; }
        .piloto-preview.empty { color:#777; font-weight:900; justify-content:center; }
        .selector-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
        .btn-mini-save, .btn-mini-cancel { border:0; border-radius:8px; padding:10px 8px; font-weight:900; cursor:pointer; }
        .btn-mini-save { background:var(--green); color:#fff; }
        .btn-mini-cancel { background:#333; color:#fff; }
        
        .selector-rapido { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 5px; border-radius: 5px; width: 100%; margin-top: 5px; font-size: 0.9em; }
        .incidencia-field { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; margin-top: 10px; font-family: sans-serif; font-size: 1em; }
        textarea.incidencia-field { min-height: 95px; resize: vertical; }

        #buscador { width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 1.1em; }

        #custom-confirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); width: 90%; max-width: 400px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="custom-confirm">
        <div class="modal-content">
            <h2 id="confirm-text" style="color:white; margin:0; font-size: 1.1em;">¿CONFIRMAR?</h2>
            <div class="modal-btns">
                <button class="btn-modal" style="background:#444;" onclick="handleConfirm(false)">CANCELAR</button>
                <button class="btn-modal" style="background:var(--orange);" onclick="handleConfirm(true)">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div id="modal-incidencia" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1001; align-items:center; justify-content:center; padding:18px;">
        <div class="modal-content" style="max-width:520px; text-align:left;">
            <h2 style="color:#ff3333; margin:0 0 12px; text-align:center;">REGISTRAR INCIDENCIA</h2>
            <label style="font-size:0.75em; color:#aaa;">Piloto</label>
            <select id="incidencia-piloto" class="incidencia-field"></select>
            <label style="font-size:0.75em; color:#aaa; display:block; margin-top:10px;">Tipo de incidencia</label>
            <select id="incidencia-tipo" class="incidencia-field">
                <option>Copiloto no registrado / subido sin autorización</option>
                <option>Aviso verbal</option>
                <option>Ignora indicaciones de pista</option>
                <option>Conducción peligrosa</option>
                <option>Otro</option>
            </select>
            <label style="font-size:0.75em; color:#aaa; display:block; margin-top:10px;">Observaciones</label>
            <textarea id="incidencia-obs" class="incidencia-field" placeholder="Ej: Sube a un amigo sin pasar por registro."></textarea>
            <div class="modal-btns">
                <button class="btn-modal" style="background:#444;" onclick="cerrarIncidencia()">CANCELAR</button>
                <button class="btn-modal" style="background:#8b0000;" onclick="guardarIncidencia()">REGISTRAR</button>
            </div>
        </div>
    </div>

    <div class="header"><img src="logotaxi.jpg" alt="Logo" class="header-logo"><div id="event-title" class="event-title"></div></div>
    
    <div id="status-bar" class="pista-status-bar" style="background: #222; color: #fff;">ESTADO: CONECTANDO...</div>
    <div id="incidencias-count" class="incidencia-count"></div>

    <div class="card" style="border-color:#6b1b8f;">
        <div class="section-title" style="color:#d987ff;">SHOW SIN COPILOTO</div>
        <div class="show-grid">
            <select id="show-piloto" class="show-select" onchange="previsualizarShowPiloto()"></select>
            <button class="btn-show" onclick="sacarShowPista()">SACAR SHOW</button>
        </div>
        <div id="show-piloto-preview" class="piloto-preview empty">Selecciona piloto</div>
    </div>

    <input type="search" id="buscador" placeholder="🔍 BUSCAR TURNO O NOMBRE..." oninput="filtrar()">

    <div class="card">
        <div class="section-title">⏳ 1. COLA DE ACCESO (PENDIENTES)</div>
        <table id="lista-cola-acceso"></table>
    </div>

    <div class="card" style="border-color: var(--orange);">
        <div class="section-title" style="color: var(--orange);">📍 2. ESPERA EN RECINTO (LISTOS)</div>
        <table id="lista-espera-recinto"></table>
    </div>

    <div class="card" style="border-color: var(--green);">
        <div class="section-title" style="color: var(--green);">🏁 3. EN PISTA / RETORNO</div>
        <table id="lista-pista-activa"></table>
    </div>

    <script>
        firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
        const db = firebase.database();

        let confirmAction = null;
        let pilotosDisponibles = [];
        let fichasPilotos = {};
        let incidenciaItemActual = null;
        let salidasPista = {};

        db.ref('config_evento').on('value', s => {
            const cfg = s.val() || {};
            document.getElementById('event-title').innerText = cfg.nombre || "";
        });

        window.showConfirm = (texto, cb) => {
            document.getElementById('confirm-text').innerText = texto;
            document.getElementById('custom-confirm').style.display = 'flex';
            confirmAction = cb;
        };
        window.handleConfirm = (v) => {
            document.getElementById('custom-confirm').style.display = 'none';
            if(v && confirmAction) confirmAction();
            confirmAction = null;
        };

        db.ref('estado_pista').on('value', s => {
            const d = s.val();
            if(d) {
                const bar = document.getElementById('status-bar');
                bar.innerText = d.mensaje; 
                bar.style.background = d.color;
                bar.style.color = (d.color === '#ffcc00' || d.color === 'yellow') ? '#000' : '#fff';
            }
        });

        db.ref('inscritos_drift').on('value', s => {
            const data = s.val() || {};
            fichasPilotos = data;
            pilotosDisponibles = Object.entries(data).map(([dorsal, p]) => {
                return { dorsal, label: `[#${dorsal}] ${p.piloto} | ${p.coche}` };
            });
            renderSelectorShow();
        });

        db.ref('copilotajes').on('value', s => {
            const data = s.val() || {};
            const config = data.config_pilotos || [];
            const bajas = data.pilotos_baja || [];
            const activos = config.filter(p => !bajas.includes(p));
            if(activos.length) {
                pilotosDisponibles = activos.map(p => {
                    const dorsal = extraerDorsal(p);
                    const ficha = obtenerFichaPiloto(dorsal);
                    const label = dorsal && ficha && (ficha.piloto || ficha.alias || ficha.coche)
                        ? `[#${dorsal}] ${ficha.alias || ficha.piloto || ''} | ${ficha.coche || ''}`
                        : p;
                    return { dorsal, label };
                });
            }
        });

        db.ref('copilotajes/incidencias').on('value', s => {
            const total = Object.keys(s.val() || {}).length;
            document.getElementById('incidencias-count').innerText = total ? `Incidencias registradas: ${total}` : "";
        });

        db.ref('salidas_pista').on('value', s => {
            salidasPista = s.val() || {};
            renderizarTodo();
        });

        function renderSelectorShow() {
            const sel = document.getElementById('show-piloto');
            if(!sel) return;
            const opts = Object.entries(fichasPilotos || {})
                .filter(([d, p]) => p && p.activoShow !== false)
                .sort((a,b) => Number(a[0]) - Number(b[0]))
                .map(([dorsal, p]) => {
                    const label = `[#${dorsal}] ${p.alias || p.piloto || ''} | ${p.coche || p.vehiculo || ''}`;
                    return `<option value="${escapeAttr(label)}">${escapeHtml(label)}</option>`;
                }).join('');
            sel.innerHTML = opts || '<option value="">Sin pilotos show activos</option>';
            previsualizarShowPiloto();
        }

        window.previsualizarShowPiloto = () => {
            const sel = document.getElementById('show-piloto');
            const cont = document.getElementById('show-piloto-preview');
            if(!sel || !cont) return;
            cont.innerHTML = htmlPreviewPiloto(sel.value);
            cont.classList.toggle('empty', !sel.value);
        };

        function generarFilaHTML(id, item, esRecinto, esPista) {
            const dMatch = item.piloto.match(/\[#(\d+)\]/) || item.piloto.match(/^(\d+)/);
            const num = dMatch ? dMatch[1] : "??";
            const nom = item.piloto.replace(/\[#\d+\]/, "").split('|')[0].trim();

            let botones = "";
            if (esPista) {
                botones = `<button class="btn-salida" onclick="confirmarSalidaRecinto('${id}')">FINALIZAR</button>`;
            } else if (esRecinto) {
                botones = `
                    <button class="btn-pista" onclick="confirmarSubida('${id}')">SALIR PISTA</button>
                    <button class="btn-devolver" onclick="sacarDeRecinto('${id}')">↩ COLA</button>
                `;
            } else {
                botones = `<button class="btn-recinto" onclick="marcarEnRecinto('${id}')">RECOGER</button>`;
            }
            botones += `<button class="btn-incidencia" onclick="abrirIncidencia('${id}')">INCIDENCIA</button>`;

            return `
                <tr id="row-${id}">
                    <td>
                        <span class="n-doc" ${esPista ? 'style="background:#444;color:#fff"' : ''}>
                            ${item.nPapel.toString().padStart(3, '0')}
                        </span>
                        <b style="font-size:1.1em">${item.copiloto}</b><br>
                        <div id="cont-p-${id}">
                            <div class="matricula">
                                <div class="m-bandera">E</div>
                                <div class="m-num">${num}</div>
                            </div>
                            <small style="color:#aaa;margin-left:5px">${nom}</small>
                            ${(esRecinto || esPista) ? `<br><button class="btn-reasignar" onclick="activarSelector('${id}','${item.piloto}')">REASIGNAR</button>` : ''}
                        </div>
                        ${esPista ? `<span class="time-info" data-ts="${item.tsEntrada}">⏱️ <span class="cronometro">...</span></span>` : ''}
                    </td>
                    <td style="width:115px">${botones}</td>
                </tr>
            `;
        }

        function generarFilaShowHTML(id, item) {
            const dorsal = item.dorsal || extraerDorsal(item.pilotoTexto) || "?";
            const piloto = item.piloto || limpiarNombrePiloto(item.pilotoTexto);
            const coche = item.coche || "";
            return `
                <tr id="row-show-${id}">
                    <td>
                        <span class="n-doc" style="background:#6b1b8f;color:#fff">${String(dorsal).padStart(3, '0')}</span>
                        <b style="font-size:1.1em">${escapeHtml(piloto)}</b><span class="badge-show">SHOW</span><br>
                        <small style="color:#aaa;margin-left:5px">${escapeHtml(coche)}</small>
                        <span class="time-info" data-ts="${item.tsEntrada}">⏱ <span class="cronometro">...</span></span>
                    </td>
                    <td style="width:115px">
                        <button class="btn-salida" onclick="finalizarShowPista('${id}')">FINALIZAR</button>
                        <button class="btn-incidencia" onclick="abrirIncidenciaShow('${id}')">INCIDENCIA</button>
                    </td>
                </tr>
            `;
        }

        window.activarSelector = (id, actual) => {
            const cont = document.getElementById(`cont-p-${id}`);
            let opts = pilotosDisponibles.map(p => `<option value="${escapeAttr(p.label)}" ${p.label === actual ? 'selected' : ''}>${escapeHtml(p.label)}</option>`).join('');
            cont.innerHTML = `
                <select id="sel-piloto-${id}" class="selector-rapido" onchange="previsualizarPilotoAsignado('${id}', this.value)">
                    <option value="" disabled>Selecciona Piloto...</option>
                    ${opts}
                </select>
                <div id="preview-piloto-${id}" class="piloto-preview"></div>
                <div class="selector-actions">
                    <button class="btn-mini-save" onclick="guardarPiloto('${id}', document.getElementById('sel-piloto-${id}').value)">GUARDAR</button>
                    <button class="btn-mini-cancel" onclick="renderizarTodo()">CANCELAR</button>
                </div>`;
            previsualizarPilotoAsignado(id, document.getElementById(`sel-piloto-${id}`).value);
        };

        window.previsualizarPilotoAsignado = (id, valor) => {
            const cont = document.getElementById(`preview-piloto-${id}`);
            if(!cont) return;
            cont.innerHTML = htmlPreviewPiloto(valor);
            cont.classList.toggle('empty', !valor);
        };

        window.guardarPiloto = async (id, nuevo) => {
            if(!nuevo) return alert("Selecciona piloto.");
            const esperaSnap = await db.ref(`copilotajes/espera/${id}`).once('value');
            const pistaSnap = await db.ref(`copilotajes/completados/${id}`).once('value');
            const updates = {};

            if(esperaSnap.exists()) updates[`copilotajes/espera/${id}/piloto`] = nuevo;
            if(pistaSnap.exists()) updates[`copilotajes/completados/${id}/piloto`] = nuevo;
            if(!esperaSnap.exists() && !pistaSnap.exists()) updates[`copilotajes/espera/${id}/piloto`] = nuevo;

            await db.ref().update(updates);
            if(pistaSnap.exists() && !(pistaSnap.val() || {}).finalizado) {
                await actualizarEstadoPistaActiva();
            }
        };

        window.sacarShowPista = async () => {
            try {
                const pilotoTexto = document.getElementById('show-piloto').value;
                if(!pilotoTexto) return alert("No hay piloto seleccionado.");
                const dorsal = extraerDorsal(pilotoTexto);
                const ficha = obtenerFichaPiloto(dorsal);
                if(!dorsal) return alert("No se pudo identificar el dorsal del piloto.");
                const salidaId = crearSalidaId(dorsal);
                const ahora = Date.now();
                const horaEntradaTexto = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
                const salida = {
                    tipo: "show",
                    salidaId,
                    dorsal,
                    piloto: ficha.alias || ficha.piloto || limpiarNombrePiloto(pilotoTexto),
                    pilotoTexto,
                    coche: ficha.coche || ficha.vehiculo || "",
                    motor: ficha.motor || "",
                    potencia: ficha.potencia || "",
                    foto: ficha.foto || "",
                    tsEntrada: ahora,
                    horaEntradaPista: horaEntradaTexto,
                    horaEntradaTexto,
                    finalizado: false
                };
                const vSnap = await db.ref('votacion_activa/items').once('value');
                const itemsActuales = vSnap.val() || {};
                const itemVoto = crearItemVotoTaxi(dorsal, salida, itemsActuales[dorsal] || {});
                const itemsNuevos = Object.assign({}, itemsActuales);
                itemsNuevos[dorsal] = itemVoto;
                const updates = {};
                updates[`salidas_pista/${salidaId}`] = salida;
                updates[`votacion_activa/items/${dorsal}`] = itemVoto;
                updates['votacion_activa/activa'] = true;
                updates['votacion_activa/timer'] = 0;
                updates['votacion_activa/dorsal'] = Object.keys(itemsNuevos).join(' ');
                await db.ref().update(updates);
                await actualizarEstadoPistaActiva();
            } catch(err) {
                console.error(err);
                alert("No se pudo sacar el piloto a show: " + (err && err.message ? err.message : err));
            }
        };

        window.finalizarShowPista = (id) => {
            showConfirm("¿CONFIRMAR FIN DE SALIDA SHOW?", async () => {
                const snap = await db.ref(`salidas_pista/${id}`).once('value');
                const item = snap.val();
                if(!item) return;
                const ahora = Date.now();
                const horaSalidaTexto = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
                const duracionStr = calcularDuracion(item.tsEntrada, ahora);
                const dorsalSalida = item.dorsal || extraerDorsal(item.pilotoTexto);
                await iniciarCierreVotoIndividual(dorsalSalida);
                await db.ref(`salidas_pista/${id}`).update({
                    finalizado: true,
                    tsSalida: ahora,
                    horaSalida: horaSalidaTexto,
                    horaSalidaTexto,
                    duracion: duracionStr,
                    duracionTotal: duracionStr
                });
                await actualizarEstadoPistaActiva();
            });
        };

        window.abrirIncidenciaShow = async (id) => {
            const item = salidasPista[id];
            await abrirIncidencia();
            if(item) {
                incidenciaItemActual = { id, item };
                const sel = document.getElementById('incidencia-piloto');
                const piloto = item.pilotoTexto || `[#${item.dorsal}] ${item.piloto} | ${item.coche || ""}`;
                if(!Array.from(sel.options).some(o => o.value === piloto)) {
                    const opt = document.createElement('option');
                    opt.value = piloto;
                    opt.textContent = piloto;
                    sel.appendChild(opt);
                }
                sel.value = piloto;
            }
        };

        window.abrirIncidencia = async (id) => {
            incidenciaItemActual = null;
            const sel = document.getElementById('incidencia-piloto');
            const basePilotos = Object.keys(fichasPilotos || {}).length
                ? Object.entries(fichasPilotos).map(([dorsal, p]) => ({ dorsal, label: `[#${dorsal}] ${p.alias || p.piloto || ''} | ${p.coche || p.vehiculo || ''}` }))
                : pilotosDisponibles;
            const opciones = basePilotos.map(p => `<option value="${escapeAttr(p.label)}">${escapeHtml(p.label)}</option>`).join('');
            sel.innerHTML = `<option value="">Selecciona piloto...</option>${opciones}`;

            if(id) {
                const esperaSnap = await db.ref(`copilotajes/espera/${id}`).once('value');
                const pistaSnap = await db.ref(`copilotajes/completados/${id}`).once('value');
                const item = esperaSnap.val() || pistaSnap.val();
                if(item) {
                    incidenciaItemActual = { id, item };
                    const piloto = item.piloto || "";
                    if(!Array.from(sel.options).some(o => o.value === piloto)) {
                        const opt = document.createElement('option');
                        opt.value = piloto;
                        opt.textContent = piloto;
                        sel.appendChild(opt);
                    }
                    sel.value = piloto;
                }
            }

            document.getElementById('incidencia-tipo').value = "Copiloto no registrado / subido sin autorización";
            document.getElementById('incidencia-obs').value = "";
            document.getElementById('modal-incidencia').style.display = 'flex';
        };

        window.cerrarIncidencia = () => {
            document.getElementById('modal-incidencia').style.display = 'none';
            incidenciaItemActual = null;
        };

        window.guardarIncidencia = async () => {
            const pilotoTexto = document.getElementById('incidencia-piloto').value;
            const tipo = document.getElementById('incidencia-tipo').value;
            const observaciones = document.getElementById('incidencia-obs').value.trim();
            if(!pilotoTexto) return alert("Selecciona un piloto.");

            const dorsal = extraerDorsal(pilotoTexto);
            const ficha = obtenerFichaPiloto(dorsal);
            const item = incidenciaItemActual?.item || {};
            await db.ref('copilotajes/incidencias').push({
                ts: Date.now(),
                fecha: new Date().toLocaleDateString('es-ES'),
                hora: new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' }),
                dorsal: dorsal || "",
                piloto: ficha.alias || ficha.piloto || limpiarNombrePiloto(pilotoTexto),
                pilotoTexto: pilotoTexto,
                copiloto: item.copiloto || "",
                turno: item.nPapel || "",
                tipo: tipo,
                observaciones: observaciones,
                origen: "pista_copilotajes"
            });
            cerrarIncidencia();
            showConfirm("INCIDENCIA REGISTRADA", () => {});
        };

        window.marcarEnRecinto = (id) => db.ref(`copilotajes/espera/${id}`).update({
            enRecinto: true,
            horaEntradaRecinto: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
        });
        
        window.sacarDeRecinto = (id) => {
            showConfirm("¿EL PASAJERO HA SALIDO DEL RECINTO?", () => {
                db.ref(`copilotajes/espera/${id}`).update({ enRecinto: false });
            });
        };

        window.confirmarSubida = async (id) => {
            const snap = await db.ref(`copilotajes/espera/${id}`).once('value');
            if(!snap.exists()) return;
            const d = snap.val();
            
            const dorsal = extraerDorsal(d.piloto) || "0";
            const salidaId = crearSalidaId(dorsal);

            // CAPTURA DE TIEMPO DE ENTRADA
            const ahora = Date.now();
            const horaEntradaTexto = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            const items = {};
            items[dorsal] = crearItemVotoTaxi(dorsal, { ...d, salidaId }, {});

            const updates = {};
            updates['votacion_activa'] = { dorsal: dorsal, activa: true, timer: 0, items: items };
            
            const newK = db.ref('copilotajes/completados').push().key;
            const ficha = obtenerFichaPiloto(dorsal);
            // Guardamos los campos de tiempo adicionales para el CSV
            updates[`copilotajes/completados/${newK}`] = { 
                ...d, 
                salidaId: salidaId,
                tsEntrada: ahora, 
                horaEntradaPista: horaEntradaTexto,
                horaEntradaTexto: horaEntradaTexto, 
                finalizado: false 
            };
            updates[`salidas_pista/${salidaId}`] = {
                tipo: "taxidrift",
                salidaId,
                dorsal,
                piloto: nombrePilotoDesdeFicha(dorsal, d.piloto),
                pilotoTexto: d.piloto || "",
                copiloto: d.copiloto || "",
                turno: d.nPapel || "",
                coche: ficha.coche || ficha.vehiculo || "",
                motor: ficha.motor || "",
                potencia: ficha.potencia || "",
                foto: ficha.foto || "",
                tsEntrada: ahora,
                horaEntradaPista: horaEntradaTexto,
                horaEntradaTexto,
                finalizado: false
            };
            updates[`copilotajes/espera/${id}`] = null;

            await db.ref().update(updates);
            await actualizarEstadoPistaActiva();
        };

        window.confirmarSalidaRecinto = (id) => {
            showConfirm("¿CONFIRMAR FIN DE VIAJE?", async () => {
                const ahora = Date.now();
                const horaSalidaTexto = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                
                // Obtener datos para calcular duración total
                const snap = await db.ref(`copilotajes/completados/${id}`).once('value');
                const item = snap.val();
                let duracionStr = calcularDuracion(item?.tsEntrada, ahora);

                const dorsalSalida = extraerDorsal(item?.piloto) || String(item?.nPapel || "");
                await iniciarCierreVotoIndividual(dorsalSalida);

                // Guardamos hora de salida y duración calculada
                await db.ref(`copilotajes/completados/${id}`).update({ 
                    finalizado: true, 
                    tsSalida: ahora,
                    horaSalida: horaSalidaTexto,
                    horaSalidaTexto: horaSalidaTexto,
                    duracion: duracionStr,
                    duracionTotal: duracionStr
                });
                if(item?.salidaId) {
                    await db.ref(`salidas_pista/${item.salidaId}`).update({
                        finalizado: true,
                        tsSalida: ahora,
                        horaSalida: horaSalidaTexto,
                        horaSalidaTexto: horaSalidaTexto,
                        duracion: duracionStr,
                        duracionTotal: duracionStr
                    });
                }
                await actualizarEstadoPistaActiva();
            });
        };

        async function iniciarCierreVotoIndividual(dorsalSalida) {
            if(!dorsalSalida) return;
            const itemSnap = await db.ref(`votacion_activa/items/${dorsalSalida}`).once('value');
            const itemVoto = itemSnap.val();
            if(!itemVoto) return;

            let count = 10;
            await db.ref(`votacion_activa/items/${dorsalSalida}`).update({ cerrando: true, timer: count });
            const inv = setInterval(async () => {
                count--;
                if(count > 0) {
                    await db.ref(`votacion_activa/items/${dorsalSalida}/timer`).set(count);
                    return;
                }

                clearInterval(inv);
                const finalSnap = await db.ref(`votacion_activa/items/${dorsalSalida}`).once('value');
                const data = finalSnap.val() || itemVoto;
                if((data.ap||0)+(data.up||0)+(data.dw||0) > 0) {
                    await db.ref('historial_votos').push({
                        dorsal: dorsalSalida,
                        info: data.nombre,
                        nPapel: data.nPapel || "",
                        copiloto: data.copiloto || "",
                        piloto: data.piloto || "",
                        tipo: data.tipo || "taxidrift",
                        salidaId: data.salidaId || "",
                        ap: data.ap||0,
                        up: data.up||0,
                        dw: data.dw||0,
                        ts: Date.now()
                    });
                }
                if(data.salidaId) {
                    await db.ref(`salidas_pista/${data.salidaId}/votos`).set({
                        ap: data.ap || 0,
                        up: data.up || 0,
                        dw: data.dw || 0,
                        score: ((data.ap || 0) * 2) + (data.up || 0) - (data.dw || 0)
                    });
                }
                await db.ref(`votacion_activa/items/${dorsalSalida}`).remove();
                await cerrarVotacionSiNoQuedanItems();
            }, 1000);
        }

        async function cerrarVotacionSiNoQuedanItems() {
            const snap = await db.ref('votacion_activa/items').once('value');
            const items = snap.val() || {};
            if(Object.keys(items).length === 0) {
                await db.ref('votacion_activa').set({ activa:false, timer:0, dorsal:"" });
            } else {
                await db.ref('votacion_activa').update({ dorsal: Object.keys(items).join(' '), activa:true, timer:0 });
            }
        }

        async function actualizarEstadoPistaActiva() {
            const snap = await db.ref('copilotajes/completados').once('value');
            const activosTaxi = Object.values(snap.val() || {}).filter(i => !i.finalizado);
            const salidasSnap = await db.ref('salidas_pista').once('value');
            const salidas = salidasSnap.val() || {};
            const activosShow = Object.values(salidas).filter(i => i && !i.finalizado && i.tipo === "show");
            const activos = activosTaxi.concat(activosShow);
            if(!activos.length) {
                await db.ref('estado_pista').set({ mensaje: 'PISTA LIBRE', color: 'green', id: 'btn-libre' });
                const vSnap = await db.ref('votacion_activa/items').once('value');
                const itemsActuales = vSnap.val() || {};
                const cerrando = {};
                Object.entries(itemsActuales).forEach(([dorsal, previo]) => {
                    if(previo && previo.cerrando) cerrando[dorsal] = previo;
                });
                if(Object.keys(cerrando).length) {
                    await db.ref('votacion_activa').set({
                        dorsal: Object.keys(cerrando).join(' '),
                        activa: true,
                        timer: 0,
                        items: cerrando
                    });
                } else {
                    await db.ref('votacion_activa').set({ activa:false, timer:0, dorsal:"", items:null });
                }
                return 0;
            }
            const nombres = activos.map(i => i.tipo === "show" ? (i.piloto || limpiarNombrePiloto(i.pilotoTexto)) : limpiarNombrePiloto(i.piloto)).filter(Boolean);
            const vSnap = await db.ref('votacion_activa/items').once('value');
            const itemsActuales = vSnap.val() || {};
            const items = {};
            activos.forEach(item => {
                const dorsal = item.dorsal || extraerDorsal(item.piloto) || String(item.nPapel || "");
                if(!dorsal) return;
                const previo = itemsActuales[dorsal] || {};
                items[dorsal] = crearItemVotoTaxi(dorsal, item, previo);
            });
            Object.entries(itemsActuales).forEach(([dorsal, previo]) => {
                if(previo && previo.cerrando) items[dorsal] = previo;
            });
            await db.ref('estado_pista').set({
                mensaje: 'EN PISTA: ' + nombres.join(' + '),
                color: '#007bff',
                id: 'btn-coche'
            });
            await db.ref('votacion_activa').set({
                dorsal: Object.keys(items).join(' '),
                activa: Object.keys(items).length > 0,
                timer: 0,
                items: items
            });
            return activos.length;
        }

        function calcularDuracion(tsEntrada, tsSalida) {
            if(!tsEntrada) return "0:00";
            const diff = Math.max(0, Number(tsSalida || Date.now()) - Number(tsEntrada));
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return m + ":" + s.toString().padStart(2, '0');
        }

        function limpiarNombrePiloto(piloto) {
            return String(piloto || '').split('|')[0].replace(/\[.*?\]/g,'').trim();
        }

        function extraerDorsal(piloto) {
            const txt = String(piloto || "");
            const match = txt.match(/\[#(\d+)\]/) || txt.match(/^(\d+)/);
            return match ? match[1] : "";
        }

        function crearSalidaId(dorsal) {
            return `${dorsal}_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
        }

        function obtenerFichaPiloto(dorsal) {
            return fichasPilotos[String(dorsal)] || fichasPilotos[Number(dorsal)] || {};
        }

        function nombrePilotoDesdeFicha(dorsal, pilotoTexto) {
            const ficha = obtenerFichaPiloto(dorsal);
            if(ficha.alias || ficha.piloto) return ficha.alias || ficha.piloto;
            return limpiarNombrePiloto(pilotoTexto).replace(/^\d+\s*[,.-]?\s*/, '').split(',')[0].trim();
        }

        function htmlPreviewPiloto(pilotoTexto) {
            if(!pilotoTexto) return 'Selecciona piloto';
            const dorsal = extraerDorsal(pilotoTexto);
            const ficha = obtenerFichaPiloto(dorsal);
            const nombre = ficha.alias || ficha.piloto || limpiarNombrePiloto(pilotoTexto);
            const coche = ficha.coche || ficha.vehiculo || String(pilotoTexto || '').split('|')[1] || "";
            const motor = ficha.motor || "";
            const potencia = ficha.potencia ? `${ficha.potencia} CV` : "";
            const detalle = [coche, motor, potencia].filter(Boolean).join(' · ');
            const foto = ficha.foto || "";
            const img = foto
                ? `<img src="${escapeAttr(foto)}" alt="">`
                : `<img alt="" style="object-fit:contain" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 90'%3E%3Crect width='160' height='90' fill='%23000'/%3E%3Ctext x='80' y='50' text-anchor='middle' font-size='18' fill='%23ffcc00' font-family='Arial'%3E%23${encodeURIComponent(dorsal || '?')}%3C/text%3E%3C/svg%3E">`;
            return `${img}<div><b>#${escapeHtml(dorsal || '?')} ${escapeHtml(nombre)}</b><span>${escapeHtml(detalle || 'Sin datos de coche')}</span></div>`;
        }

        function escapeHtml(v) {
            return String(v || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
        }

        function escapeAttr(v) {
            return escapeHtml(v).replace(/"/g, '&quot;');
        }

        function crearItemVotoTaxi(dorsal, item, previo) {
            const ficha = obtenerFichaPiloto(dorsal);
            const esShow = item.tipo === "show";
            const nombreBase = esShow
                ? (item.piloto || nombrePilotoDesdeFicha(dorsal, item.pilotoTexto))
                : `${nombrePilotoDesdeFicha(dorsal, item.piloto)} & ${item.copiloto || ""}`;
            return {
                nombre: nombreBase,
                coche: item.coche || ficha.coche || (esShow ? "SHOW" : "TAXI DRIFT"),
                motor: item.motor || ficha.motor || "",
                potencia: item.potencia || ficha.potencia || "",
                foto: item.foto || ficha.foto || "",
                salidaId: item.salidaId || previo.salidaId || crearSalidaId(dorsal),
                nPapel: item.nPapel || "",
                copiloto: item.copiloto || "",
                piloto: item.piloto || "",
                tipo: item.tipo || "taxidrift",
                ap: previo.ap || 0,
                up: previo.up || 0,
                dw: previo.dw || 0,
                h_ap: previo.h_ap || 0,
                h_up: previo.h_up || 0,
                h_dw: previo.h_dw || 0,
                cerrando: previo.cerrando || false,
                timer: previo.timer || 0
            };
        }

        function renderizarTodo() {
            db.ref('copilotajes').once('value', snap => {
                const data = snap.val() || {};
                const tCola = document.getElementById('lista-cola-acceso');
                const tRecinto = document.getElementById('lista-espera-recinto');
                const tPista = document.getElementById('lista-pista-activa');
                
                tCola.innerHTML = ""; tRecinto.innerHTML = ""; tPista.innerHTML = "";

                if(data.espera) {
                    Object.entries(data.espera).sort((a,b)=>a[1].nPapel - b[1].nPapel).forEach(([id, item]) => {
                        if(!item.enRecinto) tCola.innerHTML += generarFilaHTML(id, item, false, false);
                        else tRecinto.innerHTML += generarFilaHTML(id, item, true, false);
                    });
                }
                if(data.completados) {
                    Object.entries(data.completados).filter(x => !x[1].finalizado).forEach(([id, item]) => {
                        tPista.innerHTML += generarFilaHTML(id, item, false, true);
                    });
                }
                Object.entries(salidasPista || {}).filter(x => x[1] && !x[1].finalizado && x[1].tipo === "show").forEach(([id, item]) => {
                    tPista.innerHTML += generarFilaShowHTML(id, item);
                });
                filtrar();
            });
        }

        db.ref('copilotajes').on('value', renderizarTodo);

        setInterval(() => {
            document.querySelectorAll('.time-info').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'));
                if(!ts) return;
                const diff = Date.now() - ts;
                const m = Math.floor(diff/60000);
                const s = Math.floor((diff%60000)/1000);
                el.querySelector('.cronometro').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            });
        }, 1000);

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tr').forEach(tr => {
                tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none';
            });
        };
    </script>
</body>
</html>
