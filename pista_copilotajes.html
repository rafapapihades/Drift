<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #003399; --orange: #fd7e14; }
        
        body { 
            background-image: url('Fibra3.png'); 
            background-repeat: repeat; 
            background-color: var(--bg);
            color: #fff; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            padding: 10px; margin: 0; 
        }

        .header { 
            text-align: center; padding: 15px; 
            background: rgba(0,0,0,0.9); border-radius: 12px;
            border-bottom: 3px solid var(--red); margin-bottom: 15px; 
        }

        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; object-fit: contain; }

        /* Banner de Estado */
        #banner-pista-live {
            width: 100%; padding: 15px; text-align: center; font-size: 1.2em; 
            font-weight: bold; border-radius: 10px; margin-bottom: 15px; 
            display: none; text-transform: uppercase; border: 2px solid #fff;
            box-sizing: border-box;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .card { background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        .section-title { font-size: 0.8em; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

        .matricula { display: inline-flex; align-items: center; background: #fff; color: #000; border-radius: 4px; overflow: hidden; font-family: 'Arial', sans-serif; font-weight: 900; border: 1px solid #fff; margin-top: 5px; }
        .m-bandera { background: var(--blue); color: white; padding: 4px 5px; font-size: 0.6em; text-align: center; line-height: 1; }
        .m-num { padding: 2px 12px; font-size: 1.4em; min-width: 35px; text-align: center; }

        .n-doc { background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: 900; margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px 8px; border-bottom: 1px solid #222; }

        .btn-pista { background: var(--green); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.85em; box-shadow: 0 4px 0 #155d27; }
        .btn-salida { background: var(--orange); color: white; border: none; padding: 12px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.75em; box-shadow: 0 4px 0 #a04e0e; }
        .btn-change { background: #222; color: var(--accent); border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 0.65em; cursor: pointer; margin-top: 10px; text-transform: uppercase; width: 100%; font-weight: bold; }

        #modal-cambio, #custom-confirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); width: 90%; max-width: 450px; text-align: center; }
        .select-modal { width: 100%; padding: 15px; margin: 20px 0; background: #000; color: #fff; border: 1px solid var(--accent); border-radius: 8px; font-size: 1.1em; }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; }
    </style>
</head>
<body>

    <div id="custom-confirm">
        <div class="modal-content" style="border-color: var(--orange);">
            <h2 id="confirm-text" style="color:white; margin:0; font-size: 1.2em;">¿ACOMPAÑADO A LA SALIDA?</h2>
            <div class="modal-btns">
                <button class="btn-modal" style="background:#444;" onclick="handleConfirm(false)">CANCELAR</button>
                <button class="btn-modal" style="background:var(--orange);" onclick="handleConfirm(true)">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="header">
        <img src="logotaxi.jpg" alt="Logo Taxi Drift" class="header-logo">
    </div>

    <div id="banner-pista-live">CARGANDO ESTADO...</div>

    <input type="search" id="buscador" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:10px; margin-bottom:15px;" placeholder="🔍 BUSCAR DORSAL O NOMBRE..." oninput="filtrar()">

    <div class="card">
        <div class="section-title">📋 COLA DE ACCESO (EN RECINTO)</div>
        <table><tbody id="lista-espera"></tbody></table>
    </div>

    <div class="card" style="border-color: var(--green);">
        <div class="section-title" style="color: var(--green);">🏁 EN PISTA / RETORNO</div>
        <table><tbody id="lista-pista-activa"></tbody></table>
    </div>

    <div id="modal-cambio">
        <div class="modal-content">
            <h3 style="color: var(--accent); margin-bottom:5px;">REASIGNAR COCHE</h3>
            <select id="nuevo-piloto-select" class="select-modal"></select>
            <div style="display: flex; gap: 10px;">
                <button class="btn-modal" style="background: var(--blue);" onclick="ejecutarCambio()">REASIGNAR</button>
                <button class="btn-modal" style="background: #333;" onclick="cerrarModal()">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, get, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let idSeleccionado = null;
        let confirmAction = null;
        let listaPilotosActivos = [];

        // Lógica del Banner
        const bannerPista = document.getElementById('banner-pista-live');
        onValue(ref(db, 'estado_pista'), (snapshot) => {
            const estado = snapshot.val();
            if (estado && estado.mensaje) {
                bannerPista.style.display = 'block';
                bannerPista.innerText = estado.mensaje;
                bannerPista.style.backgroundColor = estado.color || '#333';
                bannerPista.style.animation = (estado.id === 'btn-acc' || estado.id === 'btn-obs') ? "blink 1s infinite" : "none";
            }
        });

        window.showConfirm = (texto, callback) => {
            document.getElementById('confirm-text').innerText = texto;
            document.getElementById('custom-confirm').style.display = 'flex';
            confirmAction = callback;
        };

        window.handleConfirm = (valor) => {
            document.getElementById('custom-confirm').style.display = 'none';
            if (valor && confirmAction) confirmAction();
            confirmAction = null;
        };

        function generarMatriculaHTML(pilotoData) {
            const dorsalMatch = pilotoData.match(/\[#(\d+)\]/) || pilotoData.match(/^(\d+)/);
            const num = dorsalMatch ? dorsalMatch[1] : "??";
            let nombreLimpio = pilotoData.replace(/\[#\d+\]/, "").replace(/^\d+[\s,.-]*/, "").split('|')[0].trim();
            return `
                <div style="display:flex; align-items:center; gap:12px; margin-top:8px;">
                    <div class="matricula"><div class="m-bandera">E</div><div class="m-num">${num}</div></div>
                    <span style="font-size:1.1em; color:#fff;">${nombreLimpio}</span>
                </div>`;
        }

        // FUNCIONALIDAD: MANDAR A PISTA
        window.confirmarSubida = async (id) => {
            const snap = await get(ref(db, `copilotajes/espera/${id}`));
            if(snap.exists()){
                const datos = snap.val();
                
                // Actualizar Speaker
                const dorsalMatch = datos.piloto.match(/\[#(\d+)\]/) || datos.piloto.match(/^(\d+)/);
                const dorsalPiloto = dorsalMatch ? dorsalMatch[1] : "0";
                const nombrePilotoLimpio = datos.piloto.replace(/\[#\d+\]/, "").replace(/^\d+[\s,.-]*/, "").split('|')[0].trim();

                const updatesSpeaker = {};
                updatesSpeaker['votacion_activa/activa'] = true;
                updatesSpeaker[`votacion_activa/items/${dorsalPiloto}`] = {
                    nombre: `${nombrePilotoLimpio} & ${datos.copiloto}`,
                    coche: "TAXI DRIFT",
                    ap: 0, up: 0, dw: 0
                };
                await update(ref(db), updatesSpeaker);

                // Mover a completados (Pista)
                const newRef = push(ref(db, 'copilotajes/completados'));
                await set(newRef, { 
                    ...datos, 
                    horaPista: new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}), 
                    finalizado: false 
                });
                await remove(ref(db, `copilotajes/espera/${id}`));
            }
        };

        window.confirmarSalidaRecinto = (id) => {
            showConfirm("¿ACOMPAÑADO A LA SALIDA?", async () => {
                const snap = await get(ref(db, `copilotajes/completados/${id}`));
                if (snap.exists()) {
                    const datos = snap.val();
                    const dMatch = datos.piloto.match(/\[#(\d+)\]/) || datos.piloto.match(/^(\d+)/);
                    const dPiloto = dMatch ? dMatch[1] : null;
                    if (dPiloto) {
                        await remove(ref(db, `votacion_activa/items/${dPiloto}`));
                        const snapRestantes = await get(ref(db, 'votacion_activa/items'));
                        if (!snapRestantes.exists()) await update(ref(db, 'votacion_activa'), { activa: false });
                    }
                }
                await update(ref(db, `copilotajes/completados/${id}`), { finalizado: true });
            });
        };

        // LÓGICA DE REASIGNACIÓN
        window.abrirModalCambio = (id) => {
            idSeleccionado = id;
            if (listaPilotosActivos.length === 0) return alert("No hay pilotos disponibles.");
            document.getElementById('modal-cambio').style.display = 'flex';
        };

        window.cerrarModal = () => document.getElementById('modal-cambio').style.display = 'none';

        window.ejecutarCambio = async () => {
            const nuevo = document.getElementById('nuevo-piloto-select').value;
            await update(ref(db, `copilotajes/espera/${idSeleccionado}`), { piloto: nuevo });
            cerrarModal();
        };

        // ESCUCHA PRINCIPAL DE DATOS
        onValue(ref(db, 'copilotajes'), (snap) => {
            const data = snap.val() || {};
            
            // Actualizar lista de pilotos activos para el modal
            const config = data.config_pilotos ? Object.values(data.config_pilotos) : [];
            const bajas = data.pilotos_baja ? Object.values(data.pilotos_baja) : [];
            listaPilotosActivos = config.filter(p => !bajas.includes(p));

            const sel = document.getElementById('nuevo-piloto-select');
            sel.innerHTML = listaPilotosActivos.map(p => {
                const d = p.match(/\[#(\d+)\]/) || p.match(/^(\d+)/);
                const n = p.replace(/\[#\d+\]/, "").replace(/^\d+[\s,.-]*/, "").split('|')[0].trim();
                return `<option value="${p}">DORSAL ${d ? d[1] : '?'} - ${n}</option>`;
            }).join('');

            // RENDER COLA DE ACCESO (Sección nueva solicitada)
            const tEspera = document.getElementById('lista-espera');
            tEspera.innerHTML = "";
            if (data.espera) {
                Object.entries(data.espera)
                    .filter(([id, item]) => item.enRecinto) // <--- ESTA ES LA CLAVE
                    .sort((a,b) => a[1].nPapel - b[1].nPapel)
                    .forEach(([id, item]) => {
                        tEspera.innerHTML += `<tr><td>
                            <span class="n-doc">${item.nPapel.toString().padStart(3, '0')}</span> <b>${item.copiloto}</b>
                            ${generarMatriculaHTML(item.piloto)}
                            <button class="btn-change" onclick="abrirModalCambio('${id}')">🔄 REASIGNAR PILOTO</button>
                        </td><td style="width:100px"><button class="btn-pista" onclick="confirmarSubida('${id}')">EN PISTA</button></td></tr>`;
                    });
            }

            // RENDER EN PISTA
            const tPista = document.getElementById('lista-pista-activa');
            tPista.innerHTML = "";
            if (data.completados) {
                Object.entries(data.completados)
                    .filter(([id, item]) => item.finalizado === false)
                    .sort((a,b) => b[1].nPapel - a[1].nPapel)
                    .forEach(([id, item]) => {
                        tPista.innerHTML += `<tr><td>
                            <span class="n-doc" style="background:#444; color:#fff">${item.nPapel.toString().padStart(3, '0')}</span> <b>${item.copiloto}</b>
                            <div style="transform: scale(0.8); origin: left center; opacity:0.8;">${generarMatriculaHTML(item.piloto)}</div>
                        </td><td style="width:140px"><button class="btn-salida" onclick="confirmarSalidaRecinto('${id}')">ACOMPAÑADO A SALIDA</button></td></tr>`;
                    });
            }
        });

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tr').forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none');
        };
    </script>
</body>
</html>
