<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #003399; --orange: #fd7e14; }
        
        * { box-sizing: border-box; } /* CRÍTICO: Evita que el padding ensanche los elementos */

        body { 
            background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg);
            color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; 
        }

        .header { text-align: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border-bottom: 3px solid var(--red); margin-bottom: 15px; }
        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; }

        /* BARRA DE ESTADO DINÁMICA - AJUSTE DE TAMAÑO */
        .pista-status-bar {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: block;
        }

        .card { background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; width: 100%; }
        .section-title { font-size: 0.85em; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

        .matricula { display: inline-flex; align-items: center; background: #fff; color: #000; border-radius: 4px; overflow: hidden; font-family: 'Arial', sans-serif; font-weight: 900; border: 1px solid #fff; margin-top: 5px; }
        .m-bandera { background: var(--blue); color: white; padding: 4px 5px; font-size: 0.6em; }
        .m-num { padding: 2px 12px; font-size: 1.4em; min-width: 35px; text-align: center; }

        .n-doc { background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: 900; margin-right: 5px; }
        
        .time-info { font-size: 0.75em; color: #00ff99; display: block; margin-top: 8px; font-family: sans-serif; font-weight: bold; background: rgba(0,255,153,0.1); padding: 5px; border-radius: 5px; }
        .cronometro { color: #fff; font-size: 1.1em; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 8px; border-bottom: 1px solid #222; }

        /* Botones */
        .btn-recinto { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.75em; box-shadow: 0 4px 0 #002266; }
        .btn-pista { background: var(--green); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.85em; box-shadow: 0 4px 0 #155d27; }
        .btn-salida { background: var(--orange); color: white; border: none; padding: 12px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.75em; box-shadow: 0 4px 0 #a04e0e; }
        .btn-change { background: #222; color: var(--accent); border: 1px solid #444; padding: 8px; border-radius: 6px; font-size: 0.65em; cursor: pointer; margin-top: 10px; text-transform: uppercase; width: 100%; font-weight: bold; }

        /* Buscador */
        #buscador { width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }

        /* Modales */
        #modal-cambio, #custom-confirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); width: 90%; max-width: 450px; text-align: center; }
        .select-modal { width: 100%; padding: 15px; margin: 20px 0; background: #000; color: #fff; border: 1px solid var(--accent); border-radius: 8px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="custom-confirm">
        <div class="modal-content" style="border-color: var(--orange);">
            <h2 id="confirm-text" style="color:white; margin:0; font-size: 1.2em;">¿CONFIRMAR ACCIÓN?</h2>
            <div class="modal-btns">
                <button class="btn-modal" style="background:#444;" onclick="handleConfirm(false)">CANCELAR</button>
                <button class="btn-modal" style="background:var(--orange);" onclick="handleConfirm(true)">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="header"><img src="logotaxi.jpg" alt="Logo" class="header-logo"></div>

    <div id="status-bar" class="pista-status-bar" style="background: #222; color: #fff;">
        ESPERANDO ESTADO...
    </div>

    <input type="search" id="buscador" placeholder="🔍 BUSCAR DORSAL O NOMBRE..." oninput="filtrar()">

    <div class="card"><div class="section-title">⏳ 1. COLA DE ACCESO</div><table id="lista-cola-acceso"></table></div>
    <div class="card" style="border-color: var(--blue);"><div class="section-title" style="color: var(--blue);">📍 2. ESPERA EN RECINTO</div><table id="lista-espera-recinto"></table></div>
    <div class="card" style="border-color: var(--green);"><div class="section-title" style="color: var(--green);">🏁 3. EN PISTA / RETORNO</div><table id="lista-pista-activa"></table></div>

    <div id="modal-cambio">
        <div class="modal-content">
            <h3 style="color: var(--accent);">REASIGNAR COCHE</h3>
            <select id="nuevo-piloto-select" class="select-modal"></select>
            <div class="modal-btns">
                <button class="btn-modal" style="background:var(--blue);" onclick="ejecutarCambio()">REASIGNAR</button>
                <button class="btn-modal" style="background:#333;" onclick="cerrarModal()">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, get, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let idSeleccionado = null;
        let confirmAction = null;

        // --- SINCRONIZACIÓN ESTADO DE PISTA ---
        const statusBar = document.getElementById('status-bar');
        onValue(ref(db, 'estado_pista'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                statusBar.innerText = data.mensaje;
                statusBar.style.background = data.color;
                
                // Ajuste de contraste
                if (data.color === '#ffcc00' || data.color === 'yellow') {
                    statusBar.style.color = '#000';
                } else {
                    statusBar.style.color = '#fff';
                }

                // Animación para Accidente
                if (data.id === 'btn-acc') {
                    statusBar.style.animation = "pulse-red 1s infinite";
                } else {
                    statusBar.style.animation = "none";
                }
            }
        });

        // --- SISTEMA DE CONFIRMACIÓN ---
        window.showConfirm = (texto, callback) => {
            document.getElementById('confirm-text').innerText = texto;
            document.getElementById('custom-confirm').style.display = 'flex';
            confirmAction = callback;
        };

        window.handleConfirm = (valor) => {
            document.getElementById('custom-confirm').style.display = 'none';
            if (valor && confirmAction) confirmAction();
            confirmAction = null;
        };

        function generarMatriculaHTML(pilotoData) {
            const d = pilotoData.match(/\[#(\d+)\]/) || pilotoData.match(/^(\d+)/);
            const num = d ? d[1] : "??";
            const nom = pilotoData.replace(/\[#\d+\]/, "").replace(/^\d+[\s,.-]*/, "").split('|')[0].trim();
            return `<div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                        <div class="matricula"><div class="m-bandera">E</div><div class="m-num">${num}</div></div>
                        <span style="font-size:0.9em; color:#bbb;">${nom}</span>
                    </div>`;
        }

        window.marcarEnRecinto = (id) => update(ref(db, `copilotajes/espera/${id}`), { enRecinto: true });
        
        window.confirmarSubida = async (id) => {
            const snap = await get(ref(db, `copilotajes/espera/${id}`));
            if(snap.exists()){
                const d = snap.val();
                const dMatch = d.piloto.match(/\[#(\d+)\]/) || d.piloto.match(/^(\d+)/);
                const dorsal = dMatch ? dMatch[1] : "0";
                
                await update(ref(db, 'votacion_activa'), { activa: true, dorsal: dorsal });
                await set(ref(db, `votacion_activa/items/${dorsal}`), {
                    nombre: `${d.piloto.split('|')[0].replace(/\[.*?\]/g,'').trim()} & ${d.copiloto}`,
                    coche: "TAXI DRIFT", ap:0, up:0, dw:0
                });

                const newRef = push(ref(db, 'copilotajes/completados'));
                await set(newRef, { 
                    ...d, 
                    tsEntrada: Date.now(),
                    horaEntradaTexto: new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
                    finalizado: false 
                });
                await remove(ref(db, `copilotajes/espera/${id}`));
            }
        };

        window.confirmarSalidaRecinto = (id) => {
            showConfirm("¿CONFIRMAR SALIDA DE PISTA?", async () => {
                const snap = await get(ref(db, `copilotajes/completados/${id}`));
                if(snap.exists()){
                    const d = snap.val();
                    const tsSalida = Date.now();
                    const diffMs = tsSalida - (d.tsEntrada || Date.now());
                    const duracionFinal = Math.floor(diffMs / 60000) + " min " + Math.floor((diffMs % 60000) / 1000) + "s";
                    
                    const dMatch = d.piloto.match(/\[#(\d+)\]/) || d.piloto.match(/^(\d+)/);
                    if(dMatch) await remove(ref(db, `votacion_activa/items/${dMatch[1]}`));

                    await update(ref(db, `copilotajes/completados/${id}`), { 
                        finalizado: true,
                        tsSalida: tsSalida,
                        horaSalidaTexto: new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
                        duracionTotal: duracionFinal
                    });
                }
            });
        };

        window.abrirModalCambio = (id) => { idSeleccionado = id; document.getElementById('modal-cambio').style.display = 'flex'; };
        window.cerrarModal = () => document.getElementById('modal-cambio').style.display = 'none';
        window.ejecutarCambio = async () => {
            await update(ref(db, `copilotajes/espera/${idSeleccionado}`), { piloto: document.getElementById('nuevo-piloto-select').value });
            cerrarModal();
        };

        onValue(ref(db, 'copilotajes'), (snap) => {
            const data = snap.val() || {};
            const config = data.config_pilotos ? Object.values(data.config_pilotos) : [];
            const bajas = data.pilotos_baja ? Object.values(data.pilotos_baja) : [];
            const pilotosOK = config.filter(p => !bajas.includes(p));
            document.getElementById('nuevo-piloto-select').innerHTML = pilotosOK.map(p => `<option value="${p}">${p}</option>`).join('');

            const tCola = document.getElementById('lista-cola-acceso');
            const tRecinto = document.getElementById('lista-espera-recinto');
            const tPista = document.getElementById('lista-pista-activa');
            tCola.innerHTML = ""; tRecinto.innerHTML = ""; tPista.innerHTML = "";

            if(data.espera) {
                Object.entries(data.espera).sort((a,b)=>a[1].nPapel - b[1].nPapel).forEach(([id, item]) => {
                    const row = `<tr><td><span class="n-doc">${item.nPapel.toString().padStart(3,'0')}</span> <b>${item.copiloto}</b>${generarMatriculaHTML(item.piloto)}<button class="btn-change" onclick="abrirModalCambio('${id}')">🔄 REASIGNAR</button></td><td style="width:110px">`;
                    if(!item.enRecinto) tCola.innerHTML += row + `<button class="btn-recinto" onclick="marcarEnRecinto('${id}')">LLEGÓ</button></td></tr>`;
                    else tRecinto.innerHTML += row + `<button class="btn-pista" onclick="confirmarSubida('${id}')">A PISTA</button></td></tr>`;
                });
            }

            if(data.completados) {
                Object.entries(data.completados).filter(x => !x[1].finalizado).forEach(([id, item]) => {
                    tPista.innerHTML += `<tr><td>
                        <span class="n-doc" style="background:#444; color:#fff">${item.nPapel.toString().padStart(3,'0')}</span> <b>${item.copiloto}</b>
                        ${generarMatriculaHTML(item.piloto)}
                        <span class="time-info" data-ts="${item.tsEntrada}">
                            ⏱️ EN PISTA: <span class="cronometro">calculando...</span>
                            <br><small>Entrada: ${item.horaEntradaTexto}</small>
                        </span>
                    </td><td style="width:110px"><button class="btn-salida" onclick="confirmarSalidaRecinto('${id}')">SALIDA</button></td></tr>`;
                });
            }
        });

        setInterval(() => {
            document.querySelectorAll('.time-info').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'));
                if(!ts) return;
                const diff = Date.now() - ts;
                const min = Math.floor(diff / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                el.querySelector('.cronometro').innerText = `${min} min ${sec}s`;
            });
        }, 1000);

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tr').forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none');
        };
    </script>
</body>
</html>
