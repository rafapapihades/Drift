<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #007bff; --orange: #fd7e14; }
        * { box-sizing: border-box; }
        body { 
            background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg);
            color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; 
        }
        .header { text-align: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border-bottom: 3px solid var(--red); margin-bottom: 15px; }
        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; }
        .pista-status-bar {
            width: 100%; padding: 15px; border-radius: 10px; text-align: center;
            font-size: 1.2em; font-weight: 900; text-transform: uppercase;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }
        .card { background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        .section-title { font-size: 0.85em; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        .n-doc { background: var(--accent); color: #000; padding: 8px 12px; border-radius: 8px; font-weight: 900; margin-right: 10px; font-size: 2.2em; display: inline-block; line-height: 1; }
        .matricula { display: inline-flex; align-items: center; background: #fff; color: #000; border-radius: 4px; overflow: hidden; border: 1px solid #fff; margin-top: 5px; }
        .m-bandera { background: #003399; color: white; padding: 4px 5px; font-size: 0.6em; }
        .m-num { padding: 2px 12px; font-size: 1.4em; font-weight: 900; }
        
        .time-info { font-size: 0.75em; color: #00ff99; display: block; margin-top: 8px; font-family: sans-serif; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 8px; border-bottom: 1px solid #222; }

        .btn-recinto { background: #003399; color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #002266; }
        .btn-pista { background: var(--green); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #155d27; }
        .btn-salida { background: var(--orange); color: white; border: none; padding: 15px 5px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #a04e0e; }
        .btn-devolver { background: #333; color: #aaa; border: 1px solid #444; padding: 8px; border-radius: 6px; font-size: 0.65em; cursor: pointer; margin-top: 8px; width: 100%; }
        .btn-reasignar { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.6em; cursor: pointer; margin-top: 8px; }
        .selector-rapido { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 5px; border-radius: 5px; width: 100%; margin-top: 5px; }

        #buscador { width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }

        #custom-confirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); width: 90%; max-width: 400px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="custom-confirm">
        <div class="modal-content">
            <h2 id="confirm-text" style="color:white; margin:0; font-size: 1.1em;">¿CONFIRMAR?</h2>
            <div class="modal-btns">
                <button class="btn-modal" style="background:#444;" onclick="handleConfirm(false)">CANCELAR</button>
                <button class="btn-modal" style="background:var(--orange);" onclick="handleConfirm(true)">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="header"><img src="logotaxi.jpg" alt="Logo" class="header-logo"></div>
    <div id="status-bar" class="pista-status-bar" style="background: #222; color: #fff;">CONECTANDO...</div>

    <input type="search" id="buscador" placeholder="🔍 BUSCAR TURNO O NOMBRE..." oninput="filtrar()">

    <div class="card"><div class="section-title">⏳ 1. COLA DE ACCESO</div><table id="lista-cola-acceso"></table></div>
    <div class="card" style="border-color: var(--orange);"><div class="section-title" style="color: var(--orange);">📍 2. ESPERA EN RECINTO</div><table id="lista-espera-recinto"></table></div>
    <div class="card" style="border-color: var(--green);"><div class="section-title" style="color: var(--green);">🏁 3. EN PISTA / RETORNO</div><table id="lista-pista-activa"></table></div>

    <script>
        firebase.initializeApp({ databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" });
        const db = firebase.database();

        let confirmAction = null;
        let pilotosDisponibles = [];

        window.showConfirm = (texto, cb) => {
            document.getElementById('confirm-text').innerText = texto;
            document.getElementById('custom-confirm').style.display = 'flex';
            confirmAction = cb;
        };
        window.handleConfirm = (v) => {
            document.getElementById('custom-confirm').style.display = 'none';
            if(v && confirmAction) confirmAction();
            confirmAction = null;
        };

        db.ref('estado_pista').on('value', s => {
            const d = s.val();
            if(d) {
                const bar = document.getElementById('status-bar');
                bar.innerText = d.mensaje; bar.style.background = d.color;
                bar.style.color = (d.color === '#ffcc00' || d.color === 'yellow') ? '#000' : '#fff';
            }
        });

        db.ref('inscritos_drift').on('value', s => {
            const data = s.val() || {};
            pilotosDisponibles = Object.entries(data).map(([d, p]) => `[#${d}] ${p.piloto} | ${p.coche}`);
        });

        function generarFilaHTML(id, item, esRecinto, esPista) {
            const dMatch = item.piloto.match(/\[#(\d+)\]/) || item.piloto.match(/^(\d+)/);
            const num = dMatch ? dMatch[1] : "??";
            const nom = item.piloto.replace(/\[#\d+\]/, "").split('|')[0].trim();

            let botones = '';
            if (!esRecinto && !esPista) {
                botones = `<button class="btn-recinto" onclick="marcarEnRecinto('${id}')">RECOGIDO</button>`;
            } else if (esRecinto) {
                botones = `<button class="btn-pista" onclick="confirmarSubida('${id}')">A PISTA</button>
                           <button class="btn-devolver" onclick="sacarDeRecinto('${id}')">↩ COLA</button>`;
            } else if (esPista) {
                botones = `<button class="btn-salida" onclick="confirmarSalidaRecinto('${id}')">SALIDA</button>`;
            }

            return `<tr>
                <td>
                    <span class="n-doc" ${esPista?'style="background:#444;color:#fff"':''}>${item.nPapel.toString().padStart(3,'0')}</span>
                    <b>${item.copiloto}</b><br>
                    <div id="cont-p-${id}">
                        <div class="matricula"><div class="m-bandera">E</div><div class="m-num">${num}</div></div>
                        <small style="color:#aaa;margin-left:5px">${nom}</small>
                        ${esRecinto ? `<br><button class="btn-reasignar" onclick="activarSelector('${id}','${item.piloto}')">✎ CAMBIAR</button>` : ''}
                    </div>
                    ${esPista ? `<span class="time-info" data-ts="${item.tsEntrada}">⏱️ <span class="cronometro">...</span></span>` : ''}
                </td>
                <td style="width:110px">${botones}</td>
            </tr>`;
        }

        window.activarSelector = (id, actual) => {
            const cont = document.getElementById(`cont-p-${id}`);
            const options = pilotosDisponibles.map(p => `<option value="${p}" ${p===actual?'selected':''}>${p}</option>`).join('');
            cont.innerHTML = `<select class="selector-rapido" onchange="guardarPiloto('${id}', this.value)">${options}<option value="CANCEL">❌ CANCELAR</option></select>`;
        };

        window.guardarPiloto = (id, nuevo) => {
            if(nuevo !== "CANCEL") db.ref(`copilotajes/espera/${id}`).update({ piloto: nuevo });
            else location.reload();
        };

        window.marcarEnRecinto = (id) => db.ref(`copilotajes/espera/${id}`).update({ enRecinto: true });
        window.sacarDeRecinto = (id) => showConfirm("¿DEVOLVER A LA COLA?", () => db.ref(`copilotajes/espera/${id}`).update({ enRecinto: false }));

        // --- A PISTA ---
        window.confirmarSubida = async (id) => {
            const snap = await db.ref(`copilotajes/espera/${id}`).once('value');
            if(!snap.exists()) return;
            const d = snap.val();
            
            const dMatch = d.piloto.match(/\[#(\d+)\]/) || d.piloto.match(/^(\d+)/);
            const dorsal = dMatch ? dMatch[1] : "0";
            const nombreLimpio = d.piloto.split('|')[0].replace(/\[.*?\]/g,'').trim();

            const items = {};
            items[dorsal] = { nombre: nombreLimpio + " & " + d.copiloto, coche: "TAXI DRIFT", ap:0, up:0, dw:0, h_ap:0, h_up:0, h_dw:0 };

            const updates = {};
            // IMPORTANTE: Ponemos timer en false para que el público sepa que está ABIERTA
            updates['votacion_activa'] = { dorsal: dorsal, activa: true, timer: false, items: items };
            updates['estado_pista'] = { mensaje: '🏎️ EN PISTA: ' + dorsal, color: '#007bff', id: 'btn-coche' };
            
            const newK = db.ref('copilotajes/completados').push().key;
            updates[`copilotajes/completados/${newK}`] = { ...d, tsEntrada: Date.now(), finalizado: false };
            updates[`copilotajes/espera/${id}`] = null;

            await db.ref().update(updates);
        };

        // --- SALIDA (Sincronizada con Master 5 seg) ---
        window.confirmarSalidaRecinto = (id) => {
            showConfirm("¿TERMINAR VIAJE Y CERRAR VOTOS?", async () => {
                await db.ref('estado_pista').set({ mensaje: '🟢 PISTA LIBRE', color: 'green', id: 'btn-libre' });
                
                const vSnap = await db.ref('votacion_activa').once('value');
                const v = vSnap.val();

                if(v && v.activa) {
                    // Guardar historial
                    Object.entries(v.items).forEach(([idItem, data]) => {
                        if((data.ap||0)+(data.up||0)+(data.dw||0) > 0) {
                            db.ref('historial_votos').push({ dorsal: idItem, info: data.nombre, ap: data.ap||0, up: data.up||0, dw: data.dw||0, ts: Date.now() });
                        }
                    });

                    // Cuenta atrás 5 segundos real
                    let count = 5;
                    await db.ref('votacion_activa').update({ timer: count });
                    const inv = setInterval(async () => {
                        count--;
                        if(count >= 0) {
                            await db.ref('votacion_activa').update({ timer: count });
                        }
                        if(count <= 0) { 
                            clearInterval(inv); 
                            await db.ref('votacion_activa').set({ activa:false, timer:0, dorsal:"" }); 
                        }
                    }, 1000);
                }
                await db.ref(`copilotajes/completados/${id}`).update({ finalizado: true, tsSalida: Date.now() });
            });
        };

        db.ref('copilotajes').on('value', snap => {
            const data = snap.val() || {};
            const tCola = document.getElementById('lista-cola-acceso');
            const tRecinto = document.getElementById('lista-espera-recinto');
            const tPista = document.getElementById('lista-pista-activa');
            tCola.innerHTML = ""; tRecinto.innerHTML = ""; tPista.innerHTML = "";
            if(data.espera) {
                Object.entries(data.espera).sort((a,b)=>a[1].nPapel - b[1].nPapel).forEach(([id, item]) => {
                    if(!item.enRecinto) tCola.innerHTML += generarFilaHTML(id, item, false, false);
                    else tRecinto.innerHTML += generarFilaHTML(id, item, true, false);
                });
            }
            if(data.completados) {
                Object.entries(data.completados).filter(x => !x[1].finalizado).forEach(([id, item]) => {
                    tPista.innerHTML += generarFilaHTML(id, item, false, true);
                });
            }
        });

        setInterval(() => {
            document.querySelectorAll('.time-info').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'));
                const diff = Date.now() - ts;
                const m = Math.floor(diff/60000);
                const s = Math.floor((diff%60000)/1000);
                el.querySelector('.cronometro').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            });
        }, 1000);

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tr').forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none');
        };
    </script>
</body>
</html>
