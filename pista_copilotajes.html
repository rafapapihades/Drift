<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PISTA - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; --green: #28a745; --red: #ff0000; --blue: #007bff; --orange: #fd7e14; }
        * { box-sizing: border-box; }
        body { 
            background-image: url('Fibra3.png'); background-repeat: repeat; background-color: var(--bg);
            color: #fff; font-family: 'Arial Black', Gadget, sans-serif; padding: 10px; margin: 0; 
        }
        .header { text-align: center; padding: 15px; background: rgba(0,0,0,0.9); border-radius: 12px; border-bottom: 3px solid var(--red); margin-bottom: 15px; }
        .header-logo { display: block; margin: 0 auto; width: 100%; max-width: 400px; height: auto; }
        
        .container { display: flex; flex-direction: column; gap: 20px; }
        .column { background: rgba(20,20,20,0.9); padding: 15px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: var(--accent); text-transform: uppercase; font-size: 1.1em; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #888; font-size: 0.8em; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.9em; }

        .btn { padding: 10px 15px; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75em; width: 100%; }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        .btn-gray { background: #444; color: #aaa; cursor: not-allowed; }
        .btn-confirm { background: var(--orange); color: #000; animation: parpadeo 0.5s infinite; }
        
        @keyframes parpadeo { 50% { opacity: 0.7; } }

        .time-info { color: var(--accent); font-family: monospace; font-size: 1.1em; }
        .ticket-num { background: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; color: var(--accent); }
        
        #buscador { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; margin-bottom: 10px; font-family: sans-serif; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="header-logo">
        <div style="margin-top:10px; color:var(--accent)">CONTROL PISTA - TIEMPOS Y SEGUIMIENTO</div>
    </div>

    <input type="text" id="buscador" placeholder="BUSCAR POR NOMBRE O TICKET..." onkeyup="filtrar()">

    <div class="container">
        
        <div class="column" style="border-color: #555;">
            <h2 style="color: #aaa;">📋 COLA DE ACCESO (MÓVIL)</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>CO-PILOTO</th>
                        <th>ESTADO</th>
                    </tr>
                </thead>
                <tbody id="tabla-cola"></tbody>
            </table>
        </div>

        <div class="column">
            <h2>⏱️ ESPERANDO EN RECINTO</h2>
            <table>
                <thead>
                    <tr>
                        <th>TICKET</th>
                        <th>CO-PILOTO / PILOTO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tabla-recinto"></tbody>
            </table>
        </div>

        <div class="column" style="border-color: var(--blue);">
            <h2 style="color: var(--blue);">🏎️ EN PISTA</h2>
            <table>
                <thead>
                    <tr>
                        <th>TICKET</th>
                        <th>INFO VIAJE</th>
                        <th>TIEMPO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tabla-pista"></tbody>
            </table>
        </div>

    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. PASAR A PISTA (Registra Hora de Inicio)
        window.entrarPista = async (id, item) => {
            const ahora = Date.now();
            const horaTexto = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            
            const updates = {};
            const itemActualizado = { 
                ...item, 
                ts_entrada: ahora, 
                horaEntradaTexto: horaTexto, 
                estado: "EN PISTA" 
            };
            
            updates[`copilotajes/pista/${id}`] = itemActualizado;
            updates[`copilotajes/espera/${id}`] = null;
            await db.ref().update(updates);
        };

        // 2. CONFIRMACIÓN DE FIN (Cambio de botón dinámico)
        window.confirmarFin = (btn, id, itemJson) => {
            const item = JSON.parse(decodeURIComponent(itemJson));
            const textoOriginal = "FIN ✅";
            
            btn.innerText = "¿ESTÁS SEGURO?";
            btn.className = "btn btn-confirm";
            btn.onclick = () => ejecutarFinalizar(id, item);
            
            // Si no se pulsa en 3 segundos, vuelve al estado normal
            setTimeout(() => {
                if (btn && btn.innerText === "¿ESTÁS SEGURO?") {
                    btn.innerText = textoOriginal;
                    btn.className = "btn btn-red";
                    btn.onclick = () => confirmarFin(btn, id, itemJson);
                }
            }, 3000);
        };

        // 3. FINALIZAR VIAJE (Calcula duración y guarda para CSV)
        async function ejecutarFinalizar(id, item) {
            const ahora = Date.now();
            const inicio = item.ts_entrada || ahora;
            const diff = ahora - inicio;
            
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const duracionStr = m + ":" + s.toString().padStart(2, '0');
            const horaFinTexto = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            const itemFinal = {
                ...item,
                ts_salida: ahora,
                horaSalidaTexto: horaFinTexto,
                duracionTotal: duracionStr,
                estado: "FINALIZADO",
                finalizado: true
            };

            const updates = {};
            updates[`copilotajes/completados/${id}`] = itemFinal;
            updates[`copilotajes/pista/${id}`] = null;
            await db.ref().update(updates);
        }

        function generarFilaHTML(id, item, tipo) {
            const itemJson = encodeURIComponent(JSON.stringify(item));
            
            if (tipo === 'cola') {
                return `<tr>
                    <td><span class="ticket-num">${item.nPapel || 'S/N'}</span></td>
                    <td><b>${item.copiloto}</b></td>
                    <td><button class="btn btn-gray">VALIDAR EN MESA</button></td>
                </tr>`;
            }
            
            if (tipo === 'espera') {
                return `<tr>
                    <td><span class="ticket-num">${item.nPapel}</span></td>
                    <td><b>${item.copiloto}</b><br><small>PILOTO: ${item.piloto || '---'}</small></td>
                    <td><button class="btn btn-blue" onclick='entrarPista("${id}", JSON.parse(decodeURIComponent("${itemJson}")))'>ENTRA PISTA ▶️</button></td>
                </tr>`;
            }

            if (tipo === 'pista') {
                return `<tr>
                    <td><span class="ticket-num">${item.nPapel}</span></td>
                    <td><b>${item.piloto}</b><br><small>CO-PILOTO: ${item.copiloto}</small></td>
                    <td class="time-info" data-ts="${item.ts_entrada}"><span class="cronometro">0:00</span></td>
                    <td><button class="btn btn-red" onclick='confirmarFin(this, "${id}", "${itemJson}")'>FIN ✅</button></td>
                </tr>`;
            }
        }

        db.ref('copilotajes').on('value', snap => {
            const data = snap.val() || {};
            const tCola = document.getElementById('tabla-cola');
            const tRecinto = document.getElementById('tabla-recinto');
            const tPista = document.getElementById('tabla-pista');
            
            tCola.innerHTML = ""; tRecinto.innerHTML = ""; tPista.innerHTML = "";

            if (data.pre_inscritos) {
                Object.entries(data.pre_inscritos).forEach(([id, item]) => { tCola.innerHTML += generarFilaHTML(id, item, 'cola'); });
            }
            if (data.espera) {
                Object.entries(data.espera).forEach(([id, item]) => { tRecinto.innerHTML += generarFilaHTML(id, item, 'espera'); });
            }
            if (data.pista) {
                Object.entries(data.pista).forEach(([id, item]) => { tPista.innerHTML += generarFilaHTML(id, item, 'pista'); });
            }
            filtrar();
        });

        // Cronómetro visual en tiempo real
        setInterval(() => {
            document.querySelectorAll('.time-info').forEach(el => {
                const ts = parseInt(el.getAttribute('data-ts'));
                if (!ts) return;
                const diff = Date.now() - ts;
                const m = Math.floor(diff/60000);
                const s = Math.floor((diff%60000)/1000);
                el.querySelector('.cronometro').innerText = m + ":" + s.toString().padStart(2,'0');
            });
        }, 1000);

        window.filtrar = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('tbody tr').forEach(tr => {
                tr.style.display = tr.innerText.toLowerCase().includes(b) ? '' : 'none';
            });
        };
    </script>
</body>
</html>
