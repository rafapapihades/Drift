<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE-INSCRIPCIÓN - TAXI DRIFT</title>
    <style>
        :root { --accent: #ffcc00; --bg: #000; --card: #1a1a1a; }
        * { box-sizing: border-box; }
        body { 
            background-image: url('Fibra3.png'); background-color: var(--bg);
            color: #fff; font-family: sans-serif; padding: 15px; margin: 0;
            display: flex; justify-content: center;
        }
        .container { max-width: 500px; width: 100%; background: rgba(20,20,20,0.95); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .logo { width: 100%; max-width: 250px; display: block; margin: 0 auto 20px; }
        h2 { text-align: center; color: var(--accent); text-transform: uppercase; margin-bottom: 25px; }
        
        .section { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .section-title { font-size: 0.8em; color: var(--accent); font-weight: bold; margin-bottom: 15px; display: block; }

        input, select { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #444; 
            background: #000; color: #fff; font-size: 1em;
        }
        .row { display: flex; gap: 10px; }
        
        .chk-group { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85em; color: #ccc; margin-bottom: 15px; cursor: pointer; }
        .chk-group input { width: auto; transform: scale(1.3); margin-top: 3px; }

        .btn-enviar { 
            width: 100%; padding: 20px; border: none; border-radius: 12px; 
            background: var(--accent); color: #000; font-weight: 900; 
            font-size: 1.2em; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        #menor-extra { display: none; background: #221a00; border: 1px dashed var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        
        #success-screen { display: none; text-align: center; }
        .ticket { font-size: 4em; color: var(--accent); font-family: monospace; border: 2px dashed var(--accent); display: inline-block; padding: 10px 30px; margin: 20px 0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container" id="form-screen">
    <img src="logotaxi.jpg" alt="Logo" class="logo">
    <h2>Pre-Registro Taxi Drift</h2>

    <div class="section">
        <span class="section-title">DATOS DEL PARTICIPANTE</span>
        <input type="text" id="nombre" placeholder="Nombre Completo" required>
        <div class="row">
            <input type="text" id="dni" placeholder="DNI / NIE" required style="flex:2">
            <input type="date" id="fecha_nac" required style="flex:3" onchange="checkEdad()">
        </div>
        <input type="text" id="insta" placeholder="Instagram (Opcional)">
        <input type="email" id="email" placeholder="Correo electrónico (Opcional)">
    </div>

    <div id="menor-extra">
        <span class="section-title">AUTORIZACIÓN (MENOR DE EDAD)</span>
        <input type="text" id="tutor_nombre" placeholder="Nombre del Padre/Madre/Tutor">
        <input type="text" id="tutor_dni" placeholder="DNI del Tutor">
    </div>

    <div class="section">
        <span class="section-title">LOGÍSTICA</span>
        <select id="pago">
            <option value="EFECTIVO">Pagaré en EFECTIVO</option>
            <option value="TARJETA">Pagaré con TARJETA</option>
        </select>
        <select id="piloto-select">
            <option value="">Cualquier Piloto (Más rápido)</option>
        </select>
    </div>

    <label class="chk-group">
        <input type="checkbox" id="chk-fotos" checked>
        <span>Acepto el uso de mi imagen para redes sociales y recibir fotos del evento.</span>
    </label>
    
    <label class="chk-group">
        <input type="checkbox" id="chk-legal" required>
        <span>He leído y acepto las normas de seguridad del evento.</span>
    </label>

    <button class="btn-enviar" onclick="enviarRegistro()">Inscribirme</button>
</div>

<div class="container" id="success-screen">
    <h2 style="color: var(--accent)">¡REGISTRO RECIBIDO!</h2>
    <p>Tu número de turno es:</p>
    <div class="ticket" id="turno-txt">---</div>
    <p>Por favor, dirígete a la carpa de control para <b>firmar la hoja física</b> y completar el pago.</p>
    <button class="btn-enviar" style="background: #333; color: #fff" onclick="location.reload()">Nuevo Registro</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://lectura-sonido-drift-show-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Cargar pilotos de la config de Copilotajes
    onValue(ref(db, 'copilotajes/config_pilotos'), (snap) => {
        const pilotos = snap.val() || {};
        const sel = document.getElementById('piloto-select');
        sel.innerHTML = '<option value="">Cualquier Piloto (Más rápido)</option>' + 
                        Object.values(pilotos).map(p => `<option value="${p}">${p}</option>`).join('');
    });

    window.checkEdad = () => {
        const fecha = document.getElementById('fecha_nac').value;
        if(!fecha) return;
        const edad = Math.floor((new Date() - new Date(fecha)) / 31557600000);
        document.getElementById('menor-extra').style.display = (edad < 18) ? 'block' : 'none';
    };

    window.enviarRegistro = async () => {
        if(!document.getElementById('chk-legal').checked) return alert("Debes aceptar las normas.");
        
        const data = {
            copiloto: document.getElementById('nombre').value.trim(),
            dni: document.getElementById('dni').value.trim(),
            fecha_nac: document.getElementById('fecha_nac').value,
            insta: document.getElementById('insta').value.trim(),
            email: document.getElementById('email').value.trim(),
            metodoPago: document.getElementById('pago').value,
            piloto: document.getElementById('piloto-select').value || "CUALQUIERA",
            consentimiento_fotos: document.getElementById('chk-fotos').checked,
            tutor: document.getElementById('tutor_nombre').value,
            tutor_dni: document.getElementById('tutor_dni').value
        };

        if(!data.copiloto || !data.dni) return alert("Faltan datos obligatorios.");

        try {
            // Turno de pescadería atómico
            const result = await runTransaction(ref(db, 'copilotajes/ultimo_numero'), (val) => (val || 0) + 1);
            const num = result.snapshot.val();
            
            // Guardar en PRE-INSCRITOS (Para no ensuciar la lista activa)
            await set(ref(db, `copilotajes/pre_inscritos/${num}`), { ...data, nPapel: num });
            
            document.getElementById('turno-txt').innerText = num.toString().padStart(3, '0');
            document.getElementById('form-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        } catch(e) { alert("Error de conexión"); }
    };
</script>
</body>
</html>
